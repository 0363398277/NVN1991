<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Gian nan hiểm trở lộ khê nghêu,</div><div style="text-align:center;">Nam điểu cô phi y bắc sào.</div><div style="text-align:center;">Kim nhựt quới nhơn làng thực hiện,</div><div style="text-align:center;">Tương phùng khước tại Hạ thu giao.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lộ trình hiểm trở lúc lao đao,</div><div style="text-align:center;">Chim nam tổ bắc phải làm sao.</div><div style="text-align:center;">May gặp quí nhân người tiến dẫn,</div><div style="text-align:center;">Qua thu, hạ mới hiệp cùng nhau.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này tuy trước khó khăn mà sau sẽ thành công, danh lợi có muộn, kiện tụng nên hòa, hôn nhân thành, thi cử đậu, có công danh tài lợi phải nhờ quí nhân giúp đỡ.</div><div>Như đời Tam Quốc, Lưu Bị qua Đông Ngô, Tôn Quyền mưu hại mà không được, sau Tôn Quyền gả em gái cho Lưu Bị.</div><div>Xăm này cuối mùa hạ và đầu mùa thu thì mọi việc đều tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tương phùng khước tại hạ, thu giao.</div><div style="text-align:center;">Và cũng đúng câu:</div><div style="text-align:center;">Hữu duyên thiên lý năng tương ngộ.</div>
`
},

"054":{
title:"SỐ 054 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vạn nhân trùng lý sánh anh hào,</div><div style="text-align:center;">Tiện dục phi đằng tiêu hán cao.</div><div style="text-align:center;">Tranh nại thuỷ lưu phong vị tiện,</div><div style="text-align:center;">Thanh đăng huỳnh quyển thả cần lao.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trước mặt muôn người trổ biện tài,</div><div style="text-align:center;">Ngàn dặm trời cao chí muốn bay.</div><div style="text-align:center;">Chỉnh ngặt nước xuôi mà gió ngược,</div><div style="text-align:center;">Gắng công đèn sách đặng chờ thời.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Công danh chưa có, hôn nhân trở ngại, cầu tài phải chờ thời, đi xa bất lợi, cầu bệnh phải đổi thầy.</div><div>Như tích ông Tô Tần là nhà chính trị gia có tài biện thuyết vô ngại, lập thuyết Hiệp tung rất hay, nhưng lúc đầu không thành phải mang nghèo, về nhà cố công học tập trong khi buồn ngủ, thì ông lấy kim đâm vào đầu gối cho đau đặng ráng thức mà học. Qua sau nên danh phận đi rong trong 6 nước, nước nào cũng trọng dụng (truyện Đông Châu Liệt Quốc).</div><div>Xăm này dầu có trở ngại buổi đầu, lúc sau sẽ thành tựu.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Có công mài sắt, có ngày nên kim.</div>
`
},

"055":{
title:"SỐ 055 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Cần canh lực tác mạc sa đà,</div><div style="text-align:center;">Y thực tùy thời an phận quá.</div><div style="text-align:center;">Túng sử kinh thương thâu bội lợi,</div><div style="text-align:center;">Bất như trục tuế lẫm hòa đa.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cày bừa gắng sức chớ bỏ bê,</div><div style="text-align:center;">Ăn mặc tùy thời giữ theo lề.</div><div style="text-align:center;">Dẫu có bán buôn thân nhiều lợi,</div><div style="text-align:center;">Chẳng bằng lúa thóc chứa tràn trề.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Đừng quá tham lam danh lợi, an phận tùy duyên qua buổi, công danh chậm, kiện nên hòa, hôn nhân hạp, đi xa thành.</div><div>Tích xưa, có người học nửa chừng rồi tính đi buôn, đi buôn lỗ lại về học, 3 năm sau thi đậu.</div><div>Xăm có ý khuyên người nên an phận, nghề nào nên giữ nghề ấy cho tinh thông.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Sông có khúc, người có lúc.</div><div style="text-align:center;">Hễ có chí thì nên.</div>
`
},

"056":{
title:"SỐ 056 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tâm đầu lý khúc cưỡng từ già,</div><div style="text-align:center;">Trực dục khi quan hành lộ tà.</div><div style="text-align:center;">Nhất đản xú hình lâm nguyệt kính,</div><div style="text-align:center;">Thân đầu hiến võng mạc tư ta.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lòng tà phải sửa chớ tranh đua,</div><div style="text-align:center;">Ngay thẳng thẳng ngay chớ dối lừa.</div><div style="text-align:center;">Tà chính gương soi thì tỏ rõ,</div><div style="text-align:center;">Thân vào tù ngục hết hơn thua.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Tài lợi chớ tham, kiện thưa chớ gây ra, có bệnh phải lo thang thuốc và cầu khẩn ơn trên, người đi xa có tin về, mọi việc đừng làm quấy không được, phải lòng tiểu nhân ám hại.</div><div>Cũng như xưa, Vương Khu Mật làm quan nhà Tống, ăn ở tà vạy, sau bị hại. Và anh học trò xin được quẻ xăm này vì ăn ở phải đạo nghĩa và cố công học hành, về sau đi thi đỗ làm quan đặng vinh hiển cả gia đình.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lục điền vô võng cổ, Viên mộc vọng cầu ngư.</div><div style="text-align:center;">(Ruộng khô không chải lưới, trên cây có cá đâu).</div>
`
},

"057":{
title:"SỐ 057 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Sự đoan bá xuất lư tùy trường,</div><div style="text-align:center;">Mạc thính nhơn ngôn tự chủ trường.</div><div style="text-align:center;">Nhứt trước tiên cơ quân ký chú,</div><div style="text-align:center;">Phân phân náo lý cánh tư lương.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trăm việc liệu lo nghĩ đủ đường,</div><div style="text-align:center;">Lời quấy đừng nghe tự chủ trương.</div><div style="text-align:center;">Tiên tri lời ấy người ghi nhớ,</div><div style="text-align:center;">Rộn ràng càng phải biết so lường.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa nên hòa là tốt, bệnh được mau mạnh, đi xa bình an, tin xa về đến, hôn nhân thành tựu, phải nhớ van vái mà trả lễ.</div><div>Tích xưa, có hai nhà thù khích nhau sanh ra kiện cáo dây dưa, may sao có người bà con ở xa về đến rủ đánh cờ chơi rồi bày ra tiệc giải hòa. Từ đó, hai bên lại thân mật với nhau và tương trợ nhau, ai cũng có lời khen ngợi.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lấy ơn báo oán, oán mới tiêu,</div><div style="text-align:center;">Lấy oán báo oán, oán không dứt.</div><div style="text-align:center;">Dĩ hòa vi quí.</div>
`
},

"058":{
title:"SỐ 058 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tô tần tam thốn túc bình sanh,</div><div style="text-align:center;">Phú quí công danh tại thử hành.</div><div style="text-align:center;">Cánh hảo tu vi âm chất sự,</div><div style="text-align:center;">Tiền trình vạn lý thông hanh.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tô tần tấc lưỡi thõa bình sanh,</div><div style="text-align:center;">Phú quí công danh tại học hành.</div><div style="text-align:center;">Âm đức có tu trời ban phước,</div><div style="text-align:center;">Đường dài việc khó cũng đều thành.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Có bệnh mau lành, đi xa đặng thành, cầu tài như ý, cầu quan đắc vị, hôn nhân hạp, kiện thưa thắng lý, nên ráng làm lành tránh dữ, mọi sự hanh thông.</div><div>Cũng như Tô Tần, một người cố gắng học hành, sau nhờ tài biện thuyết giỏi mà nên danh trong đời Đông Châu Liệt Quốc (Tô Tần chủ trương thuyết "Hiệp tung").</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thiên sanh ngã, tắc tài hữu dụng.</div><div style="text-align:center;">Đa cảm đa sầu tổn tinh thần.</div>
`
},

"059":{
title:"SỐ 059 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Môn suy hộ lãnh khổ linh đinh,</div><div style="text-align:center;">Tự thán kỷ cầu bất nhứt linh.</div><div style="text-align:center;">Hạnh hữu tổ tông âm chất tại,</div><div style="text-align:center;">Hương yên vị đoạn thục minh linh.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cửa nhà hiu quạnh cảnh tang thương,</div><div style="text-align:center;">Cầu thánh chẳng linh dạ thảm thương.</div><div style="text-align:center;">May có ông bà tu phước đức,</div><div style="text-align:center;">Con nuôi, con nối, lửa vừa hương.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm như đúng thì cầu con là phải hơn, hoặc cầu hôn thì hạp lắm. Còn như cầu tài hay cầu danh thì phải nhờ quí nhân giúp mới thành, cầu bệnh thì phải van vái và đổi thầy thì mới mạnh.</div><div>Tích xưa, có một người nhà giàu không con, đi xin được quẻ này, sau nuôi con nuôi, vợ thì cũng sinh được con trai.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nhân hữu thiện nguyện, Thiên địa tùng chi.</div><div style="text-align:center;">Người có chí nguyện chân thành,</div><div style="text-align:center;">trời đất cũng giúp thêm mà nên.</div>
`
},

"060":{
title:"SỐ 060 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kiên quân huynh đệ hảo thanh danh,</div><div style="text-align:center;">Chí quản khiêm vi mạo tự căn.</div><div style="text-align:center;">Đơn chiếu huế huỳnh tương bức cận,</div><div style="text-align:center;">Nguy nga khoa giáp lưỡng đồng đăng.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Khâm phục anh em đã rạng danh,</div><div style="text-align:center;">Kiêu căng chẳng có tánh thiện lành.</div><div style="text-align:center;">Chiếu chỉ sắc phong đang đến gấp,</div><div style="text-align:center;">Rực rỡ đồng khoa danh phẩm cao.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt mọi việc đều thành tựu vẻ vang, cầu hôn thành, đi xa thi cử đậu, buôn bán đắc lợi, thông tin được chú ý, có thai sanh con trai, kiện đắc lý.</div><div>Như sự tích ông Lư Văn Vương gieo cầu kén rể cho người con gái lớn, chẳng dè khi gieo cầu thì Tiết Giao và Tiết Quì giành nhau làm quả cầu bể làm hai, không ai nhường ai, túng cùng ông Lư Văn Vương gả con gái lớn cho Tiết Giao, người con gái thứ gả cho Tiết Quì (Truyện Phản Đường).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thăng đường cận quí lưỡng tương thân,</div><div style="text-align:center;">Thượng hạ tương đồng kiến quí nhân.</div>
`
},

"061":{
title:"SỐ 061 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Túc tụ sơn lâm hung ác thú,</div><div style="text-align:center;">Thiện chương vô sự khổ tiên ưu.</div><div style="text-align:center;">Chủ nhơn đại tiếu xuất môn khứ,</div><div style="text-align:center;">Bất dụng can qua đạo tặc hưu.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tụ hội e khi bất thành,</div><div style="text-align:center;">Khiến nên lương thiện cũng lo âu.</div><div style="text-align:center;">Chủ nhân cười lớn đi ra cửa,</div><div style="text-align:center;">Chẳng dụng can qua đạo tặc bình.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm hơi xấu, đi xa không thành, nên đề phòng tiểu nhân ám hại, kiện nên hòa, đau bệnh ráng van vái, hôn nhân trở ngại, đừng ỷ tài e mang họa.</div><div>Cũng như Hàn Tín được phong làm Sở hoài Vương vinh vang một cõi nên có ý tự đắc, và đối với Lưu Ban tỏ vẻ cao ngạo, Lưu Ban dụng ý triệu về, có Khoái Kiệt cản mà Hàn Tín không nghe lời Khoái Kiệt, nên sau Hàn Tín bị hại (Truyện Tây Hớn). Tri chỗ vinh, nên phong chỗ nhục.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thấy sang cũng chẳng nên cao ngóng,</div><div style="text-align:center;">Nào biết dòng sông đáy biển sâu.</div>
`
},

"062":{
title:"SỐ 062 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bá thiên nhơn diện hổ lang tâm,</div><div style="text-align:center;">Lại nhữ can qua dụng lực thâm.</div><div style="text-align:center;">Đắc thắng hồi thời thu trãm lão,</div><div style="text-align:center;">Hổ đầu thành lý hỉ tương tầm.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trăm ngàn người mặt cọp lòng lang,</div><div style="text-align:center;">Chinh chiến nhã người gắng sức toan.</div><div style="text-align:center;">Đến cuối thu thì toàn đắc thắng,</div><div style="text-align:center;">Nhập thành trì lại được ân ban.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, kiện đắc thắng, đi xa gặp quí nhân, cầu tài có tài, cầu hôn rất hạp, bệnh mau mạnh, thai nghén sinh trai.</div><div>Sự tích như Hàn Tín dụng binh ngăn nước, chờ cho binh Sở qua sông được nửa chừng thì tháo nước trên nguồn xuống, làm cho binh Sở vỡ tan (Hàn Tín điếu đăng kiều trảm Long Thơ).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thời lai hoàng giáp âm ứng chí,</div><div style="text-align:center;">Tùng sử trì trì diệc hữu kỳ.</div><div style="text-align:center;">(Vận tốt tin lành dồn đến mãi,</div><div style="text-align:center;">mau chậm rồi đây cũng có kỳ).</div>
`
},

"063":{
title:"SỐ 063 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Mãn thời bại bắc thả đồ nam,</div><div style="text-align:center;">Cận lực suy tàn thượng nhựt kham.</div><div style="text-align:center;">Dục thúc sanh tiền quân đại so,</div><div style="text-align:center;">Tiền tam tam dữ, hậu tam tam.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xưa từng xông xáo bắc nam đông,</div><div style="text-align:center;">Sức lực suy tàn lưu chiến công.</div><div style="text-align:center;">Kiếp trước người đây sinh lớn số,</div><div style="text-align:center;">Hậu tiền các việc vẫn hòa đồng.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm đặng trung bình, bệnh mau lành, cầu tài chậm, hôn nhân nên xét kỹ, làm ăn cũng việc gì cũng đôi ba lần mới nên.</div><div>Câu "Tiền tam dữ, hậu tam tam" cao quá xá, rất có thể đoán theo lý thì thánh cho rằng dù có bôn ba cho lắm, khi sanh thở ba hơi với ba tiếng khóc, đến khi sắp chết cũng thở ra ba hơi mà chết (Tiền tam dữ hậu tam).</div><div>Vậy là nên an phận tới đâu hay tới đó.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Vinh hoa dường thể hoàng lương mộng,</div><div style="text-align:center;">Chung đinh thường gây nỗi thảm phiền.</div>
`
},

"064":{
title:"SỐ 064 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kiết nhơn tương ngộ bổn hòa đồng,</div><div style="text-align:center;">Hướng hữu trì mưu thiên thủy ông.</div><div style="text-align:center;">Nhơn lực bất lao công luận hiệp,</div><div style="text-align:center;">Sự thành công bội tiếu đàm trung.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người lành hội ngộ chí hòa đồng,</div><div style="text-align:center;">Thêm nỗi nên hư tại hóa công.</div><div style="text-align:center;">Chẳng nhọc sức mình nhiều kẻ giúp,</div><div style="text-align:center;">Sự thành công lớn rất nên vui.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, danh lợi tốt, kiện đắc lý, đi xa đặng lợi, hôn nhân thành, có thai sanh trai, cầu tài chắc chắn.</div><div>Tích xưa: Quảng Bảo phân kim. (Truyện Đông Châu).</div><div>Chiếu nghiệm: Một người làm quan Huyện bị cách chức, chiếm được quẻ xăm này, sau nhờ trong hương chức Quận Lữ Thành ra sức che chở mới khỏi tội.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nếu như mọi việc đều như ý,</div><div style="text-align:center;">E sợ nhân tình nói viễn vông.</div>
`
},

"065":{
title:"SỐ 065 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hạnh ngộ thanh thông hảo trước tiên,</div><div style="text-align:center;">Thiên thai hải giác lợi an nhiên.</div><div style="text-align:center;">Bửu kim trọng hoạch đồng nhơn thuận,</div><div style="text-align:center;">Hậu tài tu nghiệp đại xuyên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">May gặp thời vận thái hanh,</div><div style="text-align:center;">Ven trời góc biển vẫn an thân.</div><div style="text-align:center;">Được nhiều của báo người đồng thuận,</div><div style="text-align:center;">Chở qua sông suối cũng bình yên.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt lắm, ví như người lái buôn đi xa, khi trở về chở đầy vàng bạc qua sông hiểm trở mà về cũng bình an.</div><div>Xăm này trăm việc, việc nào cũng đặng trọn tốt (Sự tích anh lái buôn đắc chí).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">May gặp thời hanh, vận cũng thông,</div><div style="text-align:center;">Ven trời góc biển vững như không.</div><div style="text-align:center;">Đặng nhiều vàng bạc, người đồng thuận,</div><div style="text-align:center;">Chở khỏi qua sông, việc đặng xong.</div>
`
},

"066":{
title:"SỐ 066 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Canh vân chi khả tại hương ban,</div><div style="text-align:center;">Hà dụng cầu mưu hướng ngoại phương.</div><div style="text-align:center;">Kiến thiết kim niên tân vận hảo,</div><div style="text-align:center;">Môn lang hỉ khí sự song song.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cày bừa chinh ở tại làng ta,</div><div style="text-align:center;">Khỏi phải cần lo đến xứ xa.</div><div style="text-align:center;">Mạng thời nay đà đến lúc tốt,</div><div style="text-align:center;">Gia đình vui vẻ lộc tài đa.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt lắm, công danh tài lợi đều có, hôn nhân hạp, có thai sanh trai, phong thuỷ và gia trạch đều tốt đẹp, kiện thưa nên giải, thay đổi nghề nghiệp và đi xa thì không đặng (chi bằng làm nghề hiện tại và ở tại xứ mình thì bằng tốt).</div><div>Sự tích: Đỗ Phủ du xuân, Gia Cát ẩn Nam Dương.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Canh vân chỉ khả tại hương ban,</div><div style="text-align:center;">Trâu ăn cỏ đồng ta,</div><div style="text-align:center;">đừng thấy cỏ tốt qua ăn đồng người.</div>
`
},

"067":{
title:"SỐ 067 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tài phát quân tâm thiên vĩ tri,</div><div style="text-align:center;">Hà tu vấn ngã quyết hồ nghi.</div><div style="text-align:center;">Nguyện tử cải đồ tùng hiếu đệ,</div><div style="text-align:center;">Bất sầu gia thất bất lương nghi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lòng người muốn tính trời đã nghĩ,</div><div style="text-align:center;">Cần phải hỏi ta dạ hoài nghi.</div><div style="text-align:center;">Cải bỏ việc tà lo hiếu để,</div><div style="text-align:center;">Trong gia đình ắt hết suy vi.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Thánh ý khuyên người xin quẻ xăm này nên cải tà qui chính thì trong gia đạo an hòa, có bệnh cầu thầy sẽ mạnh, tài chưa có, hôn nhân nên xét kỹ, đi xa không thành, có thai bình an.</div><div>Tích xưa, có một ông quan ngoài ải toan làm việc phi pháp, sau biết ăn năn vì xin quẻ xăm này liền hối cải, về sau nên danh.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nhàn trung kiểm điểm bình sanh sự,</div><div style="text-align:center;">Tinh lý tư lương nhựt sở vi.</div><div style="text-align:center;">(Rỗi rảnh việc làm nên xét kỹ càng lại việc đã qua,</div><div style="text-align:center;">như phải thì nên làm thêm nữa, như việc nào tà thì nên bỏ).</div>
`
},

"068":{
title:"SỐ 068 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Dục đắc đa tài chánh cập thời,</div><div style="text-align:center;">Quá thời mạc đắc hối chung tri.</div><div style="text-align:center;">Thời lai đương thù tư bằng thú,</div><div style="text-align:center;">Cảnh lư phùng xung sự hữu vi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Muốn đặng của nhiều thì phải ráng tay,</div><div style="text-align:center;">Chẳng nên lần lựa để cho chầy.</div><div style="text-align:center;">Gặp thầy phải lấy thì toan lấy,</div><div style="text-align:center;">Sợ nỗi phùng sung khó trở tay.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Thánh ý nói rõ rằng người xin quẻ này ví như cây mùa xuân trăm hoa đua nở, gặp cơ hội muốn làm chi thì ráng mà làm, đừng chần chờ để trễ cơ hội tốt thì trở tay không kịp.</div><div>Cũng như ông Lưu Huyền Đức không có đất dụng võ, mà cứ bàn không muốn lấy Kinh Châu làm căn cứ, nhờ có mưu của Khổng Minh sau phải lãnh thủ Kinh Châu (Tam quốc).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Mùa xuân đã đến, Chẳng nên chần chờ.</div><div style="text-align:center;">Sự chớ trễ nải, Tính gấp thì nên.</div><div style="text-align:center;">Trăm sự thành tựu, Chẳng nên thủ cựu.</div><div style="text-align:center;">Cải tiến thời may.</div>
`
},

"069":{
title:"SỐ 069 - TRUNG HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xá châu tuân lộ tổng tương nghi,</div><div style="text-align:center;">Thận vật hý du trục quí nhi.</div><div style="text-align:center;">Nhất dạ tôn tiền huynh dữ đệ,</div><div style="text-align:center;">Minh triêu thù địch hựu tương tùy.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lên bộ bỏ thuyền ấy hợp thời,</div><div style="text-align:center;">Đuổi chi con trẻ để ăn chơi.</div><div style="text-align:center;">Thâu đêm nâng chén anh em tốt,</div><div style="text-align:center;">Sáng ra thù địch việc thường đời.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm cũng khá, cầu tài có mà chậm, bệnh nên cầu thầy, hôn nhân phải xét kỹ, kiện nên hòa, đổi nghề cũ hay là đi xa đặng tốt, nhưng phải cẩn thận lời nói và việc làm, ban đầu có khó khăn đôi chút, sau mới thành công.</div><div>Như Bàn Quyên và Tôn Tẫn đấu trí, Bàn Quyên nhiều lần mưu hại Tôn Tẫn mà hại không được.</div><div>Xăm này người xin được ví như Tôn Tẫn vậy (Truyện Xuân Thu Oanh Liệt).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Việc xưa khá cải liền, Việc mới phải cần chuyên.</div><div style="text-align:center;">Cá vượt Long môn khỏi, Cát phàm hòa Thánh, Tiên.</div>
`
},

"070":{
title:"SỐ 070 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lôi võ phong vân các hữu tư,</div><div style="text-align:center;">Chí thành đáo cáo mạc sanh nghi.</div><div style="text-align:center;">Dữ quân địch ước vi lâm nhựt,</div><div style="text-align:center;">Chánh vị ôn long trung phục thi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mưa gió có chừng định mỗi khi,</div><div style="text-align:center;">Chí thành cầu khẩn chớ hồ nghi.</div><div style="text-align:center;">Việc người định chắc gần thành đạt,</div><div style="text-align:center;">Vận tốt khuyên người cố gắng đi.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi có hơi chậm, cầu tài có tài, đi xa gặp quí nhân.</div><div>Sự tích: Thầy Huyền Trang là chân tăng đi qua Đông Độ thỉnh kinh, đến một xứ nọ bị trời nắng hạn không có mưa, Thầy Huyền Trang cầu mưa giùm, tự nhiên có mưa, nhờ đó xứ ấy được trúng mùa (Truyện Tây Du).</div><div>Xăm này xin nhằm tháng 4, tháng 5 thì tốt lắm.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Hữu cầu chung hoạch kiết, Bổn tại quí nhân phò.</div><div style="text-align:center;">Có cầu thì có ứng, Trời đất cũng giúp cho.</div>
`
},

"071":{
title:"SỐ 071 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hỷ tước thiềm tiền báo hảo âm,</div><div style="text-align:center;">Tri quân thiên lý dục quy tâm.</div><div style="text-align:center;">Tú vi trùng kết uyên ương đái,</div><div style="text-align:center;">Diệp lạc sương phi hàn sắc xăm.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Rất mừng chim khách báo điềm lành,</div><div style="text-align:center;">Biết chàng muôn dặm trở về thành.</div><div style="text-align:center;">Phòng lạnh uyên ương nay kết cánh,</div><div style="text-align:center;">Lá rụng sương bay trở lại thành.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Người xưa được quẻ này thì trước khó, sau dễ, cầu tài cũng trung bình, tin xa bình an, người xa sắp về, hôn nhân hạp, kiện thưa đắc lý, bệnh hoạn phải cầu ơn trên mới được.</div><div>Sự tích: Ông Tô Võ trở về cố lý hòa hiệp cùng gia đình.</div><div>Xăm này hạp tháng 10, 11 và tháng chạp.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Việc với lòng ưng ý, Khuyên người chớ ưu nghi.</div><div style="text-align:center;">Cầu tài, cầu quan hạp, Cưới gả lợi trăm bề.</div>
`
},

"072":{
title:"SỐ 072 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hà cừ bàng lộ hữu cao đê,</div><div style="text-align:center;">Khả thán trường đồ nhật dĩ tây.</div><div style="text-align:center;">Vinh hoa tung hữu thời tiết hảo,</div><div style="text-align:center;">Trực tu hầu khuyển hoán kim kê.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Suối sông đường xá nẻo quanh co,</div><div style="text-align:center;">Trời xế đường dài khó bôn ba.</div><div style="text-align:center;">Dầu được vinh hoa thời tiết tốt,</div><div style="text-align:center;">Gặp khỉ, chó, gà mới thỏa cho.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm có hơi xấu, mọi việc đến chậm, hạp tháng 7, 8 và 9, cầu tài đặng ít, hôn nhân nên xét kỹ, có bệnh nên đổi thầy, kiện thưa nên hòa, phải đề phòng tiểu nhân ganh ghét, đi xa mới khá hơn.</div><div>Cũng như tích ông Phạm Lãi bỏ chốn cũ, đi qua xứ khác làm ăn mà trở nên phú hộ.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Điềm ứng Kim năng sanh Thủy,</div><div style="text-align:center;">Âm dương có kẻ trợ an.</div><div style="text-align:center;">Cầu quan áo gấm mặc xuê xoang,</div><div style="text-align:center;">Xứ lạ cầu tài đắc lợi.</div>
`
},

"073":{
title:"SỐ 073 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ức tích loan phòng phân bán xoa,</div><div style="text-align:center;">Nhi kim hốt hỏa tín âm hoài.</div><div style="text-align:center;">Suy tâm chỉ vọng thành thiên lý,</div><div style="text-align:center;">Đáo để thùy tri sự bất giai.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xưa chốn loan phòng bẻ gãy trâm,</div><div style="text-align:center;">Nay ngồi nhớ lại nghĩ xa xăm.</div><div style="text-align:center;">Ước mơ tái hợp lòng ngây dại,</div><div style="text-align:center;">Bất hòa ai hiểu đã bao năm.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi chưa có, kiện thưa không xong, bệnh phải ráng cầu thầy và van vái ơn trên, hôn nhân trắc trở, đi xa bất thành, cầu quan càng gặp trở ngại.</div><div>Sự tích như nàng Vương Chiêu Quân xa cách vua Hớn Đế đến sầu thảm mà vẫn không gặp được nhau (Chiêu Quân Cống Hồ)</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Mạng đến, thời đến, thời chung hưởng,</div><div style="text-align:center;">Mạng suy, thời suy chớ cưỡng cầu.</div>
`
},

"074":{
title:"SỐ 074 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thôi nguy thôi nguy phục thôi nguy,</div><div style="text-align:center;">Phục lai lý hiểm khứ như di.</div><div style="text-align:center;">Thân tự bồ đề tâm tự kính,</div><div style="text-align:center;">Trường an nhất đạo phóng xuân quy.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đường dài vắng lặng lại gồ ghề,</div><div style="text-align:center;">Theo lề vững bước dài lê thê.</div><div style="text-align:center;">Thân tựa bồ đề lòng sáng tỏ,</div><div style="text-align:center;">Trường an lộ thẳng đón xuân về.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Cầu công danh thì trước khó mà sau dễ, có bệnh nên cầu ơn trên, hôn nhân nên xét kỹ, kiện tụng nên hòa, đi xa đặng, người đi xa về, xăm này hạp tháng giêng, hai, ba và tháng chạp.</div><div>Sự tích ông Thôi Võ nhà nghèo đi cầu công danh, lúc đi vì nghèo phải đi bộ, chừng thành công về đi xe rỡ ràng cho cha mẹ.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Áo gai trong lúc lìa quê,</div><div style="text-align:center;">Khi về áo gấm rỡ ràng mẹ cha.</div>
`
},

"075":{
title:"SỐ 075 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Sanh tiền kiết đắc hảo nhơn duyên,</div><div style="text-align:center;">Nhứt tiếu tương phùng tình tự nhiên.</div><div style="text-align:center;">Tương đương nhơn vật vô cao hạ,</div><div style="text-align:center;">Đắc ý chẳng luận phú dữ bần.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tiền kiếp nhân duyên đã tạo thành,</div><div style="text-align:center;">Mừng nay gặp mặt dạ thêm thành.</div><div style="text-align:center;">Sánh đôi vừa lứa không cao thấp,</div><div style="text-align:center;">Chẳng luận giàu nghèo chí quyết thành.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này tốt lắm, được hai việc hạp là cầu hôn và buôn bán thì đặng thành tựu mỹ mãn, còn bệnh hoạn và thưa kiện thì nan phân, ai có trước thì được</div><div>Cũng như sự tích xưa kia có một người giàu kết bằng hữu với người nghèo, nhờ sự tương trợ mà sau người nghèo trở nên giàu và có vợ đẹp.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">So ra ai kém đâu, Kẻ xe chỉ thắm, Người xâu hột vàng.</div>
`
},

"076":{
title:"SỐ 076 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tam thiên luật pháp bát thiên văn,</div><div style="text-align:center;">Thử sự như hà thuyết dữ quân.</div><div style="text-align:center;">Thiện ác lưỡng đầu quân tự tác,</div><div style="text-align:center;">Nhất sinh họa phước thử trung phân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ba ngàn pháp luật tám ngàn văn,</div><div style="text-align:center;">Khó nói với người chuyện kiếp căn.</div><div style="text-align:center;">Lành, dữ hai đường người đã tạo,</div><div style="text-align:center;">Đời người họa phước liệu mà phân.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa có lý nhờ sự công bình của pháp lý, tài lợi có thừa, hôn nhân phải xét kỹ càng, bệnh hoạn nên cầu thầy và cầu nguyện cho chí thành. Theo thánh ý thì khuyên người xin được quẻ xăm này nên lựa chọn con đường phải mà làm thì tự nhiên phước đến, khỏi cầu cũng có vậy. Còn con đường đời tranh đấu thì lúc nào cũng gay go khó tả cho hết được, vả lại con người ở đời này có nhân quả của tiền thân làm sao rõ được. Vậy nên làm lành, lánh dữ mới mong giải thoát oan nghiệt được.</div><div>Tích xưa, ông Tiêu Hà lập lệ cai trị nhân dân, luật của ông thì gắt gao lắm (Truyện Tây Hớn) .</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thiện ác hữu báo như bóng theo hình.</div>
`
},

"077":{
title:"SỐ 077 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Mộc hữu căn cai thủy hữu nguyên,</div><div style="text-align:center;">Quán đương tự thử cứu kỷ nguyên.</div><div style="text-align:center;">Mạc tùy đạo lộ nhơn nhân ngữ,</div><div style="text-align:center;">Tụng đáo chung hung thị chí ngôn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cây thì có gốc, nước có nguồn,</div><div style="text-align:center;">Tự người xét lấy chỗ căn nguyên.</div><div style="text-align:center;">Chớ nghe dèm xiểm người ngoài xúi,</div><div style="text-align:center;">Kiện cáo rồi sau sự rất hung.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Đừng sanh sự gây gổ với ai không tốt, kiện nên hòa, phòng tiếng thị phi, đi xa không thành, cầu tài chưa có, đừng nghe lời người ta xúi mà mang họa, đừng bỏ gốc mà theo ngọn, có cầu vái thì nên nhớ mà trả lễ. Đừng ham mới mà bỏ cũ.</div><div>Xăm này hạp về tháng 11, còn ngày thì ngày tý có tin tức, hay là sẽ có tài lợi như đặng ý.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nhịn, nhịn, nín thì hay.</div><div style="text-align:center;">Cưỡng cầu trăm sự chẳng hòa hài.</div>
`
},

"078":{
title:"SỐ 078 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Gia đạo phong phi tự bảo ôn,</div><div style="text-align:center;">Dã tu đổ lý lập càn khôn.</div><div style="text-align:center;">Tài đa hại kỷ quân đương tỉnh,</div><div style="text-align:center;">Phúc hữu phôi thai họa hữu môn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Gia đạo sang giàu đặng ấm no,</div><div style="text-align:center;">Có trời có đất đạo hằng lo.</div><div style="text-align:center;">Của nhiều hại mạng người từng biết,</div><div style="text-align:center;">Phước hết rồi e gặp họa to.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Theo thánh ý thì khuyên đừng quá tham lam, hay là dùng tiền của mà mưu hại người ta thì không nên, phải tỉnh ngộ làm lành, lánh dữ, tin xa sẽ về, hôn nhân nên xét kỹ, có bệnh được mạnh, cầu quan được nhưng hơi chậm, có quí nhân giúp mọi việc.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Đa tài thì thường lụy thân.</div><div style="text-align:center;">Quân tử có căng mà cũng có nhu hòa.</div><div style="text-align:center;">Đừng làm việc cầu may.</div>
`
},

"079":{
title:"SỐ 079 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Càn Hợi, lai Long, tử tế khan,</div><div style="text-align:center;">Khảm cư, Ngọ hướng tự đương an.</div><div style="text-align:center;">Nhược di Sửu Cấn âm dương nghịch,</div><div style="text-align:center;">Môn hộ điêu linh gia đạo nan.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Càn Hợi đến Rồng xem kỹ càng,</div><div style="text-align:center;">Nhà quay hướng Ngọ tự nhiên an.</div><div style="text-align:center;">Nếu dời Thìn Sửu âm dương trái,</div><div style="text-align:center;">Lạnh lẽo cửa nhà khó vô ngàn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này như có xuất hành nên đi về hướng tây bắc thì tốt, tháng ba có tài lợi hay có tin lành, còn tháng năm thì khá, tháng chín xấu. Trong mỗi tháng nên lựa ngày thìn, ngọ thì tốt, ngày tuất kỵ.</div><div>Sự tích ông Tử Nha hồi chưa gặp vận, rất nghèo nàn, thấy trời hạn, ông đan gàu nước để bán, thì kế trời mưa ông lại bán ế, rồi sau ông xoay qua nghề bán bột, bị ngựa của quân lính đi qua, thiên hạ tuôn chạy làm đổ hết bột không bán được một đồng tiền nào cả. Về sau ông bói quẻ biết sẽ có vua đến rước ông về làm tướng thắng trận mà nên danh (Truyện Phong Thần).</div><div>Xăm này trước thì lộn xộn, sau mới an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thời lai phong tống đằng vương các.</div><div style="text-align:center;">(Thời tới gió đưa người đến nơi sang giàu).</div>
`
},

"080":{
title:"SỐ 080 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt triêu vô sự hốt tao quan,</div><div style="text-align:center;">Dã thị môn suy phần vị an.</div><div style="text-align:center;">Cai hoán âm dương dị họa phưóc,</div><div style="text-align:center;">Khuyến quân mạc tác đẳng nhàn khan.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Khi không vô sự phải hầu quan,</div><div style="text-align:center;">Gia sự mả mồ động chẳng an.</div><div style="text-align:center;">Đổi cả âm dương đời họa phước,</div><div style="text-align:center;">Khuyên người chớ khá tưởng là nhàn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Công việc làm ăn nên thay đổi mới được, cầu tài chậm, bệnh khó lành, phải ráng cầu khẩn ơn trên, phòng sự kiện thưa lôi thôi, hôn nhân trắc trở, đi xa bất lợi.</div><div>Sự tích ông Quách Phất chôn mẹ vì mẹ đã đến số chết rồi và cũng do nơi oan trái của người mẹ ở thuở trước.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Diệu dược nan y oan trái bệnh.</div><div style="text-align:center;">(Thầy thuốc có hay, cũng khó cứu bệnh oan trái)</div>
`
},

"081":{
title:"SỐ 081 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tá quân tài vật tự đương hoàn,</div><div style="text-align:center;">Mưu lại tâm khi tha tự gian.</div><div style="text-align:center;">Hạnh hữu cao đài minh nguyệt kính,</div><div style="text-align:center;">Thỉnh lai đối chiếu phá cơ quan.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thọ lãnh của người phải liệu toan,</div><div style="text-align:center;">Lòng dối âm mưu tính kế gian.</div><div style="text-align:center;">May có trên cao gương sáng rỡ,</div><div style="text-align:center;">Gian nguy ứng hiện rõ hành tàng.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa phải có lý, có bệnh gặp thầy hay, danh phận chớ lo, nhưng đừng làm quấy, hôn nhân không gấp, có thai nghén đặng tốt, tin xa về đến, cầu tài có tài, nên giữ lòng chân chính thì có thần nhân phù hộ.</div><div>Sự tích: Khấu công nhậm chức Lôi Dương.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Người có chí thành thiện nguyện,</div><div style="text-align:center;">Thì trên cao trời chứng tấm lòng ngay.</div>
`
},

"082":{
title:"SỐ 082 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bỉ thử thù trung nhất bối hiền,</div><div style="text-align:center;">Khuyến quân đặc đạt dữ châu tuyền.</div><div style="text-align:center;">Thử thời tân chủ hoan tương hội,</div><div style="text-align:center;">Tha nhựt vương hầu khước tịnh kiên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đây đó một trong những bạn hiền,</div><div style="text-align:center;">Khuyên người khá gắng giữ lời nguyền.</div><div style="text-align:center;">Buổi nay chủ khách đồng vui hiệp,</div><div style="text-align:center;">Vương bá ngày sau sánh vai liền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Tài lợi đều có, gặp bậc đại nhân, kiện tụng đắc lý, có tin lành, có thai sanh trai, bệnh mau lành, hôn nhân hạp.</div><div>Xăm tốt lắm, cũng như sự tích ông Quách Hải Thô gặp ông Bao Công mới xử bà Lý Thần Phi bị gian thần làm hại phải trốn trong lò gạch trong 18 năm trời, lại mù mắt. Sau vua Tống Nhân Tông rước về và cầu khẩn ơn trên nên mẹ ông được khỏi bệnh mù mắt (Truyện Vạn Huê Lầu).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Hoàng thiên hữu nhãn,</div><div style="text-align:center;">Thiện ác đáo đầu,</div><div style="text-align:center;">Chung cuộc có báo ứng.</div>
`
},

"083":{
title:"SỐ 083 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tùy phận đường tiền phó chúc chiên,</div><div style="text-align:center;">Hà tu vọng tưởng khổ ưu tâm.</div><div style="text-align:center;">Chủ trương muôn hộ thành nan sự,</div><div style="text-align:center;">Bách tuế an nhàn đắc ký niên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">An phận tùy duyên bữa cháo rau,</div><div style="text-align:center;">Tham tâm ắt phải chịu lao đao.</div><div style="text-align:center;">Cửa nhà cải sửa thiệt là khó,</div><div style="text-align:center;">Trăm tuổi an nhàn được mấy năm.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi chớ tham, kiện tụng nên hòa, hôn nhân thận trọng, đi xa không thành, cầu tài đặng tốt, có bệnh được mạnh.</div><div>Xăm này như lúc Khổng Minh ở nơi Ngọa Long sơn an nhàn tầm đạo lý, sau rồi ông Lưu Bị thỉnh về làm quân sư (Tam Quốc).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Cây cao thì gió càng lay,</div><div style="text-align:center;">Càng ham danh vọng càng dày gian nan.</div>
`
},

"084":{
title:"SỐ 084 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Cá trung sự tự cánh phân nhiên,</div><div style="text-align:center;">Đương cuộc tu trí nhứt trước tiên.</div><div style="text-align:center;">Trường thiệt phụ nhân hưu khốc thính,</div><div style="text-align:center;">Lực hành lễ nghĩa yếu tâm kiên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trong đời nhiều việc rối rộn ràng,</div><div style="text-align:center;">Gặp cuộc biết toan tính mới hay.</div><div style="text-align:center;">Nữ nhân nhiều chuyện đừng nghe lấy,</div><div style="text-align:center;">Lễ nghĩa chặt lòng mới an thân.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa nên hòa, tài có chậm, cầu hôn nên xét kỹ, bệnh đặng mạnh, người đi xa sẽ có tin về, đừng nghe lời thiên hạ, có thai đặng bình an.</div><div>Tích xưa: Có người vì nghe lời vợ mà muốn hại anh em,chừng suy nghĩ lại thì ăn năn chẳng làm quấy nữa, sau được tiếng thiên hạ là công chính.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tà chính phân minh đại trượng phu.</div>
`
},

"085":{
title:"SỐ 085 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt xuân phong vũ chánh tiêu tiêu,</div><div style="text-align:center;">Thiên lý hành nhân khứ lộ diêu.</div><div style="text-align:center;">Di quả tựu đa quân đắc kế,</div><div style="text-align:center;">Như hà qui lô chuyến vô liêu.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mùa xuân mưa gió thật sầu bi,</div><div style="text-align:center;">Ngàn dặm đường dài bước người đi.</div><div style="text-align:center;">Bán buôn đặng nhiều tự đắc ý,</div><div style="text-align:center;">Về nhà tính lại chẳng lời chi.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Theo thánh ý thì người xin quẻ xăm này đừng quá bôn ba chẳng có lợi gì lắm, kiện nên hòa, cầu tài chớ tham, đi xa không thành, hôn nhân nên xét kỹ, bệnh nên đổi thầy giỏi, thi cử và công danh thì mỏng manh quá không chắc được.</div><div>Cũng như vợ của Dự Nhượng đi tìm Dự Nhượng mà không gặp chồng.</div><div>Xăm này đi xa không thành, và mong tin thì tin chẳng có.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tìm đâu cho thấy cố nhân!</div><div style="text-align:center;">Lấy câu vận mạng cõi lòng nhớ thương.</div><div style="text-align:center;">Số mạng phải sao chịu vậy.</div>
`
},

"086":{
title:"SỐ 086 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt ban hàng hóa hảo chiêu yên,</div><div style="text-align:center;">Tích thiếu thành đa tự phú nhiên.</div><div style="text-align:center;">Thường bá tha nhơn tị tự ký,</div><div style="text-align:center;">Quản tu nhựt hậu thắng kim triêu.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Một lô hàng hóa chất như đồi,</div><div style="text-align:center;">Góp ít thành nhiều giàu có thôi.</div><div style="text-align:center;">Thường đem người khác ra so sánh,</div><div style="text-align:center;">Ngày sau đắc thắng hơn bấy giờ.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Tài lợi có, kiện thưa đắc lý, đi xa thành, người xa sẽ về đến, bệnh đặng mạnh, hôn nhân hạp, thai nghén bình an, gặp quí nhân giúp đỡ.</div><div>Sự tích như anh lái buôn làm giàu gặp cơ hội.</div><div>Xăm này hạp tháng giêng , hai, ba.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tích thiểu thành đa,</div><div style="text-align:center;">Giàu lớn có mạng trời,</div><div style="text-align:center;">Giàu nhỏ bởi cần lao.</div>
`
},

"087":{
title:"SỐ 087 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Âm lý tường, khán quái nhĩ tào,</div><div style="text-align:center;">Châu trung địch quốc tiếu trung đao.</div><div style="text-align:center;">Phiên ly phẩu phá hồn vô sự,</div><div style="text-align:center;">Nhất chủng thiên sanh tích vũ mao.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trong tối kỹ nhìn người với ma,</div><div style="text-align:center;">Đồng thuyền đối nghịch chỉ hai ta.</div><div style="text-align:center;">Lũy rào gãy đổ cùng vô sự,</div><div style="text-align:center;">Cùng giống cánh lông trời tạo ra.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi chưa có coi chừng tiểu nhân ở bên mình, tuy tin người mà cũng nên đề phòng, cầu hôn nên xét kỹ, bệnh phải van vái ơn trên, đi xa không thành, trước xấu sau tốt.</div><div>Sự tích như hai người trước thù, sau lại kết thân và giúp đỡ nhau.</div><div>Xăm này hạp tháng giêng, hai và ba.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Khi thân, ngàn dặm cũng gần.</div><div style="text-align:center;">Khi giận, cách một tấm trần cũng xa.</div>
`
},

"088":{
title:"SỐ 088 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tùng tiền bá sự tổng đồ lao,</div><div style="text-align:center;">Tài kiến tân xuân thời tiệm tao.</div><div style="text-align:center;">Bách kế doanh cầu đô đắc ý,</div><div style="text-align:center;">Cánh tu thủ kỷ mạc tâm cao.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Bấy lâu trăm việc tính chưa xong,</div><div style="text-align:center;">Nay đến mùa xuân gặp vận thông.</div><div style="text-align:center;">Trăm kế mưu cầu đều toại chí,</div><div style="text-align:center;">Chớ tham đừng ỷ giữ lòng trong.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này Thánh ý nói rằng: lâu nay người toan tính nhiều việc mà chưa thành, nay gặp năm mới thì mọi sự được toại nguyện, cầu tài đặng tài, cầu bệnh mau mạnh, cầu quan thành, cầu hôn hạp, đi xa gặp bạn hiền, có thai bình an.</div><div>Xăm này hạp tháng giêng, hai và ba.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Phong lưu bỏ lúc dãi dầu,</div><div style="text-align:center;">Có cơn lao khổ, có ngày vinh quang.</div>
`
},

"089":{
title:"SỐ 089 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tôn tiền vô sự thả cao ca,</div><div style="text-align:center;">Thời vị lai thời nại nhược hà.</div><div style="text-align:center;">Bạch mã độ giang tuy nhật mộ,</div><div style="text-align:center;">Hổ đầu thành lý khán nguy nga.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Rảnh rang chén rượu lại ca bài,</div><div style="text-align:center;">Chưa gặp vận thời biết cậy ai.</div><div style="text-align:center;">Ngựa bạch qua sông tuy rằng khó,</div><div style="text-align:center;">Mà qua sông được mới là tài.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh có mà đến chậm, bệnh mạnh, người xa sẽ về, kiện thưa nên hòa, hôn nhân nên xét kỹ, buôn bán trung bình, Xăm này hạp tháng năm hay là năm Ngọ có tài lợi, hoặc có tin lành.</div><div>Sự tích: Mã Siêu là tướng của Tây Lương đánh với Quan Công té xuống ngựa, Quan Công là bậc anh hùng không nỡ giết người té ngựa, sau Mã Siêu cảm nghĩa qui thuận Quan Công (Tam Quốc).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tùy thời quới dỏng tri vô địch.</div><div style="text-align:center;">(Anh hùng mới biết chí của anh hùng)</div>
`
},

"090":{
title:"SỐ 090 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Không động thành lý sự như ma,</div><div style="text-align:center;">Vô sự như quân hữu kỷ gia.</div><div style="text-align:center;">Khuyến nhữ bất tu cần trí đảo,</div><div style="text-align:center;">Đồ lao sanh sự khổ tư ta.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thế đời bến khổ chớ nài hà,</div><div style="text-align:center;">Vô sự như người có mấy ai.</div><div style="text-align:center;">Khuyên đó chớ nên cầu khẩn đạo,</div><div style="text-align:center;">Thất công luống nhọc rất thiết tha.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện nên hòa là hay, tài có ít, hôn nhân hạp, bệnh có thể mạnh, tin xa chưa về, đi xa không thành. Trăm sự phải nên chậm rãi mới thành công.</div><div>Sự tích: Dương Văn Quan, là tướng có tài mà phải bị giặc vây, sau nhờ có viện binh đến cứu thoát.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tiên ưu hậu hỉ phùng.</div><div style="text-align:center;">(Trước thì lo rầu, sau vui mừng)</div>
`
},

"091":{
title:"SỐ 091 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phật thuyết đào sa thủy kiến kim,</div><div style="text-align:center;">Chỉ duyên quân tử bất lao tâm.</div><div style="text-align:center;">Vinh hoa tổng đắc thi thư hiệu,</div><div style="text-align:center;">Diệu lý công phu tử tế tầm.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Phật nói đãi cát mới được vàng,</div><div style="text-align:center;">Làm người quân tử khó an nhàn.</div><div style="text-align:center;">Giàu sang phú quí do kinh sử,</div><div style="text-align:center;">Gắng sức sớm khuya mới được nhàn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Theo Thánh ý mọi việc trước cực khổ sau mới sung sướng, người đãi vàng ở trong cát ý nói phải gắng công nhiều mới nên, kiện thưa có lý, bệnh chậm mạnh, công danh có mà cực nhọc lắm, tài lợi có phải lắm công phu.</div><div>Sự tích như Triệu Tử Đương dương Trường bản, vào sanh ra tử mà nên danh phận. Người anh hùng thục nữ thường gặp cảnh gay go.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Anh hùng giữa chốn trần ai,</div><div style="text-align:center;">Những phường giá áo túi cơm sá gì.</div>
`
},

"092":{
title:"SỐ 092 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kim niên hòa cốc bất như tiền,</div><div style="text-align:center;">Vật giá huyên thăng bội bá niên.</div><div style="text-align:center;">Tai số lưu hành đa dịch lệ,</div><div style="text-align:center;">Nhứt dương phục hậu thủy an toàn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm nay lúa thóc kém năm rồi,</div><div style="text-align:center;">Vật giá còn thêm mắc gấp đôi.</div><div style="text-align:center;">Số phận vận tai đa tật bệnh,</div><div style="text-align:center;">Mùa đông sắp đến được an toàn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này có hơi xấu, xăm nói nghĩa bao trùm, nhưng người xin được quẻ này mà nhằm ba tháng cuối năm là tháng 10, 11 và tháng chạp thì tốt lắm, là do câu "Nhứt dương phục hậu thủy an toàn".</div><div>Sự tích: một nhà buôn bán vàng ngọc vì lỗ lã muốn đổi nghề, nhưng dây dưa mãi đến cuối năm mới bán được thạnh lợi, rồi giữ nghề cũ được bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tiền hung mà hậu kiết.</div>
`
},

"093":{
title:"SỐ 093 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xuân lai vũ thủy thái liên miên,</div><div style="text-align:center;">Nhập hạ tình can vũ hựu khiên.</div><div style="text-align:center;">Tiết khí trực giao tam phục hậu,</div><div style="text-align:center;">Hỉ phùng bàng bái túc điền viên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mùa xuân mưa gió tiếp liên miên,</div><div style="text-align:center;">Qua Hạ không mưa lại ưu phiền</div><div style="text-align:center;">Tiết khí qua Thu hòa miên nhuận,</div><div style="text-align:center;">Mừng vui nước nổi ngập ruộng vườn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này như xin về bệnh thì thánh ý nói bệnh không chừng khi hết khi trở, khó khăn lắm, nên cầu khẩn chí thành lắm mới được, cầu tài ít, cầu công danh chậm, đi xa không thành, kiện cáo thất bại, hôn nhân trắc trở, gia đạo bất an, phải ăn ở hiền lương mà cầu ơn trên thì qua mùa thu và đông mới bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tích thiện họa tề tiêu.</div><div style="text-align:center;">(Làm lành họa phải hết)</div>
`
},

"094":{
title:"SỐ 094 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhất ban khí dụng dữ nhân đồng,</div><div style="text-align:center;">Xảo trác luân dư tử tượng công.</div><div style="text-align:center;">Hữu duyên phàm sự thả tùy phận,</div><div style="text-align:center;">Thu đông phương ngộ quí nhân ông.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đây đó vật dùng cũng giống nhau,</div><div style="text-align:center;">Khéo hay gọt giũa thợ tài cao.</div><div style="text-align:center;">Mọi việc phải tùy theo duyên phận,</div><div style="text-align:center;">Thu đến qua Đông quí nhân chào.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này hạp mọi việc từ tháng sáu đến tháng chạp. Kiện có lý, bệnh gặp thầy, cầu có tai, đi xa thành, hôn nhân hạp, buôn bán khá, tin lành ở xa về đến.</div><div>Sự tích: Đề Kết qua nhà trưởng già.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Việc nào nên tính thì nên tính,</div><div style="text-align:center;">Kẻo nữa gặp xung khó trở tay.</div>
`
},

"095":{
title:"SỐ 095 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tri quân tụ lý hữu ly châu,</div><div style="text-align:center;">Sinh bất phùng thần hựu cưỡng đồ.</div><div style="text-align:center;">Khả thán đầu lư dĩ như hứa,</div><div style="text-align:center;">Nhi kim phương đắc quí nhân phò.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Biết người trong túi có báu châu,</div><div style="text-align:center;">Sanh phải lỗi thời khó cưỡng cầu.</div><div style="text-align:center;">Than thở ngọc kia còn được giá,</div><div style="text-align:center;">Quí nhân gặp đặng chẳng lo âu.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Theo Thánh ý thì người xin quẻ xăm này có tài và có lòng tốt mà chưa gặp thời thì ráng ẩn nhẫn mà đợi cơ hội sẽ đến.</div><div>Cầu tài chậm, đi xa gặp quí nhân, bệnh mau lành, cầu hôn xét kỹ càng, Xăm này hạp tháng ba và ngày thìn cùng là năm Thìn thì tốt lắm. Xăm này xin việc hôn nhân thì phải hơn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Minh quân lương tể tao phùng dị,</div><div style="text-align:center;">Tài tử giai nhân tế ngộ nan.</div>
`
},

"096":{
title:"SỐ 096 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hôn nhân tử tức mạc hiềm trì,</div><div style="text-align:center;">Đản bả tinh thần trượng Phật trì.</div><div style="text-align:center;">Tứ thập niên tiền tu báo ứng,</div><div style="text-align:center;">Công danh hành mãn hữu hương nhi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Việc nhà tuy muộn chớ than phiền,</div><div style="text-align:center;">Cứ giữ lòng gìn cầu Phật Tiên.</div><div style="text-align:center;">Bốn chục năm dư trời cho phước,</div><div style="text-align:center;">Giàu sang danh cả có con hiền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Theo Thánh ý thì người xin quẻ xăm này đừng nên than thở sự muộn màng về con cái hay là công danh, hoặc trong nhà có bệnh hoạn chi thì ráng mà cầu Trời Phật thế nào cũng được như nguyện.</div><div>Như thuở xưa có một người 46 tuổi mới cầu con cũng xin được quẻ này, quả sau có con mà lại làm ăn phát đạt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Cam la sớm gặp cũng xinh,</div><div style="text-align:center;">Muộn như Khương Tử cũng vinh một đời.</div><div style="text-align:center;">(Cam La 13 tuổi có công danh,</div><div style="text-align:center;">ông Tử Nha 72 tuổi mới nên sự nghiệp)</div>
`
},

"097":{
title:"SỐ 097 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngũ thập công danh tâm dĩ hôi,</div><div style="text-align:center;">Na tri phú quí bức nhân lai.</div><div style="text-align:center;">Cánh hành hảo sự tồn phương thốn,</div><div style="text-align:center;">Thọ tỉ cương lăng vị đỉnh đài.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm chục công danh đã hết mong,</div><div style="text-align:center;">Nào hay phú quí đến thinh không.</div><div style="text-align:center;">Giữ gìn lòng tốt tu tâm đức,</div><div style="text-align:center;">Phước thọ lộc quyền con cháu đông.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này cầu tài có, cầu bệnh mạnh, cầu hôn hạp, đi xa gặp tri kỷ, có tin xa về</div><div>Cũng như sự tích ông Châu Mãi Thần 50 tuổi mới được công danh, trong lúc ông nghèo vợ bỏ, chừng ông ông được danh phận thì vợ xin trở lại, ông bảo múc nước đổ xuống đất như hốt lại được thì ở lại với ông, người vợ xấu hổ đau rồi chết (Đông Châu Liệt Quốc).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thấy sang mà cũng đừng cao vọng,</div><div style="text-align:center;">Chậm rãi trời cho cũng có ngày.</div>
`
},

"098":{
title:"SỐ 098 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kinh doanh nhật xuất phí tinh thần,</div><div style="text-align:center;">Nam bắc bôn trì vận vị tân.</div><div style="text-align:center;">Ngọc thố giao thời đương đắc ý,</div><div style="text-align:center;">Kháp như khô mộc tái phùng xuân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Kinh doanh thế cuộc tổn tinh thần,</div><div style="text-align:center;">Bôn ba Nam Bắc chưa có phần.</div><div style="text-align:center;">Tới thời gặp Mẹo đều như ý,</div><div style="text-align:center;">Như thể cây khô phát gặp xuân.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này Thánh ý có khuyên người nên chậm rãi thế nào cũng có tài lợi công danh, đi xa thành, bệnh mạnh.</div><div>Sự tích như Tiết Nhân Quí khi chưa gặp thời nghèo cực, khi đắc thời làm đến nguyên soái thọ chức Bình Liêu Vương, vinh hiển giàu sang (Tiết Nhơn Quí chinh Đông).</div><div>Xăm này hạp tháng hai, và năm Mẹo hay là ngày Mẹo trong mỗi tháng (trong mỗi tháng cứ 10 ngày thì có một ngày mẹo).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Cây cổ thụ, khách anh hùng,</div><div style="text-align:center;">Ngàn năm cùng với non sông chẳng già.</div>
`
},

"099":{
title:"SỐ 099 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quí nhân tao ngộ thủy vân hương,</div><div style="text-align:center;">Lảnh đạm giao tình tư vị trường.</div><div style="text-align:center;">Huỳnh các khai thời diên cố khách,</div><div style="text-align:center;">Hoa lưu ứng đắc sậu khang trang.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Quí nhân gặp gỡ chốn non sông,</div><div style="text-align:center;">Đạm bạc giao tình rất mặn nồng.</div><div style="text-align:center;">Lầu các yến viên mừng bạn cũ,</div><div style="text-align:center;">Người hay của quí vận hanh thông.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, danh lợi có, bệnh mau mạnh, hôn nhân hạp, kiện đắc thắng, người xa có tin về.</div><div>Sự tích: Bá Lý Hề đi lập công danh vì mắc ràng buộc không trở về quê hương được. Vợ dẫn mẹ đi tìm, sau mới gặp nhau, vợ chồng đoàn tụ rất vui vẻ (Đông Châu Liệt Quốc).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Hết cơn bỉ cực đến hồi thới lai,</div><div style="text-align:center;">Trăm năm chồng vợ hài hòa.</div>
`
},

"100":{
title:"SỐ 100 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngã bổn thiên tiên lôi vũ sư,</div><div style="text-align:center;">Cát hung họa phúc ngã tiên tri.</div><div style="text-align:center;">Chí thành đảo chúc giai linh ứng,</div><div style="text-align:center;">Trừu đắc chung thiêm bá sự nghi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cai quản nhân gian vốn một ta,</div><div style="text-align:center;">Tiên tri họa phước cũng là ta.</div><div style="text-align:center;">Chí thành khẩn vái nên linh nghiệm,</div><div style="text-align:center;">Xin được xăm chót (100) việc hòa.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm số 100 này xin miễn bàn vì người nào xin được quẻ này thì trăm sự trăm nên, thái bình vĩnh viễn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thiên trường địa cửu,</div><div style="text-align:center;">Nhơn vật khương an.</div>
`
}

},

THANH_MAU:{
"001":{
title:"SỐ 1 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thiên xích phù đồ bảo tháp thành</div><div style="text-align:center;">Cao phong đỉnh thượng lập đình đình</div><div style="text-align:center;">Thời nhân mạc tác tầm thường hữu</div><div style="text-align:center;">Bất thị thần tiên nan giải đăng</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tháp cao ngàn thước vững như thành</div><div style="text-align:center;">Nguy nga đứng tại đỉnh non xanh</div><div style="text-align:center;">Người đời chớ tưởng tầm thường quá</div><div style="text-align:center;">Nào phải Thần Tiên khó vượt tranh</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phước bất kỳ đắc.<br>Phú bất kỳ kiêu.<br>Tri mãn tri túc.<br>Chư họạ tiềm tiêu.<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Có phước không được chắc.<br>Giàu sang chớ tự phụ.<br>Lòng biết đủ là quí.<br>Tai họạ sẽ tiêu trừ.<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành Thổ, các việc không được tốt cho lắm. Kiện thưa thất bại, gia trạch bình an, trăm điều phải lo tu nhân tích đức, cầu tài bình thường.
Gắng làm việc thiện, tích thêm công đức, ví như cái tháp nguy nga trên tay đức Phật, dầu cho Thần Tiên cũng chẳng lên tới được, huống chi là người thường.
`
},

"002":{
title:"SỐ 2 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thu vi nhất chiến kiêu hoành phi</div><div style="text-align:center;">Tiện bổng kim thư thượng đế kinh</div><div style="text-align:center;">Thử tế kim môn hảo tiêu tức</div><div style="text-align:center;">Khứ bố y hồi hoán cẩm y</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Phòng thu vang vọng cú bay ngang</div><div style="text-align:center;">Tay viết phong thư trình đế hoàng</div><div style="text-align:center;">Ngay lúc tin vui đăng khoa bảng</div><div style="text-align:center;">Vinh quy áo gấm mặc xênh xang</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quân tử nhược linh.<br>Văn thái khả quan.<br>Bố y môn xuất.<br>Cẩm y tựu hoán.<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Công danh kiếm đặng.<br>Sang giàu chói rạng.<br>Khi đi áo vải.<br>Áo gấm về làng.<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như lúc Tô Tần làm thuyết khách, đến ngày được vinh quy phú quí trở về, đeo thẻ ngà mão vàng, tước phẩm cao sang.
Người xin được quẻ này rất tốt, công danh mãn nguyện, tài lợi như ý, việc hôn nhân thì không được tốt, phải phòng khẩu thiệt, bệnh căn lâu thuyên giảm.
`
},

"003":{
title:"SỐ 3 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Mãn viên đào lý chánh khai thì</div><div style="text-align:center;">Thiển bạch thâm hồng sắc tổng nghi</div><div style="text-align:center;">Hà dĩ đông phong nhược tương đố</div><div style="text-align:center;">Hiểu lai chiết khứ tối cao chi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đang lúc khắp vườn nở lý đào</div><div style="text-align:center;">Nhạt đậm trắng hồng đẹp biết bao</div><div style="text-align:center;">Gió đông sao lấy lòng ganh ghét</div><div style="text-align:center;">Sáng hừng thổi đứt gãy cành cao</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Hoa phát tao phong<br>Bá sự vị toại<br>Hôn nhân bất thành<br>Cầu tài cầu lợi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hoa nở gặp gió dông<br>Trăm việc chẳng ưng lòng<br>Hôn nhân không thành tựu<br>Cầu tài lợi đừng mong<br></td></tr></table><br><b>Lời bàn:</b><br>Người xin được quẻ xăm này nên cẩn thận, mọi việc đều xấu. Tỉ như Hàn phu nhân nâng niu vườn bông, chẳng dè sáng ra bị gió mưa thổi ngã tơi tả, làm cho mất sự hứng thú.
Việc hôn nhân chẳng nên tính, tháng giêng đến tháng ba còn khá, qua đến hạ thì xấu, cầu tài chẳng toại ý, lại trong nhà có người bệnh, kỵ nhất là con trưởng nam, lục giáp trước gái sau trai, lo cầu Trời Phật hoá lành.
`
},

"004":{
title:"SỐ 4 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bách hoa phong vũ bán ưu sầu</div><div style="text-align:center;">Vạn sự vô qua thả trục lưu</div><div style="text-align:center;">Tạc dạ đăng hoa tuy báo hỷ</div><div style="text-align:center;">Đồ nhiên vi ngã triển mi đầu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Sự đời muôn việc mãi trôi trôi</div><div style="text-align:center;">Trăm hoa mưa gió tả tơi rồi</div><div style="text-align:center;">Đèn hoa đêm trước đưa tin tốt</div><div style="text-align:center;">Uổng phí chau mày khổ kéo lôi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quải trung chủ sự<br>Bán hỷ bán ưu<br>Đăng hoa báo hỷ<br>Đồ triển mi đầu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Quẻ này phải hiểu cho<br>Nửa mừng lại nửa lo<br>Đèn đêm tuy tin tốt<br>Lòng buồn vẫn rối mò<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ này thuộc về hành thuỷ. Tỉ như nhà Hán người Lý - Linh có vợ đẹp, sau đi chinh chiến bị vây, song cũng giữ được sự thuỷ chung, dầu người kêu gả con cho nhưng chẳng chịu, đến khi trở về phu thê hoà hợp.
Người xin đặng quẻ xăm này, trăm việc chẳng qua do số trời, trước khó sau dễ, việc hôn nhân ban đầu trắc trở sau thành, gắng cẩn thận khấn cầu Trời Phật, hết lòng lo lắng mới nên.
`
},

"005":{
title:"SỐ 5 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phiên phiên tiên hạc dục lăng không</div><div style="text-align:center;">Chỉnh loát linh mao sấn hiểu phong</div><div style="text-align:center;">Vạn lý ngang tàng tuy hữu lý</div><div style="text-align:center;">Tranh như nhân dục ám trương cung</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tiên hạc nhởn nhơ vỗ cánh bay</div><div style="text-align:center;">Trời cao lồng lộng vượt tầng mây</div><div style="text-align:center;">Ngàn dặm ấp ôm bao chí cả</div><div style="text-align:center;">Giương cung người ngắm hại thân này</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Dục tri tiêu tức<br>Khán biên kỳ nghi<br>Chỉ phòng ám tiễn<br>Bất khả tự khi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tin tức nếu muốn hay<br>Diệu kỳ sẽ đến ngay<br>Phòng người ganh ám hại<br>Lơ là chịu lỗi sai<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chim hạc của đức Thọ Tinh Quân. Lòng muốn chấp cánh bay tận trời mây, nhưng còn sợ kẻ giương cung chờ sẵn. Người xin được quẻ xăm này, nên gắng đề phòng kẻo bị người xấu mưu hại, tự thân có bệnh nên lo trị thuốc, mùa hạ thì tốt hơn các tiết khác.
`
},

"006":{
title:"SỐ 6 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phong vân hội hổ vấn vinh hoa</div><div style="text-align:center;">Lợi lộ dương danh tín hữu nhai</div><div style="text-align:center;">Thí vấn bàn trung tranh nhất trịch</div><div style="text-align:center;">Hô lư kinh tọa mãn bàn hoa</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Phú quí hợp như gió vờn mây</div><div style="text-align:center;">Thanh danh tài lợi có tin ngay</div><div style="text-align:center;">Xúc xắc mâm vàng gieo muốn biết</div><div style="text-align:center;">Vui mừng tài bảo thắng tràn đầy</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phong vân hội hiệp<br>Thừa thời canh cãi<br>Kim bàn nhất trịch<br>Hảo âm hát thái<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Gió mây hội ngộ qua<br>Đổi thay tốt cửa nhà<br>Mâm vàng gieo canh bạc<br>Thắng về mãi hát ca<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như Tôn chân nhân trước chữa bệnh cho cọp, sau trị cho rồng, long hổ hội đáng mừng. Thời vận đã đến, cầu tài lợi thì toại nguyện. Các việc đều tốt, trừ mùa hạ và đông thì không được tốt cho lắm.
`
},

"007":{
title:"SỐ 7 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Biên châu thừa lãng hạ ba thương</div><div style="text-align:center;">Vạn lý phù vân khứ tác thương</div><div style="text-align:center;">Bách hoá đê ngang tùng tích súc</div><div style="text-align:center;">Bội thâu tài bảo phú hoàn hương</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xuồng nhỏ xuôi dòng chẻ sóng cao</div><div style="text-align:center;">Mây bay ngàn dặm cứ ra vào</div><div style="text-align:center;">Hàng hoá bán buôn thêm tích luỹ</div><div style="text-align:center;">Tài vật mang về nặng biết bao</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vấn nhất đắc nhị<br>Thiểu khứ đa lai<br>Công tư doản hợp<br>Tối lợi cầu tài<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hỏi một sẽ được hai<br>Ít đi nhiều tới ngay<br>Công tư đều thông suốt<br>Tốt tươi cầu lợi tài<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như ông Phạm Lãi ngồi thuyền chơi ngũ hồ, người xin đặng quẻ xăm này tài lợi thì hợp, công danh chẳng tốt cho lắm, sớm nở tối tàn. Đường buôn bán thịnh vượng, mùa thu đông rất tốt, tiết hạ bình thường.
`
},

"008":{
title:"SỐ 8 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lưỡng gia vô sự khởi tranh đoan</div><div style="text-align:center;">Giáo tụng giáo hoà thả vị nhàn</div><div style="text-align:center;">Giã sử công đình vô phẫu chế</div><div style="text-align:center;">Tương vi khắc mộc xảo vi gian</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Hai nhà tranh cãi cứ miên man</div><div style="text-align:center;">Kiện thưa rối rắm chẳng an nhàn</div><div style="text-align:center;">Công đường lý lẽ chưa phân rõ</div><div style="text-align:center;">Biện minh dẫu khéo cũng là gian</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Khẩu thiệt tương tranh<br>Gia đạo bất ninh<br>Cầu tài bất toại<br>Hôn nhân bất thành<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Miệng lưỡi đã cãi tranh<br>Gia đạo chẳng an lành<br>Cầu tài không toại ý<br>Hôn nhân kết không thành<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như trong truyện " nhị thập tứ hiếu ". Người Đinh Lăng vì nhớ cha mẹ nên tạc tượng cây lên mà thờ phụng. Khi đi vắng vợ ở nhà lấy kim chích vào tay tượng ra máu. Đinh Lang về hay việc liền bỏ vợ. Người xin được quẻ xăm này, gia đạo không yên ổn, mọi việc đều không như ý, cẩn thận hoạ tai, các việc đều xấu.
`
},

"009":{
title:"SỐ 9 TRUNG BÌNH",
content:`
