<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thanh sơn khảm hạ nhất chi tòng</div><div style="text-align:center;">Vi đống vi lương khủng vị trung</div><div style="text-align:center;">Hành tiền chỉ hiệp vấn khu sử</div><div style="text-align:center;">Vi quân lục nguyệt hoán thanh phong</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Núi cao đốn ngã một cây tòng</div><div style="text-align:center;">Kèo cột chẳng vừa cũng phí công</div><div style="text-align:center;">Đường có thuận thông như có hỏi</div><div style="text-align:center;">Tháng sáu hãy chờ gió mát trong</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vật vị đắt giá<br>Thả nghi đãi thủ<br>Nhược vấn hanh thông<br>Trực đãi hạ thu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Giá hàng vẫn đứng yên<br>Chờ đợi chớ ưu phiền<br>Thuận thông như có hỏi<br>Thu hạ tốt tới liền<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như vua Hán võ đế đốn cây thông trên núi về làm cung điện, chẳng dè cây rất xấu không dùng vào đâu được. Chẳng khác nào ý mình, muốn chọn người hay mà gặp toàn kẻ dốt, trăm việc đều không được tốt, làm việc gì nên đề phòng cẩn thận, tháng sáu trở đi mới được như ý, tuy có quí nhân phò giúp song phải xét dò kỷ lưỡng mới làm.
`
},

"010":{
title:"SỐ 10 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Diên đao quát thể chung vô nhẫn</div><div style="text-align:center;">Thạch khánh tần xao khỉ hữu thanh</div><div style="text-align:center;">Tróc nguyệt cao không kiêm bổ ảnh</div><div style="text-align:center;">Thuỳ tri đáo để thị hư danh</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Gõ hoài khánh đá có kêu không</div><div style="text-align:center;">Dao cầm tự cắt sao cam lòng</div><div style="text-align:center;">Trăng sáng trên cao theo bắt bóng</div><div style="text-align:center;">Chỉ là hư ảo chớ chờ trông</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vấn sự bất thành<br>Hôn nhân bất tranh<br>Hoạ bỉnh xung cơ<br>Tổng thị hư không<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hôn nhân chớ đợi trông<br>Bánh vẽ sao no lòng<br>Các việc không thành tựu<br>Cuối cùng chỉ hư không<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, tỉ như Tào Tháo cầm quân đánh giặc, đang lúc hạn hán, quân binh ai cũng đang khát nước. Tào Tháo bèn nghĩ kế nói: - Phía trước có rừng mai. Nghe xong ai nấy đều thèm mà không khát nữa .
Quẻ này không được tốt, ví lúc đói mà gặp bánh vẽ, khánh đá gõ không kêu, như cầm dao tự cắt mình, mọi việc nên cẩn thận.
`
},

"011":{
title:"SỐ 11 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Dã lão truyền âm sự vị ngoa</div><div style="text-align:center;">Chủ nhân tiên tiếu hậu kha kha</div><div style="text-align:center;">Cầm thư huyền đoạn giao nan tục</div><div style="text-align:center;">Vi kính trần thâm cữu bất ma</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người rừng đưa tới lắm tin sai</div><div style="text-align:center;">Trước cười sau chịu cảnh bi ai</div><div style="text-align:center;">Dây đàn đã đứt keo sao nối</div><div style="text-align:center;">Bụi kính bám lâu khó rửa mài</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Tiên tiếu hậu khấp<br>Hỷ bi vị túc<br>Tật bệnh nan du<br>Tất sanh hiếu phục<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trước cười sau lệ rơi<br>Buồn vui cứ rối bời<br>Tật bệnh chưa qua khỏi<br>Người thân chịu xa rời<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc hành thuỷ, người xin được quẻ này, các việc điều xấu cả, như dây đàn đã đứt, lấy keo sao gắn lại cho được, gương đã mờ khó lau chùi cho sáng tỏ. Mùa xuân hạ còn khá, đến mùa đông thì chẳng tốt, cần phòng người tiểu nhân hãm hại. Bệnh tật nguy hiểm khó mạnh lành, khá cầu trời khẩn Phật, họa chăng ban phước giúp tai họa tan dứt.
`
},

"012":{
title:"SỐ 12 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lưỡng cảnh tương tranh tất hữu thương</div><div style="text-align:center;">Tranh như nhẫn nhục thắng tương cương</div><div style="text-align:center;">Nhược nhiên bế khẩu thâm tàng thiệt</div><div style="text-align:center;">Tự hữu bàn nhân thuyết đoản trường</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Hai bên tranh cãi mất tình thương</div><div style="text-align:center;">Chi bằng nhẫn nhịn cứ như thường</div><div style="text-align:center;">Nên lúc miệng im cùng nuốt tiếng</div><div style="text-align:center;">Bỏ mặc người bên nói nhiễu nhương</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Lưỡng cảnh tương tranh<br>Tất hữu thương tổn<br>Bế khẩu tàng thiệt<br>Nhân thuyết đoản trường<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hai nhà tranh cãi hoài<br>Cảm tình sẽ mất ngay<br>Nên nhịn lời nuốt tiếng<br>Người nói bỏ ngoài tai<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm nay thuộc về hành thuỷ, tỉ như người Lưu Kỳ bị mẹ ghẻ đố kỵ luôn tìm cách hãm hại, bèn nghe theo lời Lưu Bị và Khổng Minh ra trấn nhậm ngoài biên cương, nên tránh được tai hoạ. Người xin được quẻ xăm này khá nên giữ mình, trăm điều phải nhẫn nhịn mới tránh bị mang hại. Các việc đợi thời đừng nóng vội mà thất bại.
`
},

"013":{
title:"SỐ 13 THƯỢNG THƯỢNG ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tướng quân anh dự quả vô song</div><div style="text-align:center;">Đàm tiếu bình nhung tác chánh ban</div><div style="text-align:center;">Nam bắc đông tây giai uý phục</div><div style="text-align:center;">Bất lao binh mã tự qui hàng</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tướng quân danh tiếng đã lên cao</div><div style="text-align:center;">Dẹp giặc biên cương giữ vững trào</div><div style="text-align:center;">Nam bắc đông tây đều khiếp sợ</div><div style="text-align:center;">Giặc hàng không động cuộc binh đao</div><div style="text-align:center;">SỐ 13 THƯỢNG THƯỢNG</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhân năng hữu chí<br>Danh lợi toại ý<br>Bất địch nhi hàng<br>Bất nộ nhĩ uý<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Có chí phải vững vàng<br>Danh lợi mới cao sang<br>Không khổ công chinh chiến<br>Giặc sợ tự theo hàng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, ví như Ban Siêu cầm quân đánh giặc, không cần nhọc công binh sĩ, vận chuyển khí tài, quân lương. mà đi đến đâu các nơi đều theo quy hàng. Người xin được quẻ xâm này trăm việc đều tốt, công danh tài lợi thoả nguyện, phú quí giàu sang. Riêng việc hôn nhân thì không tốt cho lắm
`
},

"014":{
title:"SỐ 14 HẠ HẠ ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Gian sử chân thành tiện trượng phu</div><div style="text-align:center;">Thiên nhai hải giác tứ tham ngư</div><div style="text-align:center;">Bất như tác tảo hoàn hương tĩnh</div><div style="text-align:center;">Hà lãng ba thần yếu hại thân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Việc giữa người hiền với tiểu nhân</div><div style="text-align:center;">Biển xa tham cá bỏ ao gần</div><div style="text-align:center;">Nên sớm quay về nơi chốn cũ</div><div style="text-align:center;">Tránh sóng cuốn vào hại tấm thân</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phù danh phù lợi<br>bất khả cẩu tham<br>Tham đồ bất yếm<br>Gia tao hoạnh hoạ<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Danh lợi tựa mây bay<br>Tham lam cứ tính hoài<br>Mãi đem lòng ôm ấp<br>Cửa nhà vướng hoạ tai<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, tỉ như Sở Hạng Vương không nghe lời Phạm Tăng, coi thường Lưu Bang, không chịu trọng dụng Hàn Tín. Sau bị thất bại mà tự vẫn tại sông Ô Giang. Người xin đặng quẻ xăm này, công danh tài lợi đều trôi theo dòng nước, làm việc gì phải cẩn thận, đừng quá nóng vội.
`
},

"015":{
title:"SỐ 15 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xuân đáo viên lâm vạn vật sanh</div><div style="text-align:center;">Cũng trùng khải hộ nghĩa cầu thân</div><div style="text-align:center;">Nhân tri nam bắc đông tây khứ</div><div style="text-align:center;">Đắc xứ ứng tu ngộ quí nhân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xuân hoa đua nở khắp trong sân</div><div style="text-align:center;">Kiến vui dế hát tiếng vang rần</div><div style="text-align:center;">Đi dạo tự do theo bốn hướng</div><div style="text-align:center;">Rạng rỡ nơi này gặp quí nhân</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thời lai vận hanh<br>Cùng khuất đắc thân<br>Đông tây nam bắc<br>Đáo xứ phùng xuân<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Thời vận đã thông hanh<br>Nghèo qua nay đạt thành<br>Dạo vui chơi khắp chốn<br>Nơi nào cũng xuân lành<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như Lưu Võ Tích xem hoa đào trong vườn đua nở lúc xuân. Người xin được quẻ xăm này, đã qua cơn bỉ cực đến hồi thái lai, công danh chói rạng tài lợi giàu sang, vinh hoa phú quí. Trăm việc đều tốt, làm chuyện gì cũng đắc thắng, mùa Xuân Hạ là tốt nhất, Thu Đông tầm thường.
`
},

"016":{
title:"SỐ 16 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Dương cương dụng sự chánh âm tiêu</div><div style="text-align:center;">Nhị đức đương quyền tán bách yêu</div><div style="text-align:center;">Đương thị đại minh trung chánh chiếu</div><div style="text-align:center;">Yêu nương khiêu dịch bất vi kiều</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Việc đang dương thịnh lướt âm suy</div><div style="text-align:center;">Cao đức tà ma phá được gì</div><div style="text-align:center;">Ngay lúc giữa trưa vầng nắng chiếu</div><div style="text-align:center;">Yêu quỷ quấy rầy lẫn tránh đi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Đại minh chánh chiếu<br>Đắc thắng nghinh tường<br>Tật bệnh tiệm tiêu<br>Chư ác tiềm tàng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Nắng tươi chiếu xung quanh<br>Thắng lợi đón tốt lành<br>Tật bệnh mau tan dứt<br>Họa tai cũng tan nhanh<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như ông Bao Công khi thẩm án, bao nhiêu kẻ gian tà yêu mị đều phải tránh xa, người xin đặng quẻ xăm này, phước đã đến không lo tổn hại chi cả, lại khiến tiểu nhân kính phục, trăm việc đều nên, công danh toại chí, bệnh căn thuyên giảm. Làm việc phải phân định đúng sai, mới đắc thắng toàn vẹn.
`
},

"018":{
title:"SỐ 18 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Sầu vân hận vũ tác âm minh</div><div style="text-align:center;">Nhất tuý hoa tiền hoán bất tinh</div><div style="text-align:center;">Nhược vấn quí nhân năng an phẩu</div><div style="text-align:center;">Vi thuỳ du thuỷ dĩ đông khuynh</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mây buồn mưa mãi kéo âm u</div><div style="text-align:center;">Vườn hoa say ngã ngủ lu bù</div><div style="text-align:center;">Thân có an lành như muốn hỏi</div><div style="text-align:center;">Nước nghiêng chảy cạn sao ngao du</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cầu tài bất toại<br>Quan tai vị thối<br>Tật bệnh vị dự<br>Bách sự ám muội<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cầu tài chẳng toại lòng<br>Kiện thưa chớ chờ trông<br>Bệnh tật chưa thuyên giảm<br>Trăm việc khó chất chồng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, tỉ như lúc vua Tương Vương nằm mộng tại núi Vu Sơn, thấy Thần Nữ xưng mình sớm làm mây, chiều làm mưa. Người xin đặng quẻ xăm này chẳng nên say đắm việc hoa nguyệt, công danh tài lợi trôi theo dòng nước, phải năng cúng vái Trời Phật mới được hoạ tan phước đến, trăm điều nên cẩn thận.
`
},

"019":{
title:"SỐ 19 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thiên tử đoan cư chánh diện Nam</div><div style="text-align:center;">Lưỡng ban văn võ đế huyền đàm</div><div style="text-align:center;">Tử chi điện nội tường vân ế</div><div style="text-align:center;">Cầu tự tiêu phòng đắc mỹ nam</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Quay mặt hướng nam ngự điện rồng</div><div style="text-align:center;">Văn võ hai hàng nhận thụ phong</div><div style="text-align:center;">Vua quan bàn luận vui hoà nhã</div><div style="text-align:center;">Sanh con trai đẹp ở trong phòng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quan môn thái bình<br>Tư môn hữu hỷ<br>Chiêm thai sanh nam<br>Chiêm tụng hữu lý<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tới quan được ấm yên<br>Kiện thưa thắng lý liền<br>Có thai sanh quí tử<br>Gia đạo tốt triền miên<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, như chuyện vua Đường Minh Hoàng và Dương Quí Phi, rất yêu chuộng An Lộc Sơn, người xin được quẻ xăm này, làm điều chi cũng tốt, nhưng phải thận trọng, cầu tài công danh toại ý, gia đạo bình an.
`
},

"020":{
title:"SỐ 20 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phân phân Nam Bắc lộ kỳ đa</div><div style="text-align:center;">Xúc cảnh hôn mê chẩm nại hà</div><div style="text-align:center;">Hốt ngộ quí nhân tương chỉ dẫn</div><div style="text-align:center;">Thử thân phương hỷ xuất trần la</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nam Bắc đôi đường nghĩ rối ren</div><div style="text-align:center;">Lo lắng như đêm thiếu ánh đèn</div><div style="text-align:center;">Bỗng gặp quí nhân ra chỉ giúp</div><div style="text-align:center;">Thân này lại bước vượt đường quen</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Như nhân ám muội<br>Tức vô sở kiến<br>Hốt ngộ quí nhân<br>Hoạn nạn tịch tuyệt<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Việc làm gặp u mê<br>Đừng buồn khổ ê chề<br>Bỗng gặp được người quí<br>Nạn thoát lòng hả hê<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như chuyện Lục Tổn vào trận bát quái của Khổng Minh, đang cơn nguy khốn, may gặp được Huỳnh Thừa Ngân chỉ đường mà thoát ra được trận đồ. Người xin được quẻ xăm này, tuy trước khó nhưng sau lại dễ , không cần phải buồn lo, nhờ có quí nhân chỉ giúp. Đi xa cầu tài thì nhân lúc mùa Xuân, duy việc hôn nhân không được tốt, đến mùa Hạ mọi việc đều thuận thông.
`
},

"021":{
title:"SỐ 21 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Khách lai phỏng vấn tử như hà</div><div style="text-align:center;">Điền khả canh hề bình địa sừ</div><div style="text-align:center;">Canh hạ nhất niên thành tựu xứ</div><div style="text-align:center;">Bất như Thu mạt tức Đông sơ</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Canh tác hỏi người có tốt không</div><div style="text-align:center;">Đất bằng cuốc xới cứ gieo trồng</div><div style="text-align:center;">Một năm chăm sóc nay thành tựu</div><div style="text-align:center;">Trúng mùa Thu cuối tiết đầu Đông</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Khách lai vấn tín<br>Bách sự vô hư<br>Chiêm dựng sanh nam<br>Duy cần hữu công<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Người tới có hỏi tin<br>Siêng năng ở tự mình<br>Có thai sanh quí tử<br>Trăm điều được tốt xinh<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Lưu Thần và Nguyễn Triệu đã đi vào núi Thiên Thai. Người xin đặng quẻ xăm này, ráng siêng năng vì thời vận tốt đã đến, danh lợi rực rỡ, tháng 9 và 10 là tốt nhất. Song nên giữ phận, sang giàu đừng quá kiêu căng ỷ thế.
`
},

"023":{
title:"SỐ 23 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vi kỳ thắng bại hiệp như hà</div><div style="text-align:center;">Mãn kỳ nhất đáo để hoàn tha</div><div style="text-align:center;">Thuỳ bả chân tâm lao khổ lực</div><div style="text-align:center;">Bất như cập tảo khứ cầu hoà</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ván cờ cao thấp đã bày ra</div><div style="text-align:center;">Kỳ phùng đối thủ thắng sao qua</div><div style="text-align:center;">Mãi khổ nghĩ suy đi quyết đấu</div><div style="text-align:center;">Chi bằng nhường bước để cầu hoà</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhược bất cường địch<br>Nghinh sự gian nan<br>Quả bất địch chúng<br>Thượng vi cầu hoà<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Yếu thế đâu thắng đông<br>Các điều khó chất chồng<br>Tự nghĩ mà lượng sức<br>Thuận hoà việc mới thông<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như vua Nghiêu đặt ra bàn cờ để dạy con, muốn hơn thua thì phải lao tâm nhọc trí, chớ không phải dễ, nên các việc hoà là quí. Người xin được quẻ xăm này, chẳng nên cạnh tranh điều chi cả , mang vận hơi suy, nên an phận thủ thường mà chờ thời, chớ nên nóng vội.
`
},

"024":{
title:"SỐ 24 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tử biệt phụ hề thê biệt phu</div><div style="text-align:center;">Tương tiễn đậu ky thân dã sơ</div><div style="text-align:center;">Thâm dạ phân minh nguyệt lại hiểu</div><div style="text-align:center;">Nhiễu thụ thuỳ tri hữu điểu minh</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cha con cách biệt vợ xa chồng</div><div style="text-align:center;">Rể thân nấu đậu có đành không</div><div style="text-align:center;">Đêm đen trăng tỏ soi đường thẳng</div><div style="text-align:center;">Chim hót rừng cây ai thấu lòng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cốt nhục phân ly<br>Bất hoà lục thân<br>Giao tranh khẩu thiệt<br>Lục súc cánh phòng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Ruột thịt phải lìa xa<br>Thân tộc lại bất hoà<br>Miệng lao xao tranh cãi<br>Chăn nuôi xấu tới nhà<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như chuyện người Tào Phi, muốn hại em là Tào Thực không được, sau cho đi nhậm chức nơi xa, và luôn đem lòng nghi kỵ. Người xin được quẻ xăm này mùa xuân mới tốt, phòng kẻ tiểu nhân ám hại, bệnh lâu lành, hôn nhân không hợp.
`
},

"025":{
title:"SỐ 25 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Cố nhân hữu ước tại thâm khuê</div><div style="text-align:center;">Nghi hướng hoa gian củng thủ huề</div><div style="text-align:center;">Tranh nại phù vân ế minh nguyệt</div><div style="text-align:center;">Hảo phong vi ngã tác kim ngân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người xưa đã hẹn tại khuê phòng</div><div style="text-align:center;">Nắm tay dạo bước ngắm vườn bông</div><div style="text-align:center;">Bỗng chốc ánh trăng mây lấp bóng</div><div style="text-align:center;">Chờ gió thổi tan lại sáng trong</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhân hữu mưu vọng<br>Sự đa trở trệ<br>Hốt ngộ quí nhân<br>Chư sự tịch miễn<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tính mưu người biết chăng<br>Các việc bị trở ngăn<br>Bỗng gặp được người quí<br>Trăm điều hết khó khăn<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, tỉ như Trương Quân Thuỵ hẹn gặp Thôi Oanh Oanh tại vườn hoa, chẳng dè bị mây áng mất ánh trăng, may có trận gió mát thổi mây tan, đem lại ánh sáng. Người xin được quẻ xăm này tuy gặp vận, song có không ít cách trở. Nếu gặp được quí nhân giúp mới thành việc, nên chờ đợi thời đến, mùa Xuân Hạ không tốt, đến Thu Đông thì các việc mới hanh thông.
`
},

"026":{
title:"SỐ 26 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Chu tước lâm thân sự vị giai</div><div style="text-align:center;">Cả i mưu động dụng sự đa sai</div><div style="text-align:center;">Bệnh triền vị cách hà năng miễn</div><div style="text-align:center;">Khẩu thiệt giao tranh hựu pha tài</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Chim sẻ tới bên việc chẳng lành</div><div style="text-align:center;">Việc làm thay đổi mãi loanh quanh</div><div style="text-align:center;">Bệnh đau cắt dạ làm sao tránh</div><div style="text-align:center;">Của mất đi rồi lại cãi tranh</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Chu tước lâm thân<br>Động dụng vị hanh<br>Tật bệnh vị thối<br>Khẩu thiệt giao tranh<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Đã rõ tại lúc này<br>Nhưng làm chẳng gặp may<br>Tật bệnh chưa qua khỏi<br>Cãi tranh mãi kéo dài<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, tỉ như vi trùng truyền bệnh, làm cho rối loạn thân thể, kiện cáo tranh giành, trăm việc không được tốt, nên chậm mà chờ thời, nóng vội sẽ hư việc. Năng cúng vái trời đất, khẩn cầu Thánh Thần phò trợ mới được yên ổn.
`
},

"027":{
title:"SỐ 27 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bình nguyên thố tử cẩu đương phanh</div><div style="text-align:center;">Điểu tận cung tàng sự vị hanh</div><div style="text-align:center;">Hành mãn công thành tu thối bộ</div><div style="text-align:center;">Bất nhiên hoạ hoạn cập lâm thân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thỏ hết phải đành giết chó ngay</div><div style="text-align:center;">Vắng chim cung nỏ để chi hoài</div><div style="text-align:center;">Công việc đã thành nên thối bước</div><div style="text-align:center;">Bằng không thân vướng hoạ cùng tai</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cao xứ hưu bản<br>Nguy xứ hưu phúc<br>Nhược năng thối bộ<br>Phương khả miễn ưu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Nơi cao chớ nên trèo<br>Nguy hiểm vách cheo leo<br>Lòng phải mau dừng bước<br>Lo rầu có đâu theo<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như triều Hán, Hàn Tín bị bà Lữ Hậu mưu hại. Người xin được quẻ xăm này, trăm việc nên nhẫn nhịn chớ quá tham cầu, công danh phú quí, tài lợi vinh hoa đều thả trôi theo dòng nước, cẩn thận mà chờ thời thì hay hơn.
`
},

"028":{
title:"SỐ 28 TRUNG BÌNH ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhân ngôn nhật lạc thị thiên nhai</div><div style="text-align:center;">Vọng đoạn thiên nhai vị kiến gia</div><div style="text-align:center;">Sơn bích thiên phong tương cách trở</div><div style="text-align:center;">Bích sơn hựu bị vụ vân già</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người nói bóng tà ngả cuối trời</div><div style="text-align:center;">Nhớ nhung quê cũ có đâu vơi</div><div style="text-align:center;">Vách đá cheo leo ngàn trở cách</div><div style="text-align:center;">Mây mù ngăn lối chịu rối bời</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Chiêm tài dụng sự<br>Quí hữu trở cách<br>Thiện ác vị phân<br>Ưu nghi vị quyết<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Công việc chịu khổ kham<br>Tiền tài chớ quá tham<br>Giữ lành chưa phân rõ<br>Nghi ngại chẳng nên làm<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, tỉ như ông Hàn Dũ bị đày đi đất Triều Châu, giữa đường gặp mây mù che lấp. Người xin được quẻ này, muôn việc gặp trắc trở, phải cẩn thận đề phòng, ngừa tai hoạ đến mình. Thời vận chưa hanh thông,nhẫn nại mà đợi chờ thời tới.
`
},

"029":{
title:"SỐ 29 TRUNG BÌNH ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nghiệt long đắc vũ cáng tranh vanh</div><div style="text-align:center;">Vị cực danh cao thành phục băng</div><div style="text-align:center;">Giã nhược cấp lưu năng dũng thối</div><div style="text-align:center;">Miễn giao mãn dật tiện cao khuynh</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Rồng cạn bay lên lúc đổ mưa</div><div style="text-align:center;">Trên cao băng đóng cũng bằng thừa</div><div style="text-align:center;">Ẩn mình nên gấp lo lui bước</div><div style="text-align:center;">Vượt cao té nặng phải phòng ngừa</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thế bất khả ỷ<br>Quyền bất khả trì<br>Cư trung ứng miễn<br>Kiến lợi nghĩa tư<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Kiếm tiền phải nghĩa nhân<br>Ỷ quyền thế chớ gần<br>Cửa nhà đều yên ổn<br>Tốt lành nhớ tỏ phân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như rồng cạn gặp mưa, lúc bay lên thì gặp phải băng đóng trên cao. Người xin đặng quẻ xăm này, nếu vận đến cũng đừng ỷ thế mà vương hại vào thân, như Uất Trì Cung làm quan lục phẩm, sau bị Dương Vương cách chức, đầy quá thì phải trào. Chỉ vừa mới đặng, đừng quá tham danh lợi mà mang hại.
`
},

"030":{
title:"SỐ 30 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Trạch địa an thân tiệm hữu y</div><div style="text-align:center;">Quí nhân chỉ dẫn tại tư thì</div><div style="text-align:center;">Cải qua nhược ngộ long xà nhật</div><div style="text-align:center;">Cầm sắc hoà hài bá sự nghi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Chọn nơi đất tốt để an thân</div><div style="text-align:center;">Chỉ dẫn lúc này có quí nhân</div><div style="text-align:center;">Nếu như giờ tháng vào Thìn Tỵ</div><div style="text-align:center;">Đàn ca hoà nhịp hợp trăm phần</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cầu tài cầu quan<br>Hoà hợp hôn nhân<br>Thìn tỵ chi nhật<br>Khả dĩ tiến thân<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Thăng chức với cầu tài<br>Hôn nhân đã tốt thay<br>Đến tháng lành thìn tỵ<br>Công danh tiến bước dài<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như ông Lữ Vọng ngồi câu cá tại sông Vị, gặp vua Văn Vương đến rước, vì biết là người tài giúp tế thế an bang. Người xin được quẻ xăm này, muôn việc đều tốt cả , thời vận công danh phú quí đúng theo sở nguyện.
`
},

"031":{
title:"SỐ 31 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quá tận trùng sơn cách lãng lai</div><div style="text-align:center;">Thử thân phương hỷ xuất trần ai</div><div style="text-align:center;">Nhất thanh phích lịch lôi vân chấn</div><div style="text-align:center;">Trực thượng vân tiêu khoa cửu đài</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vượt ngàn biển núi đến nơi này</div><div style="text-align:center;">Thân đà vui bước khỏi trần ai</div><div style="text-align:center;">Văng vẳng bên tai rền tiếng sấm</div><div style="text-align:center;">Mây cao vững tới cửu trùng đài</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quái trung chủ sự<br>Tiên nan hậu dị<br>Phích lịch nhất thanh<br>Thiên thư tiên khởi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trước khó sau dễ dàng<br>Lòng người chớ hoang mang<br>Bên tai nghe tiếng sấm<br>Sách trời viết rõ ràng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như Đức Hứa Chân Nhân, trì chí tu niệm, qua bao khổ tâm nhọc xác, sau mới đắc đạo lên trời. Người xin đặng quẻ xăm này, nên bền lòng thì trăm việc được thành công, khi vận đến nhanh như sấm nổ, giàu sang rực rỡ, song phải nhẫn nại đừng quá tham cầu.
`
},

"033":{
title:"SỐ 33 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phùng di cổ lãng địch vi tai</div><div style="text-align:center;">Đoạn lãm đà thuyền khứ bất hồi</div><div style="text-align:center;">Tung hữu thần nhân chủ ám hựu</div><div style="text-align:center;">Viễn hại tự tha dã tổn tài</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nương chẽ vỗ gào lớp sóng nhồi</div><div style="text-align:center;">Kéo thuyền dây đứt cuốn trôi trôi</div><div style="text-align:center;">May có thần linh theo hộ trợ</div><div style="text-align:center;">An thân tài phải mất đi rồi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Tai hại dục lai<br>Khỉ năng đào tị<br>Nhược bất hại thân<br>Diệc tu tổn tài<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Gặp vạ gió tai bay<br>Khó tránh khỏi lúc này<br>Muốn thân không bị hại<br>Mất tiền của đi thay<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như lúc Bình Tử đi buôn, thuyền ra xa bến, bỗng có gió nổi sóng cao, muốn trở vào cũng không được, thuyền bị trôi dạt hàng hoá rơi rớt, tưởng hại đến nơi, may nhờ quí nhân giúp kéo vào bờ. Người xin được quẻ xăm này, khá lo tu niệm thiện tâm, tuy hao tài mà thân khỏi bị hại, quá tham cầu là không tốt.
`
},

"034":{
title:"SỐ 34 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hành tàng đối đối yếu tri cơ</div><div style="text-align:center;">Lão hạc hà thiên bất khả phi</div><div style="text-align:center;">Đạo hiệp khả hành phi tắc chỉ</div><div style="text-align:center;">Lão thân vi đạo mạc lương phì</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mọi việc nếu làm đoán trước ngay</div><div style="text-align:center;">Hạc già yếu sức muốn tung bay</div><div style="text-align:center;">Lẽ trời có hợp mau ngưng bước</div><div style="text-align:center;">So tuổi yên như lúa mạ này</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Khả hành tắc hành<br>Khả chỉ tắc chỉ<br>Lợi bất khả tham<br>Thế bất khả ỷ<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lượng sức mới bước đi<br>Thân yếu hãy nghĩ suy<br>Chớ quá tham tài lợi<br>Ỷ thế chẳng được gì<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện bốn ông già ở ẩn núi Thương sơn, không chịu ra làm quan. Đến sau thấy Vua Hán định phế bỏ Thái Tử mới ra can gián, được nhà Vua nghe theo, vì vậy triều Hán mới được thái bình cường thịnh. Người xin được quẻ xăm này, mọi việc nên chờ thời, đừng quá ỷ sức, e có hại đến vận mạng sau này.
`
},

"035":{
title:"SỐ 35 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lệ nhãn tương khan nhẫn biệt ly</div><div style="text-align:center;">Thu phong khởi xứ bất thắng bi</div><div style="text-align:center;">Phao gia bình đảng thâm nhàn sự</div><div style="text-align:center;">Tài tán nhân vong tổng nhất thì</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Chia biệt đôi đường phải lệ rơi</div><div style="text-align:center;">Mối sầu gió cuốn lúc nào vơi</div><div style="text-align:center;">Bỏ nhà bước tựa bèo trôi nổi</div><div style="text-align:center;">Tài mất người xa cũng một thời</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phụ nam tử bắc<br>Tài tán nhân ly<br>Cấp nghi tác phước<br>Khả miễn tai nguy<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Thời chia cách cha con<br>Người xa của hao mòn<br>Nên mau làm việc phước<br>Hiễm nguy sẽ không còn<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Tô Vân cùng vợ đi trấn nhậm, giữa đường bị giặc bắt, trải trăm ngàn khốn khó nguy nan, sau nhờ có quí nhân giải cứu, sanh được con trai, lớn lên làm quan to triều đình. Người xin được quẻ xăm này, mọi việc đều xấu, duy việc thi cử là tốt.
`
},

"036":{
title:"SỐ 36 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quan phủ tư môn khả quái tai</div><div style="text-align:center;">Lưỡng nhân tương kiến tự nghi sai</div><div style="text-align:center;">Tự xuân tự hạ vô đoan cẩn</div><div style="text-align:center;">Cánh hợp đề phòng tiếu lý lai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Gặp phải việc riêng tới cửa quan</div><div style="text-align:center;">Nghi kỵ đôi bên chẳng rõ ràng</div><div style="text-align:center;">Đến mùa xuân hạ tan ngờ vực</div><div style="text-align:center;">Hợp lòng hoà giải lại cười vang</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quan chủ xả không<br>Hoạ khởi tiêu tường<br>Yêm lưu xuân hạ<br>Cát tường thu đông<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Người vận chưa thông<br>Hoạ tới từ bên trong<br>Xuân hạ luôn trì trệ<br>Tốt lành lúc thu đông<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, tỉ như chuyện Lưu Tích, thấy tượng bà Hoa Nhạc Tam Nương rất là tuyệt sắc, bèn làm bài thơ trêu ghẹo. Bà về xem xong nổi giận trừng phạt, sau này gặp Thái Bạch tinh quân, nói rõ là hai người có duyên vợ chồng, Thái Bạch bèn làm mai cho hai người nên duyên. Người xin được quẻ xăm này phải coi theo thời trời mà làm việc, nếu không khó tránh tai hoạ.
`
},

"037":{
title:"SỐ 37 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Oan uổng trùng trùng hà đắc thiên</div><div style="text-align:center;">Do như bảo kính tại ai trần</div><div style="text-align:center;">Nghiêm sương tích tuyết hàn như hứa</div><div style="text-align:center;">Tranh nại xuân lai bất ngộ xuân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Kính dùi trong bụi chịu gian truân</div><div style="text-align:center;">Nỗi oan lớp lớp tụ quây quần</div><div style="text-align:center;">Sương lạnh thành băng ai biết được</div><div style="text-align:center;">Xuân về sao chẳng thấy mùa xuân</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Oan uổng trùng trùng<br>Quí nhân vị ngộ<br>Minh nguyệt trệ vũ<br>Hoa phát tao phong<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mưa ngăn ánh trăng trong<br>Nỗi oan lại chất chồng<br>Nếu chưa được người giúp<br>Như hoa nở gặp dông<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Công Dã Tràng chịu oan trong ngục. Người xin được quẻ xăm này, phải cầu trời khẩn Phật mới thoát qua tai hoạ, trăm việc đều xấu, khá ngăn ngừa nguy hiểm gieo đến cho mình.
`
},

"038":{
title:"SỐ 38 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Niên lai quá trực tự nghi hành</div><div style="text-align:center;">Lưỡng nhật hôn mê bộ bất tiền</div><div style="text-align:center;">An đắc kim ngân dữ chúng tế</div><div style="text-align:center;">Vi cừ quát mục kiến thanh thiên</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm qua ngỡ đã được suông lành</div><div style="text-align:center;">Đôi ngày u ám bước sao nhanh</div><div style="text-align:center;">Nhờ có bạc vàng đem phát chẩn</div><div style="text-align:center;">Đường đê che mắt khuất trời xanh</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cầu tài vị toại<br>Hôn sự vị thành<br>Quí nhân chỉ xuất<br>Nãi kiến thành danh<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cầu tài chưa hợp lòng<br>Hôn nhân chẳng được thông<br>Quí nhân ra chỉ giúp<br>Danh lộ mới thành công<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện mẹ ông La Bốc, lúc sanh tiền làm điều ác độc ghê gớm, khi thác bị tội. Sau La Bốc tu hành thành Phật (Mục Kiền Liên), mới xin cứu mẹ ra khỏi ngục hình nơi âm phủ. Người xin được quẻ xăm này, phải lo tu nhân tích đức, mới tránh khỏi tai hoạ. Mùa thu thì tốt hơn.
`
},

"039":{
title:"SỐ 39 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phù tang ủng xuất nhất hồng luân</div><div style="text-align:center;">Chiếu phiến tam thiên hế giới trung</div><div style="text-align:center;">Tùng thử âm tiêu dương trường đạo</div><div style="text-align:center;">Nghiêm sương tích tuyết tự tiêu dung</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mặt trời hồng mọc vượt vườn dâu</div><div style="text-align:center;">Ánh nắng ấm soi khắp địa cầu</div><div style="text-align:center;">Giá băng tuyết tụ dần tan dứt</div><div style="text-align:center;">Điềm xấu qua rồi được tốt lâu</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhật xuất phù tang<br>Trùng dương nhật tán<br>Quan tụng tiềm tiêu<br>Đạo tặc viễn truân<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mặt trời đã mọc ra<br>Nắng tươi chiếu chói loà<br>Kiện thưa dần hoà giải<br>Cướp trộm phải trốn xa<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, tỉ như chuyện Dương Hoá làm loạn, bị Tống Giang đem quân đánh tan xong, khi về kinh được vua ra đón rất là vẻ vang. Người xin được quẻ xăm này, trăm việc phải cho ngay thẳng, nếu gian dối tức khắc sẽ bị hại, ráng lo phòng người và dò xét kỹ mới nên việc.
`
},

"040":{
title:"SỐ 40 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quy khứ du du tâm hạo nhiên</div><div style="text-align:center;">Viễn thuyền minh cổ quá giang tiền</div><div style="text-align:center;">Thời lai cánh bị kim phong lực</div><div style="text-align:center;">Vạn lý phong phàm nhất thuấn gian</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lòng về nhung nhớ nặng vô biên</div><div style="text-align:center;">Trên sông khua trống vượt con thuyền</div><div style="text-align:center;">Có trận gió vàng ra sức giúp</div><div style="text-align:center;">Cánh buồm vạn dặm tới quê liền</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phong khởi phàm cao<br>Vạn lý nhất cử<br>Tẩy giác thượng thuyền<br>Bất tư ưu nghi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Gió nổi dựng buồn cao<br>Đường xa tiến đi nào<br>Sao còn lo suy nghĩ<br>Rửa chân sạch lên mau<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như người đi buôn bán được lời, ngày trở về giàu sang vinh hiển, bởi người này hay cứu người khốn khổ, nên được trời ban cho tài lộc. Người xin được quẻ xăm này, mùa thu là tốt nhất, việc hôn nhân thì chưa nên định, cầu tài hơi chậm, kiện thưa trắc trở nhưng không sao.
`
},

"041":{
title:"SỐ 41 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thiên thượng cao cao nhất chi tòng</div><div style="text-align:center;">Phân minh chiêm đoạn cữu thu phong</div><div style="text-align:center;">Thừa thời quí dũng tri vô địch</div><div style="text-align:center;">Điện thí danh dương đệ nhất công</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cội tùng cao đứng ngất trời xanh</div><div style="text-align:center;">Thu đón từng cơn gió mát lành</div><div style="text-align:center;">Thông suốt vận thời ai địch nổi</div><div style="text-align:center;">Điện rồng bảng hổ đã đề danh</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thiên thượng minh nguyệt<br>Vạn lý phùng thu<br>Nhược cầu danh lợi<br>Đương chiếm ngao đầu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trăng sáng tỏ trời cao<br>Đường xa tiết thu vào<br>Như có cầu danh lợi<br>Bảng vàng đứng hàng đầu<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như Đậu Nghi đi thi đỗ trạng, vì các đời tổ tiên đã lưu đức lại cho con cháu, nên Đậu Nghi tuy nhỏ tuổi mà được đậu cao. Người xin được quẻ xăm này, nên gieo thêm phúc đức, trăm việc sẽ thành công.
`
},

"042":{
title:"SỐ 42 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Huyền vũ giao lâm chủ phá tài</div><div style="text-align:center;">Cánh phòng đạo tặc cập phi tai</div><div style="text-align:center;">Tựu trung hữu cá tri vô địch</div><div style="text-align:center;">Đắc tự âm nhân thiên thượng lai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vươn vào sao xấu chủ hao tài</div><div style="text-align:center;">Trộm cướp nên phòng lại hoạ tai</div><div style="text-align:center;">Rối lòng người đến giùm phân rõ</div><div style="text-align:center;">Tổ tiên lưu đức giúp phen này</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Huyền vũ giao thác<br>Hoà hiệp bất hài<br>Nhân oán bất ngữ<br>Cánh nhạ phi tai<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Sao xấu đã đến ngay<br>Chẳng gặp lành lúc này<br>Ân oán sao không nói<br>Tránh vạ gió tai bay<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, tỉ như chuyện con rùa của đức Chơn Võ, hoá thành yêu tinh, đến nhà nào thì nhà ấy gặp việc chẳng lành, đến sau Chơn Võ đi xuống thu phục, bắt về dân chúng mới được yên. Người xin được quẻ xăm này, năng cầu khẩn thánh thần mới được an tịnh.
`
},

"043":{
title:"SỐ 43 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ký phục cô xa lưỡng nhĩ thuỳ</div><div style="text-align:center;">Tiêu đồng vị ngộ Thái Ung tri</div><div style="text-align:center;">Mãn thân trần thổ giai yên một</div><div style="text-align:center;">Nhất đán phùng nhân thuỷ kiến kỳ</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ngựa tốt kéo xe chạy như dông</div><div style="text-align:center;">Thái Ung chưa gặp gỗ tiêu đồng</div><div style="text-align:center;">Khắp thân đất bụi đường che lấp</div><div style="text-align:center;">Có người chỉ giúp rõ kỳ công</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Lương mã phục lịch<br>Tiêu đồng vị cử<br>Nhất đán phùng nhân<br>Thuỷ kiến chân thiên<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Ngựa tốt cúi đầu ăn<br>Cây tốt ai biết chăng<br>Bỗng đâu có người chỉ<br>Phát huy hết công năng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Hàn Tín nhà Hán, thuở nhỏ chịu cảnh hàn vi, song có tài an bang tế thế, chẳng khác nào ngựa chiến mà đem kéo xe, cây tiêu đồng mà đem làm củi đốt. Người xin được quẻ xăm này công danh còn xấu, làm việc gì phải tạm chờ thời, mùa xuân hạ tốt hơn thu đông.
`
},

"044":{
title:"SỐ 44 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Câu trần chủ sự sự câu liên</div><div style="text-align:center;">Thối bộ do nan tấn bất tiền</div><div style="text-align:center;">Nhược dục cầu quan quan vị chí</div><div style="text-align:center;">Giao tranh thành tụng bệnh nan thuyên</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mọi việc đưa ra chẳng được thông</div><div style="text-align:center;">Tới lùi khó bước cứ xoay vòng</div><div style="text-align:center;">Muốn nhờ quan xử quan chưa tới</div><div style="text-align:center;">Bệnh tình, tranh cãi mãi không xong</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Câu trần liên liên<br>Sự đa giao khiên<br>Cầu quan vị viễn<br>Tật bệnh vị thuyên<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trải lòng đã tỏ lời<br>Nhiều việc khó nơi nơi<br>Đến quan chưa được gặp<br>Tật bệnh châm xa rời<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, tỉ như ông Tôn Trần thời xưa, làm việc chi cũng chậm chạp, cứ phân vân tiến thoái lòng vòng. Người xin được quẻ xăm này, phòng ngừa gặp chuyện gây gổ, kiện cáo, bệnh thêm nặng, mà chịu hao tài tốn của, khá hết lòng cầu khấn Thánh Thần, thì tai nạn sẽ qua, tài lộc chậm đến.
`
},

"045":{
title:"SỐ 45 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lưỡng ý đồng mưu tất hữu kỳ</div><div style="text-align:center;">Nghi tùng bình địa giá thiên thê</div><div style="text-align:center;">Tiêm yêu bất hứa quân cầu tảo</div><div style="text-align:center;">Chấp thủ huề sanh vũ tụ đê</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ý hợp đôi bên đúng lúc này</div><div style="text-align:center;">Đát bằng nên chòn bắt thang mây</div><div style="text-align:center;">Mời người mau vững lòng tin bước</div><div style="text-align:center;">Đàn phách múa ca hãy nắm tay</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Bách sự như ý<br>Hôn nhân cập thành<br>Cầu tài hoà lợi<br>Tối nghi phùng xuân<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mau kết hợp hôn nhân<br>Cầu tài lời đến gần<br>Trăm điều sau như ý<br>Rất tốt lúc mùa xuân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Phan Tất Chánh đi cầu hôn nhà họ Trần, phải kiên nhẫn mới thành tựu. Người xin được quẻ xăm này, phải đợi thời xuân, khi cơ hội đến thì sẽ tốt tươi, đừng nên nóng vội, cầu công danh trước khó sau dễ. Gia đạo an lành.
`
},

"046":{
title:"SỐ 46 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bạch hổ đương môn sự bất tường</div><div style="text-align:center;">Năng chiêu hoành hoạ cập tai ương</div><div style="text-align:center;">Cánh phòng tụng ngục đa ưu chế</div><div style="text-align:center;">Bất thị quan thương tức huyết thương</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Sao hung Bạch Hổ đã vào nhà</div><div style="text-align:center;">Tai bay vạ gió đuổi sao ra</div><div style="text-align:center;">Nên phòng tù ngục thêm sầu muộn</div><div style="text-align:center;">Thương tật quan hình khó tránh qua</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Bạch hổ đương môn<br>Sự giai bất tường<br>Đa tao hoành hoạ<br>Tật bệnh quan thương<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Sao xấu đã vào nhà<br>Tai hoạ nhiều gặp qua<br>Các việc không thông thuận<br>Tật bệnh với quan nha<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim. Chẳng khác nào Bạch Hổ hoá thành yêu tinh đi nhiễu hại thiên hạ, người xin được quẻ xăm này, phải lo ngăn ngừa tai hoạ, tật bệnh ập đến bất ngờ, kiện cáo hao tài tốn của. Nên khấn cầu Thánh Thần phò trợ, mới tránh được điều xấu, các việc nên cẩn thận chờ thời.
`
},

"047":{
title:"SỐ 47 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thiên âm vân ám vũ bi phong</div><div style="text-align:center;">Chung nhật hôn mê tự mộng trung</div><div style="text-align:center;">Nhân khứ án đầu dinh dĩ tử</div><div style="text-align:center;">Hạc phi lâm hạ trướng thành không</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mây đen u ám gió mưa buồn</div><div style="text-align:center;">Rối loạn kéo dài tựa mộng tuôn</div><div style="text-align:center;">Người đi đèn đóm bàn dần tắt</div><div style="text-align:center;">Hạc bay rừng vắng cửa rèm buông</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thiên âm vân ám<br>Bá sự ám muội<br>Cầu hôn bất thành<br>Tật bệnh vị thối<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mây trời kéo âm u<br>Trăm việc lại tối mù<br>Hôn nhân không thành tựu<br>Tật bệnh thêm buồn ưu<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện người Hớn Anh bị giặc Hồ vây trên núi, trong tay chỉ còn mấy tên lính, không thể nào thoát khỏi vòng vây. Sau nhờ có cụ già dẫn đường lối, mà giết tướng Hồ mới thoát nạn. Người xin được quẻ xăm này, trước khó sau dễ, trăm việc phải tuỳ sức,và có quí nhân giúp mới thành được, tật bệnh khó thuyên giảm.
`
},

"048":{
title:"SỐ 48 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngang tàng dã hạc tại kê quần</div><div style="text-align:center;">Ngọc thạch tương phùng thả vị phân</div><div style="text-align:center;">Thượng tá xỉ nha thử tử luận</div><div style="text-align:center;">Đệ nhàn bình bộ thượng thanh vân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Uy nghi chim hạc giữa bầy gà</div><div style="text-align:center;">Đã nhìn đá ngọc khó phân ra</div><div style="text-align:center;">Muốn mượn vuốt nanh đây chỉ rõ</div><div style="text-align:center;">Trời xanh tung cánh vượt bay xa</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Hạc nhập kê quần<br>Thời vận vị hứa<br>Gia thả ngang tàng<br>Vân tiêu viễn phi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hạc chen giữa gà bầy<br>Vận thời chưa gặp may<br>Tạm yên mà chờ đợi<br>Có ngày cất cánh bay<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Tô Đông Pha đi thuyền gặp người con ông chèo đò, trổ tài đối đáp lanh lợi. Chẳng khác nào ngọc để lộn trong đá, hạc đứng trong bầy gà. Người xin được quẻ xăm này, nên chờ đợi sau mới nên việc, bốn mùa đều trung bình, phải kiên nhẫn mà đợi thời vận tới.
`
},

"049":{
title:"SỐ 49 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bỉ cực ứng tu hữu thái lai</div><div style="text-align:center;">Linh chi sanh xuất tự siêu cai</div><div style="text-align:center;">Dương hồi cửu thập nhân xuân khứ</div><div style="text-align:center;">Thời chí bách hoa tuỳ phân khai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Bỉ cực qua rồi lại tốt tươi</div><div style="text-align:center;">Linh chi vách núi mọc lưng trời</div><div style="text-align:center;">Đường đời chín chục như xuân đến</div><div style="text-align:center;">Trăm hoa đua nở sắc xinh tươi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Lạp khứ xuân lai<br>Bỉ cực thái lai<br>Nhân hữu sở cầu<br>Cát khánh đại lợi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cuối năm đã tới xuân<br>Hết khổ gặp vui mừng<br>Tốt tươi cùng đại lợi<br>Mưu cầu toại dạ ưng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như lúc vua Văn Vương bị giam cầm nơi đất Du Lý, sau hết hạn được tha về. Người xin được quẻ xăm này, trăm việc nên thận trọng, đừng thấy hay mà đắc ý, ỷ tài ỷ sức mà bị mang hại. Hết cực đến vui, trước khó sau sẽ dễ dàng.
`
},

"050":{
title:"SỐ 50 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bình nguyên thu thố chánh đương phì</div><div style="text-align:center;">Nhã thắng tướng quân thoát lạp qui</div><div style="text-align:center;">Thuỳ bả bạch thư truyền túc nhạn</div><div style="text-align:center;">Quả nhiên nhất tiễn trúng song phi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cỏ tốt tiết thu thỏ mập thôi</div><div style="text-align:center;">Săn bắn đã xong trở về rồi</div><div style="text-align:center;">Ai đem thư cột nơi chân nhạn</div><div style="text-align:center;">Giương cung bắn hạ được chim đôi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thư truyền nhạn túc<br>Nhất tiễn song phi<br>Nhược quá thu nguyệt<br>Cát khánh đại lợi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Chân nhạn cột phong thư<br>Bắn tên trúng có dư<br>Lợi tài vui rực rỡ<br>Tốt nhất lúc vào thu<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như lúc Tô Võ gởi thư buộc vào chân nhạn, sau vua đi săn bắn được, mới sai người rước Tô Võ về quê. Người xin được quẻ xăm này, chẳng khác nào hết cơn bỉ cực đến hồi thái lai, thời vận gần đến phải siêng năng, thì tài lộc mới đến nhanh, mùa thu thì đại lợi và các việc đều tốt cả.
`
},

"051":{
title:"SỐ 51 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hảo tương dạ nguyệt sản di thu</div><div style="text-align:center;">Tụ lý minh châu mạc ám đầu</div><div style="text-align:center;">Tự hữu quí nhân đa trước lực</div><div style="text-align:center;">Bất tu nghi lự lưỡng tương đầu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Sao đem so với ánh trăng thu</div><div style="text-align:center;">Ngọc quí ném chi chốn tối mù</div><div style="text-align:center;">Tự có quí nhân ra trợ lực</div><div style="text-align:center;">Đôi đường mới tránh được buồn ưu</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vật quí đắc thời<br>Thời lai tự ngộ<br>Cãi canh động dụng<br>Bất tu nghi lự<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Vật quí đã có thời<br>Vận tài gặp nơi nơi<br>Việc làm mau sửa đổi<br>Buồn khổ phải xa rời<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện Triệu Khuông Dẫn vây đánh Long Hổ quan, phải qua bao trận chiến mới thắng được. Người xin được quẻ xăm này, trước khó sau dễ, chờ đúng thời vận mới thành công.
`
},

"052":{
title:"SỐ 52 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tao nhân đạn bác nhĩ quan phi</div><div style="text-align:center;">Cùng quỉ da du tai ách thì</div><div style="text-align:center;">Bất đặc công đình đa hiểm nạn</div><div style="text-align:center;">Tư gia môn hộ dã phòng di</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cửa quan phải trái cãi lao xao</div><div style="text-align:center;">Ma quỷ cười reo nạn kéo vào</div><div style="text-align:center;">Kiện thưa đeo đuổi nhiều nguy hiểm</div><div style="text-align:center;">Trong nhà việc xấu phải phòng cao</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhâm Quý giao tranh<br>Thị phi khảm kha<br>Bất đặc công đình<br>Tư môn lự hoạ<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Nhâm Quý lo cãi tranh<br>Rắc rối tới chẳng lành<br>Công đường không nên tới<br>Nhà buồn nghĩ quẩn quanh<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, tỉ như chuyện Tôn Tẫn bị hại bởi tay Bàng Quyên. Người xin được quẻ xăm này mọi việc đều xấu, phải cẩn thận đề phòng kẻo vướng hoạ tai, phòng ngừa người tiểu nhân gây hại. Gắng cầu Thánh Thần phò trợ, mới tránh khỏi điềm xui. Mùa thu thì khá hơn, các mùa khác đều không được tốt.
`
},

"053":{
title:"SỐ 53 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quải trung cát triệu hiệu thanh long</div><div style="text-align:center;">Tác sự cầu mưu xứ xứ thông</div><div style="text-align:center;">Nữ giá nam hôn quan sự cát</div><div style="text-align:center;">Cánh vô ưu lự hỷ trùng trùng</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Quẻ này điềm tốt tựa rồng xanh</div><div style="text-align:center;">Làm việc mọi nơi cũng được thành</div><div style="text-align:center;">Nam nữ hợp hôn, thưa kiện thắng</div><div style="text-align:center;">Chồng chất niềm vui sẽ đến nhanh</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quải triệu thanh long<br>Bá sự hanh thông<br>Nam hôn nữ giá<br>Hỷ sự trùng trùng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Quẻ tốt như gặp rồng<br>Trăm việc được hanh thông<br>Gái gả trai lấy vợ<br>Niềm vui mãi chất chồng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như lúc Khổng Minh ẩn dật nơi núi Ngoạ Long Cương, sau được Lưu Bị rước về phò tá, lập nên nhà Hậu Hán, tam phân thiên hạ. Người xin được quẻ xăm này, thời vận đã đến dầu đi đến nơi đâu cũng thành đạt, trai gái hợp nhân duyên, cầu quan rất tốt, muôn việc như ý.
`
},

"054":{
title:"SỐ 54 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hoành nghịch tương giao chí cấu tranh</div><div style="text-align:center;">Bị nhân phi thị thật nan phân</div><div style="text-align:center;">Quí mâu vị tịch huyền minh kính</div><div style="text-align:center;">Mục hạ tâm tư thả loạn ma</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đôi bên nghịch ý cãi nhau hoài</div><div style="text-align:center;">Người nói ra vào khó đúng sai</div><div style="text-align:center;">Nhìn gương kỹ lưỡng soi cho rõ</div><div style="text-align:center;">Trước mắt trong lòng loạn rối thay</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Bỉ thử giao tranh<br>Thị phi nan phân<br>Mục hạ giác ưu<br>Vị ngộ quí nhân<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hai bên cứ cãi tranh<br>Phải trái khó phân rành<br>Chưa gặp người quí giúp<br>Trước mắt buồn quẩn quanh<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, như chuyện Nễ-Hoành đời Tam Quốc tánh rất kiêu ngạo, sau bị ông Huỳnh Tổ giết chết. Người xin được quẻ xăm này trăm việc đều xấu, phải phòng ngừa người tiểu nhân gây hại, lại bị khẩu thiệt hao tài.
`
},

"055":{
title:"SỐ 55 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Giả quyền thị thế vị lương đồ</div><div style="text-align:center;">Bán thị chân hề bán thị hư</div><div style="text-align:center;">Đại để lâm cơ phương ứng tiện</div><div style="text-align:center;">Hà tu duyên mộc khứ cầu ngư.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cậy quyền mượn thế được gì đâu</div><div style="text-align:center;">Nửa hư nửa thật nghĩ thêm sầu</div><div style="text-align:center;">Vào cuộc nên tuỳ cơ ứng phó</div><div style="text-align:center;">Ngọn cây sao đến để buông câu</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Giả quyền thị thế<br>Sự vị khả phẩu<br>Lâm cơ ứng biến<br>Phương đắc khả thủ<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cứ mượn thế ỷ quyền<br>Mọi việc nào được yên<br>Tuỳ cơ lo xử liệu<br>Thủ phận giữ vẹn nguyên<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, tỉ như ông Lưu Bị lánh ra làm quan, mượn đất Kinh Châu, lạy ông Đào Khiêm ba lần mà nhường chức, nếu không thì chẳng được lâu dài. Người xin được quẻ xăm này, phải tuỳ thời chớ nên nóng vội, nếu gấp sẽ có lo sợ về sau, mọi việc nên cẩn thận.
`
},

"056":{
title:"SỐ 56 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phước lai tương ỷ hảo truy cầu</div><div style="text-align:center;">Mệnh lý vô thời dã bãi hưu</div><div style="text-align:center;">Sủng nhục vinh khô giai phận định</div><div style="text-align:center;">Hà tu hiểm xứ dụng cơ mưu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ỷ thế phước phần cứ mãi trèo</div><div style="text-align:center;">Vận thời chưa đến chịu gieo neo</div><div style="text-align:center;">Khó khăn giàu có trời định rõ</div><div style="text-align:center;">Mưu tính làm chi chốn hiểm nghèo</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vinh cô đắc thất<br>Kỳ phân dĩ định<br>Bất khả ngộ cầu<br>Thật do hô mạng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Phận định rõ trắng đen<br>Được thất với sang hèn<br>Mạng trời đã đặt để<br>Không được quá bon chen<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Trương Lương xách giày cho ông Huỳnh Thạch Công, nhận được binh thơ, sau mới đạt tới công danh tột phẩm. Mạng thời là do trời định, muốn cầu cũng khó nổi. Người xin được quẻ xăm này, các việc nên an phận thủ thường, chớ tham cầu vô ích.
`
},

"057":{
title:"SỐ 57 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phu canh phụ chức lợi điền tàm</div><div style="text-align:center;">Thú đắc giai hôn hựu sanh nam</div><div style="text-align:center;">Chiêm tụng chiêm tài giai đắc tế</div><div style="text-align:center;">Quí nhân huề thủ nhậm Đông Tây</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vợ dệt chồng chăm lo cấy cày</div><div style="text-align:center;">Gia đình hạnh phúc lại sanh trai</div><div style="text-align:center;">Cầu tài kiện tụng việc đều thắng</div><div style="text-align:center;">Người quí Đông Nam đến nắm tay</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Quí nhân an nghiệp<br>Vật quí đắc thời<br>Chiêm tài chiêm tụng<br>Hà sự bất lợi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lạc nghiệp lại an cư<br>Có thời của quí dư<br>Cầu tài cùng thưa kiện<br>Đâu cần phải ưu tư<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện Đổng Vĩnh bán mình chôn cha, gặp được vợ tiên dệt vải bán mà trừ dứt thay số nợ, sau sanh được co trai đỗ Trạng Nguyên, người xin được quẻ xăm này rất tốt, song ngàn việc phải lấy hiếu làm đầu, mới được thành công.
`
},

"058":{
title:"SỐ 58 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tài phi thiên dữ quỉ năng thâu</div><div style="text-align:center;">Tán đắc đa ma tích hữu dư</div><div style="text-align:center;">Cam tữu thị âm giai bất thuận</div><div style="text-align:center;">Niên lai chiếu hạ quả hà như</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Của quấy quỉ trời cũng chịu thua</div><div style="text-align:center;">Bao năm tích luỹ phải tan lùa</div><div style="text-align:center;">Rượu ngon âm nhạc theo chi mãi</div><div style="text-align:center;">Xoay chuyển thế nào được chiếu vua</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhân chi xử thế<br>Đương vụ ư đức<br>Hước ninh kiêu xa<br>Hậu hối hà ích<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Người sống ở trên đời<br>Đức độ trải nơi nơi<br>Nịnh hót theo xa xỉ<br>Sau hối cũng muộn rồi<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện nước Tần muốn đánh lấy nước Thục, bèn lập kế mua đường, nước Thục vì tham tiền liền chịu bán, sau thành ra bị mất nước. Người xin được quẻ xăm này, chẳng nên tham cầu, mọi việc phải thủ phận, đừng vì tham tiền mà mang hoạ.
`
},

"059":{
title:"SỐ 59 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Đồ mưu toàn sự xúc phiên đê</div><div style="text-align:center;">Tiến thối bàng hoàng chỉ tự mê</div><div style="text-align:center;">Đại để kim lai đồng thuỷ hiệp</div><div style="text-align:center;">Quí nhân tùng thử lực đề huề</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mưu tính việc này ngỡ được to</div><div style="text-align:center;">Tới lui ngơ ngẩn rối tơ vò</div><div style="text-align:center;">Kim thuỷ cuối cùng ngày được hợp</div><div style="text-align:center;">Quí nhân ra sức giúp giùm cho</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Xúc xứ đa mê<br>Hiệp xứ đa huề<br>Đồng kim dữ thuỷ<br>Kỳ dụng thuỷ chế<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Việc tới loạn rối lòng<br>Muốn hợp phải chờ trông<br>Tới ngày kim với thuỷ<br>Áp dụng được thành công<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện người Tương Như lúc nghèo khó đi ăn trộm gạo, bị bắt mang gông, sau thoát ra về, đi ngang cầu bèn lấy bút đề thơ rằng: nếu không làm nên chuyện cả, thề không đi qua cầu này, quả sau làm được quan lớn. Người xin đặng quẻ xăm này, phải cố gắng lo liệu thì mọi việc sẽ thành công, nhưng đừng quá vội.
`
},

"060":{
title:"SỐ 60 TRUNG BÌNH",
content:`
