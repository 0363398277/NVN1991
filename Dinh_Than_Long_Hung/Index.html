<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xuân mang bất phóng mã đề nhàn</div><div style="text-align:center;">Quá tận phong ba lịch hiểm gian</div><div style="text-align:center;">Trực đãi nhất thanh kê báo hiểu</div><div style="text-align:center;">Tự nhiên long đới bảo châu hoàn</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xuân bận vung roi ngựa hý vang</div><div style="text-align:center;">Vượt bao sóng gió lại nguy nan</div><div style="text-align:center;">Chờ lúc gà đêm rền tiếng gáy</div><div style="text-align:center;">Rồng đến mang theo lắm bạc vàng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Đa kiến gian tân<br>Phàm sự vị phùng<br>Nhược ngộ bát nguyệt<br>Tài bửu hanh thông<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Việc gian khó lúc này<br>Nhiều nguy hiểm lắm thay<br>Nếu gặp vào tháng tám<br>Hanh thông đường lợi tài<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện Hàn Dũ bị đày đi đất Triều Châu mà nhậm chức, trên đường gặp nhiều gian khổ, đến nơi trừ được nạn cá sấu làm hại dân, người đời nhớ công đức, lập đền thờ phụng đến đời sau. Người xin được quẻ xăm này, trước hiểm trở sau vinh quang, nên tạo thêm phước thì mọi việc đều tốt.
`
},

"061":{
title:"SỐ 61 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Minh cầm huyền đoạn tiêu vô thanh</div><div style="text-align:center;">Vạn hận nhân gian dục oán thâm</div><div style="text-align:center;">Trù trướng thử viên hoa chánh diễm</div><div style="text-align:center;">Ngưng sương tuyết tích tự tiêu trầm</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đứt dây đàn gảy có đâu kêu</div><div style="text-align:center;">Căm tức thế gian giận oán nhiều</div><div style="text-align:center;">Vườn hoa du ngoạn đang khoe sắc</div><div style="text-align:center;">Sương dùi tuyết đóng phải tiêu điều</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cầm đoạn huyền tục<br>Nguyệt viên tất khuyết<br>Chiêm tụng đa hung<br>Chiêm bệnh vị quyết<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trăng lúc tỏ khi mờ<br>Đàn đã đứt dây tơ<br>Kiện thưa nhiều trắc trở<br>Tật bệnh dứt phải chờ<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Bá Nha khóc Tử Kỳ xong, liền đập bỏ cây đàn vì từ đây không còn bạn tri âm. Người xin được quẻ xăm này, khá cẩn thận đề phòng tật bệnh, trăm việc không có gì hay cả.
`
},

"062":{
title:"SỐ 62 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nữ giá nam hôn chánh cập thời</div><div style="text-align:center;">Xuân tàm thu giá lưỡng tương nghi</div><div style="text-align:center;">Thị triêu tung xuất giai vinh quí</div><div style="text-align:center;">Bệnh nhiểm hoa nhan dã đắc y</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nam nữ kết hôn đã đến thời</div><div style="text-align:center;">Xuân tầm thu cấy tốt nơi nơi</div><div style="text-align:center;">Đem ra chợ sớm buôn giàu có</div><div style="text-align:center;">Tật bệnh nhiễm thân phải xa rời</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nữ giá nam hôn<br>Xuân tàm thu giá<br>Bách sự hoà hiệp<br>Cữu bệnh thuyên du<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Nam nữ hợp hôn nhân<br>Xuân thu phải chuyên cần<br>Trăm việc đều tươi tốt<br>Bệnh lùi khoẻ tấm thân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Nhiếp Di bị bệnh mà gặp được thầy giỏi. Người xin được quẻ xăm này, phải tuỳ theo thời tiết mà làm việc, thì trăm sự được thành, công danh, tài lợi sẽ toại nguyện, từ mùa xuân và thu là tốt nhất, mùa đông mùa hạ thì bình thường.
`
},

"063":{
title:"SỐ 63 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kỷ niên tư sắc phụ thiên ti</div><div style="text-align:center;">Đắc tế đông sàn chánh cập thời</div><div style="text-align:center;">Chánh thị hùng bì thời cát mộng</div><div style="text-align:center;">Dựng sanh bất giác thị nam nhi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trang điểm bao năm thiếu mối mai</div><div style="text-align:center;">Hôm nay kén được rể hiền tài</div><div style="text-align:center;">Hừng hực mộng lành đang tới lúc</div><div style="text-align:center;">Hoài thai con quí phải là trai</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cữu vũ đắc tịnh<br>Cữu khuất đắc thân<br>Dựng chủ sanh nam<br>Hốt ngộ lương thìn<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mưa mãi đến lúc ngưng<br>Buồn lâu cũng được mừng<br>Có thai sanh trai quí<br>Như gặp được mùa xuân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện Vương Nghĩa kén được rể hiền. Người xin được quẻ xăm này rất tốt, song mùa thu thì không hay. Công danh toại nguyện, tật bệnh cúng vái thì lành ngay, cầu tài được lợi.
`
},

"064":{
title:"SỐ 64 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngư du đăng luyện võng trương qua</div><div style="text-align:center;">Điểu nhập sâm lâm phá nhập la</div><div style="text-align:center;">Hà nhật thử thân đa trù ngại</div><div style="text-align:center;">Nguyệt sầu nhất mộng đáo Nam Kha</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cá bơi mắc lưới khúc sông trong</div><div style="text-align:center;">Chim rừng bay sợ vướng vô lồng</div><div style="text-align:center;">Trở ngại lúc nào thân được thoát</div><div style="text-align:center;">Nam Kha mộng đến buồn mênh mông</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Ngư du tỵ võng<br>Phi nhạn tao cung<br>Xuất nhập hữu ngại<br>La võng trùng trùng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cá mắc lưới khi bơi<br>Trúng tên chim bị rơi<br>Tới lui đều trở ngại<br>Bẫy rào có nơi nơi<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện Lý Mân nằm giấc mộng Nam kha chẳng khác nào hoa sớm nở tối tàn, công danh trôi theo dòng nước. Người xin được quẻ xăm này, việc gì cũng ráng giữ mình, bốn mùa khá thuận theo lòng trời, mạng vận rất xấu, nên chờ thời tốt đến.
`
},

"065":{
title:"SỐ 65 TRUNG BÌNH ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thủ phận tuỳ duyên đáo xứ an</div><div style="text-align:center;">Uổng mưu âm tưởng tất chiêu hành</div><div style="text-align:center;">Xuân lan thu quế tuỳ thời phát</div><div style="text-align:center;">Xứ thuận an thường thị phước điền</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mọi điều thủ phận lại tuỳ duyên</div><div style="text-align:center;">Nghĩ quấy làm sai khó được liền</div><div style="text-align:center;">Xuân thu theo tiết trồng lan quế</div><div style="text-align:center;">Nương thời thường nhật mới thuận yên</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhân sinh xử thế<br>Lý nghi thủ phận<br>Phàm sự hữu thời<br>Tự nhiên hanh thái<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Người xử thế ở đời<br>Các việc phải đúng thời<br>Thủ phận theo lẽ đúng<br>Tự nhiên được thảnh thơi<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Đào Tiềm thôi làm quan, về nhà trồng bông cúc mà vui thú, thiên hạ xưng là Ngũ Liễu tiên sinh. Người xin được quẻ xăm này phải an phận thủ thường, mà chờ thời cơ đến, như mùa xuân có lan, thu đến thì có quế, còn việc hôn nhân đừng vội tính.
`
},

"066":{
title:"SỐ 66 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thập niên trần thổ khốn anh tài</div><div style="text-align:center;">Cát triệu y hy nhập mộng lai</div><div style="text-align:center;">Hảo ngoạn Tiền-Đường giang thượng nguyệt</div><div style="text-align:center;">Triều đầu đáo xứ hải môn khai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mười năm đất bụi lấp anh tài</div><div style="text-align:center;">Nằm mộng điềm vui ít lắm thay</div><div style="text-align:center;">Tiền-Đường sông rộng nhìn trăng sáng</div><div style="text-align:center;">Cửa biển sóng reo lớp lớp đầy</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cữu khốn trần thổ<br>Bỉ cực thái lai<br>Đông tây hữu vọng<br>Sở dụng phùng tài<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lâu nay bụi chôn chân<br>Sung sướng đã tới gần<br>Việc làm đều được thấy<br>Tay nắm được bảo trân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện ông Tô Đông Pha khi còn trẻ công danh chưa đạt, sau làm quan lớn ngao du các nơi thắng cảnh, nên ông viết bốn chữ rằng: " Thông đạt cùng khốn " cũng như nhau. Người xin được quẻ xăm này, việc gì cũng vậy trước khó sau dễ, duy việc tật bệnh và hôn nhân thì không tốt cho lắm.
`
},

"067":{
title:"SỐ 67 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quá tận hoàng kê bạch đại hương</div><div style="text-align:center;">Kỷ đa nghi lự biến cát tường</div><div style="text-align:center;">Kim triêu đắc đáo Giang nam địa</div><div style="text-align:center;">Khai tận phù vân kiến thái dương</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Buồn nghĩ bao năm lại rỡ ràng</div><div style="text-align:center;">Đã đến quê nhà gà gáy vang</div><div style="text-align:center;">Hôm nay thấy được trời nam ấy</div><div style="text-align:center;">Bay mất mây mù tỏa nắng vàng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Lịch hạ chí thu<br>Ái sự vị dụng<br>Tài đáo thập nguyệt<br>Cử dụng vô ưu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tự hè tới tiết thu<br>Khi làm chịu rối mù<br>Chờ lúc tháng mười tới<br>Các việc dứt buồn ưu<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Mã Viện đem quân đánh nước Nam, Người xin được quẻ xăm này, trước phải lao đao cực khổ, sau mới thành công được, ráng chịu cực làm ăn mà chờ thời, sau mới được vinh hoa phú quí, đừng nên nóng vội.
`
},

"068":{
title:"SỐ 68 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Uyển viên xuân đáo thị truy du</div><div style="text-align:center;">Nhất khúc sanh ca nhất khúc sầu</div><div style="text-align:center;">Hảo sự chuyển đầu thành ác sự</div><div style="text-align:center;">Đề huề nhị mỹ đáo khiên ngưu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vườn uyển dạo xuân bước tới lui</div><div style="text-align:center;">Nghe khúc đàn ca dạ sụt sùi</div><div style="text-align:center;">Rõ nhìn việc tốt thành ra xấu</div><div style="text-align:center;">Ngưu Lang Chức Nữ gặp nào vui</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thái trung hữu bỉ<br>Hỷ trung hữu ưu<br>Đề phòng tổn thất<br>Nhị vĩ khiên ngưu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trong vui chen nỗi buồn<br>Xui hên nào được suông<br>Nên đề phòng tổn thất<br>Như trâu bị nhốt chuồng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện bà Võ Hậu ra vườn thượng uyển, hàng ngày xem hoa nở tươi tốt nay lại rụng héo, nhân thấy cảnh mà sanh buồn. Người xin được quẻ xăm này, phải tuỳ cơ ứng biến, bằng đắm sa chơi bời thì ắt có chuyện buồn lo.
`
},

"069":{
title:"SỐ 69 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lục cách thừa phong ý khí nhiêu</div><div style="text-align:center;">Cao tường vân lộ thượng thanh tiêu</div><div style="text-align:center;">Thời lai cánh tá kim tiêu lực</div><div style="text-align:center;">Khởi đạn trình đồ vạn lý diêu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tầng mây bay lượn tự ra vào</div><div style="text-align:center;">Cánh vươn lướt gió vượt trời cao</div><div style="text-align:center;">Đến thời mượn sức càng thêm mạnh</div><div style="text-align:center;">E dè chi nữa tiến lên nào</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vũ dực tức thành<br>Thanh vân đắc lộ<br>Ly cô hoành phi<br>Vạn lý nhất cử<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Vỗ cánh vượt lên trời<br>Mây xanh lướt thảnh thơi<br>Rộng đường bay khắp chốn<br>Thoáng chốc đã đến nơi<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện Lưu Viễn phục được con ma hại người tại sau nhà, sau đó có Thần nhân giúp sức làm đến chức đại tướng. Người xin được quẻ xăm này, mùa xuân hạ thì không được tốt cho lắm, qua thu đông mới tốt lành mọi bề.
`
},

"070":{
title:"SỐ 70 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hoan ngu biến tác hoạ thai hoài</div><div style="text-align:center;">Gia đạo tiêu điều bách bất hài</div><div style="text-align:center;">Muộn lý thiêm tâm hựu vị hạ</div><div style="text-align:center;">Khuyển sinh tam giác hựu hoàn lai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đang vui lo sợ ẩn trong lòng</div><div style="text-align:center;">Trăm việc trong nhà chẳng thuận thông</div><div style="text-align:center;">Buồn rầu chưa dứt thêm chồng chất</div><div style="text-align:center;">Điều xui tháng Tuất lại quay vòng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Phước thiên thành hoạ<br>Hỷ đa thành suy<br>Muộn do vị giải<br>Tai hựu hoàn lai<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Phước đi hoạ ngặp ngay<br>Vui nhiều yếu lúc này<br>Buồn rầu chưa hiểu rõ<br>Thêm vào lại nạn tai<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành hoả, như chuyện người con gái đời Thương đã có chồng họ Lục, còn ngoại tình cùng trai có chửa, chồng bèn kiện đến quan trên, sau nhà này bị niêm phong biên tịch hết gia sản. Người xin được quẻ xăm này, phải ngăn ngừa và đề phòng các việc.
`
},

"071":{
title:"SỐ 71 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Cước đạp huỳnh hoè dũng sĩ kỳ</div><div style="text-align:center;">Tài cao tranh nại thưởng âm hy</div><div style="text-align:center;">Sa trường nhất chiến vô tiêu tức</div><div style="text-align:center;">Tiều tuỵ tây phong ý thối phi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ngất ngưỡng cây hoè đạp dưới chân</div><div style="text-align:center;">Ỷ tài khoe sức có ai cần</div><div style="text-align:center;">Sa trường chiến trận không tin tức</div><div style="text-align:center;">Gió tây chim bị thổi lui dần</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Trí quãng tài sơ<br>Tiến thốn thối xích<br>Hà lực cao phi<br>Vị sanh vũ dực<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tài mọn chí mênh mông<br>Thối lui phải xuôi dòng<br>Sức đâu chim bay vượt<br>Chưa mọc đủ cánh lông<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Mạc Cố Lư vào kinh đô ứng thí, cứ khoe khoang tài sức, khi ra trận ở sa trường thì không biết chi mà làm. Người xin được quẻ xăm này, đừng tham cầu quá mức mà mang hại, như chim chưa mọc đủ cánh lông, mà muốn bay cao thì không thể nào đạt được.
`
},

"072":{
title:"SỐ 72 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Đắc thất vinh cô bổn tại thiên</div><div style="text-align:center;">Lạc thiên tri mạng thuỷ an nhiên</div><div style="text-align:center;">Nhược đắc thử gia ý mưu vọng</div><div style="text-align:center;">Kim bạch dinh sương hoá mãn thuyền</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Do trời được mất với giàu sang</div><div style="text-align:center;">Từ nay vui vẻ lại an nhàn</div><div style="text-align:center;">Tính mưu mọi việc đều như ý</div><div style="text-align:center;">Thuyền chở đầy rương chứa bạc vàng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Hành chỉ do mạng<br>Đắc thất do thiên<br>Nhược năng thuận thủ<br>Phước lộc tự nhiên<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Được mất do trời cao<br>Mạng số định thế nào ?<br>Biết thủ phần an phận<br>Phước lộc tự nhiên vào<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện Mẹ Thái Nhương khi đi qua sông, gặp sóng to gió lớn tàu sắp bị chìm, bèn vái nếu trời độ cho yên sóng gió, sẽ xây cầu để tạo phúc, quả nhiên trời quang gió lặng, sau xây cầu trả ân, sanh con sau làm được quan lớn, người xin được quẻ xăm này, phải tuỳ cơ mà làm việc, tạo thêm phúc thì sẽ được vinh hiển.
`
},

"073":{
title:"SỐ 73 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xạ trúng nhạn phi năng bạch thư</div><div style="text-align:center;">Nãi tri nhân tại Hán chi ngung</div><div style="text-align:center;">Hồi đầu vị ngộ chân tiêu tức</div><div style="text-align:center;">Lạp hậu xuân tiền thả nhậm cừ</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trương cung bắn nhạn được phong thơ</div><div style="text-align:center;">Được tin ngoài ải người trông chờ</div><div style="text-align:center;">Ngoảnh trông chưa thấy thêm tin tức</div><div style="text-align:center;">Đông cuối đón về lúc xuân sơ</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Chiêm tin vị thựt<br>Phương kiến tiêu tức<br>Lạp khứ xuân lai<br>Cầu sự giai cát<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mơ hồ nhận được tin<br>Hay xong phải rõ nhìn<br>Cuối năm đầu xuân đến<br>Các việc được đẹp xinh<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện ông Tô Võ đi sứ sang Hung Nô, bị bắt chăn dê mười lăm năm, bèn viết thơ buộc vào chân chim nhạn, nhà vua Hán Võ Đế đi săn bắn được thơ, cho người đi rước về nước. Người xin được quẻ xăm này, mọi việc nên bền lòng thì sẽ thành công, không có điều chi xấu cả.
`
},

"074":{
title:"SỐ 74 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hoá long đầu giác cữu tranh vanh</div><div style="text-align:center;">Thoát thân tùng thử tạ thương minh</div><div style="text-align:center;">Dĩ kim đồ hoá thừa kỳ tiện</div><div style="text-align:center;">Đắc thượng phù dao vạn lý trình</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Hoá rồng đầu đã mọc sừng ra</div><div style="text-align:center;">Từ đây thoát xác tạ ao nhà</div><div style="text-align:center;">Tự do bay nhảy trời lồng lộng</div><div style="text-align:center;">Thênh thang dạo bước vượt đường xa</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Hoá long đầu giác<br>Cữu dĩ tranh vanh<br>Đồ nam dĩ tiện<br>Nghi tạ thương minh<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Biến rồng đã mọc sừng<br>Tài ngất ngưỡng không ngưng<br>Nên tạ ơn biển rộng<br>Đường nam tiến không ngừng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện Vương Xuân Nguyên và Kích Tân Văn đi thi, ngang qua hồ Ba Dương gặp bão, may có ông già đánh cá cứu nên khởi bị hại, sau được đỗ đạt vinh hiển. Người xin được quẻ xăm này, trước khó sau dễ, phải chờ thời vận mới thành công.
`
},

"075":{
title:"SỐ 75 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tằng hướng than đầu tiễn mỹ ngư</div><div style="text-align:center;">Đồ lao tâm lực uổng không hư</div><div style="text-align:center;">Bất như kết võng lâm uyên khứ</div><div style="text-align:center;">Tự hữu kim lân ứng sở nhu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ngồi ngắm cá bơi dưới suối trong</div><div style="text-align:center;">Hao sức thời gian lại phí công</div><div style="text-align:center;">Chi bằng đan lưới đem giăng bắt</div><div style="text-align:center;">Vướng được nặng to cá vẫy rồng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thủ chu đãi thố<br>Lâm uyên tiễn ngư<br>Bất như gia biến<br>Biệt hữu sở nhu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Chờ thỏ ngồi ôm cây<br>Khen chi cá suối này<br>Nếu không mau sửa đổi<br>Sao mà bắt được đây<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện người Nghiêm Tử Lăng, ở ẩn ngồi câu cá nơi sông Đông Giang, sau vua Hán mời ra làm quan cũng không chịu nhận. Người xin được quẻ xăm này, phải tận nhân lực biết quyền biến theo thời thế mới có thành công, tài lộc cố gắng sẽ được có.
`
},

"076":{
title:"SỐ 76 HẠ HẠ ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Yêu mang vinh quý vị khu trừ</div><div style="text-align:center;">Ưu đãi nồng vân toả thái hư</div><div style="text-align:center;">Nhược vấn y gia đoan đích sự</div><div style="text-align:center;">Tam hồn thất phách tấn hoa tư</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Bỏ dịp sang giàu bởi quỉ yêu</div><div style="text-align:center;">Sáng tươi che lấp tại mây nhiều</div><div style="text-align:center;">Việc nhà may mắn như có hỏi</div><div style="text-align:center;">Hồn phách vững yên phải giữ đều</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Gia trung hữu sùng<br>Chiêm sự vị đồ<br>Khẩu thiệt ám muội<br>Chiêm bệnh vị tô<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trong nhà rối rắm thay<br>Việc tới chưa gặp may<br>Tranh cãi thêm u ám<br>Bệnh chưa dứt lúc này<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện vua nhà Đường, bị nịnh thần gian thông với ngoại bang hại gần mất nước, sau có trung thần giúp cho mới tránh khỏi hoạ. Người xin được quẻ xăm này, ráng lo lường mọi tình thế nguy hiểm , tìm phương xử lý mới khỏi lo, kẻo không gặp lành lại hoá dữ.
`
},

"077":{
title:"SỐ 77 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thị phi danh lợi khổ tương doanh</div><div style="text-align:center;">Thân thế hổn như giá thượng ưng</div><div style="text-align:center;">Bãi thoát hồng trần hoa hữu chí</div><div style="text-align:center;">Bằng thuỳ tác cá giải liễu nhân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Khổ cầu danh lợi có đúng sai</div><div style="text-align:center;">Như ưng trên giá buộc chân này</div><div style="text-align:center;">Bức phá vượt bay mang chí lớn</div><div style="text-align:center;">Giải buồn tâm sự biết tìm ai</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cầu lợi vị toại<br>Khẩu thiệt vỉnh thoát<br>Nhược vấn hanh thông<br>Trực đãi thu nguyệt<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Cầu lợi chưa hanh thông<br>Tranh cãi cứ quay vòng<br>Muốn biết đường tươi sáng<br>Chờ thu lúc trăng trong<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Hớn Chung Ly làm tướng đánh giặc, giết rất nhiều người, sau được thành tiên ấy là số phần do trời định. Người xin được quẻ xăm này, các việc phải chờ đến mùa thu, lúc trăng tròn mới thành công.
`
},

"078":{
title:"SỐ 78 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thù khích thừa gian khải hoạ môn</div><div style="text-align:center;">Lưỡng gia thắng bại vị do phân</div><div style="text-align:center;">Cánh phòng ám tiễn lưỡng tương xạ</div><div style="text-align:center;">Mật chước cơ mưu miễn tự phiền</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thắng bại hai nhà khó xếp thu</div><div style="text-align:center;">Họa tai kéo tới bởi hiềm thù</div><div style="text-align:center;">Trong tối phòng tên người lén bắn</div><div style="text-align:center;">Thoát phiền nên tính trước cơ mưu</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nhân hữu mưu vọng<br>Thiết mạc khuy ty<br>Cấp tác đề phòng<br>Phương miễn tai chí<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Như muốn có tính toan<br>Chớ đưa mắt lén dòm<br>Phải đề phòng cẩn thận<br>Công việc mới vuông tròn<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như Hạ Hầu Đôn đánh giặc với Lưu Huyền Đức, bị tên bắn trúng mù mắt. Người xin được quẻ xăm này, ráng lo phòng ngừa kẻo mang hại, hôn nhân không nên tính, phải nhẫn lòng mà chờ thời tới, đừng nóng vội mà hư việc.
`
},

"079":{
title:"SỐ 79 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bà la tích quyết khổ lao thần</div><div style="text-align:center;">Quát cấu ma quang thuỷ kiến chân</div><div style="text-align:center;">Thế sự mạc tương dung dị đắc</div><div style="text-align:center;">Tùng lai phú quí tại tân cần</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mò tìm lựa chọn khổ tinh thần</div><div style="text-align:center;">Quét bụi lau chùi mới tỏ phân</div><div style="text-align:center;">Việc đời đâu phải dễ dàng có</div><div style="text-align:center;">Xưa nay giàu quí bởi chuyên cần</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thạch trung hữu ngọc<br>Sa lý hữu kim<br>Tất lao tâm lực<br>Thuỷ ngộ tri âm<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trong đá ôm ngọc xinh<br>Đãi cát vàng được nhìn<br>Phải nhọc công tốn sức<br>Người mới hiểu rõ mình<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như ông Đào Khang tuy làm quan, mà hàng ngày vẫn đi gánh gạch, có người can thì ông nói rằng: " Phàm việc gì phải làm mới có ăn, chớ làm quan cũng chưa chắc chi bền ". Người xin được quẻ  xăm này, phải gắng siêng năng làm việc, thì giàu sang là do tự làm mà có.
`
},

"080":{
title:"SỐ 80 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phi hồn phi phách khứ mang mang</div><div style="text-align:center;">Nhất đản gia môn sự bất tường</div><div style="text-align:center;">Huống thị thu quang tương nhật mộ</div><div style="text-align:center;">Nhạn phi lao lượng quá than đầu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Hồn phách loạn quay rối nhiễu nhương</div><div style="text-align:center;">Cửa nhà điều xấu chẳng bình thường</div><div style="text-align:center;">Như nắng chiều thu mờ mịt tối</div><div style="text-align:center;">Nhạn kêu lảnh lót vượt màn sương</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Thế thái diêm lương<br>Sự giai bất tường<br>Phu thê ly biệt<br>Cốt nhục tương thương<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Thế thái lạnh tới nồng<br>Việc làm chẳng được thông<br>Vợ chồng xa chia cách<br>Ruột thịt lại bất đồng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện Vương Chiêu Quân đi cống Hồ, khi đến biên giới đất Hán gãy xong khúc tỳ bà, liền tự vận mà chết. Người xin được quẻ xăm này, gắng lo tu nhân tích đức, nếu không tai hoạ gieo đến ngay mình, các việc nên khá đề phòng.
`
},

"081":{
title:"SỐ 81 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhân ngôn hải thượng hữu thần tiên</div><div style="text-align:center;">Phương sĩ như hà khứ vị hoàn</div><div style="text-align:center;">Đại để tuyết hoa vô thực tích</div><div style="text-align:center;">Thế gian vô lộ đáo huyền môn</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lời người trên biển có thần tiên</div><div style="text-align:center;">Tu thành sao chẳng trở về liền</div><div style="text-align:center;">Có chăng như tuyết không tông tích</div><div style="text-align:center;">Đường đâu đi tới cõi hư huyền</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Chiêm sự vị thành<br>Vọng sự vị chí<br>Đại để hư hoa<br>Trung vô thực ý<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Việc chưa được thành công<br>Cớ sao mãi ngóng trông<br>Như hoa đà rũ héo<br>Tiếc chi khổ nặng lòng<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện vua Lương Võ Đế dốc tâm tu theo Phật, sau bị nịnh thần vây nhốt, phải chịu chết đói ở Đài Thành, Phật cũng không ra cứu nổi. Người xin được quẻ xăm này, việc gì cũng giả dối chứ không có thật, duy có chuyện kiện thưa thì ít lo ngại, còn việc khác đều xấu cả.
`
},

"082":{
title:"SỐ 82 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhất kiểu năng thâu chúng điểu đa</div><div style="text-align:center;">Giao long chung bất dụng trì ba</div><div style="text-align:center;">Lỗ-Hầu vị ngộ giai đại cát</div><div style="text-align:center;">Tang thị an năng trở Mạnh-Kha</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đơn hạc chịu thua đám sẻ đồng</div><div style="text-align:center;">Sóng ao đâu chứa nổi giao long</div><div style="text-align:center;">Tang thị lời sai ngăn Mạnh Tử</div><div style="text-align:center;">Vui mừng khi gặp mặt Lỗ Công</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cát nhân vi thiện<br>Tùng dung sở đắc<br>Khảm thượng lưu thuỷ<br>Biệt vô trở cách<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Được rồi mở miệng cười<br>Làm phước nhận tốt tươi<br>Khe sâu nước mãi chảy<br>Nào ai ngăn trở người<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như chuyện ông Mạnh Tử khi ra mắt vua nước Lỗ, bị Tang Thương nói lời ngăn trở, vua Lỗ không tin tự ra đón tiếp từ xa. Người xin được quẻ xăm này, mọi việc chớ nên nóng vội, phải thong thả đợi thời, thì dịp may tự đến.
`
},

"083":{
title:"SỐ 83 TRUNG BÌNH ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lôi tuyết bàn đà tác giải thì</div><div style="text-align:center;">Nhân phùng thời thử kiếp trừ chi</div><div style="text-align:center;">Sở như vạn sự vĩnh giai thích</div><div style="text-align:center;">Thật thị cầu tài nhược vị trì</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Sấm chớp mưa giăng nước dập vùi</div><div style="text-align:center;">Gặp tiết như vầy hãy tạm lui</div><div style="text-align:center;">Muôn việc có làm nên hiểu rõ</div><div style="text-align:center;">Cầu tài thật sự cũng chưa vui</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Lợi khẩu mạc tin<br>Lôi vũ tác thấp<br>Vạn sự vĩnh thích<br>Bất lợi cầu tài<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mồm mép chớ nên tin<br>Sấm mưa nước ướt mình<br>Các việc nên nhận rõ<br>Tài lợi đừng cầu xin<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện ông Đào Khiêm đời Tam quốc bị Tào Tháo đánh, bị thua may nhờ bộ hạ đến cứu, Tào Tháo phải rút quân về. Người xin được quẻ xăm này, việc chi cũng phải đợi thời, đừng quá vội vàng mà gặp cơn nguy hiểm, có quí nhân phò trợ, gắng ẩn nhẫn đợi thời.
`
},

"084":{
title:"SỐ 84 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Khuyển phệ hà thương nhật nguyệt minh</div><div style="text-align:center;">Thương thần thiệt kiếm tổng thành không</div><div style="text-align:center;">Hại nhân tự hại chung vô ích</div><div style="text-align:center;">Thiết cẩu hà lai tự thực thân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Miệng đao lưỡi kiếm cũng hoài công</div><div style="text-align:center;">Chó sủa hại chi ánh nắng hồng</div><div style="text-align:center;">Hại người tự hại làm vô ích</div><div style="text-align:center;">Chó sắt há mồm cắn được không</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Sàm ngôn vị thính<br>Lợi khẩu mạc tin<br>Độc nhân vị độc<br>Thiên lý tự minh<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lời quấy xin đừng nghe<br>Mồm mép phải e dè<br>Người độc chưa là độc<br>Lẽ trời biết hãy khoe<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Phạm Tăng, muốn giết Lưu Chúa mà không thành, trái lại còn bị đuổi bãi quan, về mang bệnh ung thư mà thác. Người xin được quẻ xăm này, mọi việc nên tu nhân tích đức, đừng đem lòng hại người mà mang hoạ, mọi việc nên ngay thẳng, thì có thần linh theo phò trợ.
`
},

"085":{
title:"SỐ 85 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thiên thời cữu hạn phùng cam vũ</div><div style="text-align:center;">Không cốc truyền thanh văn hảo âm</div><div style="text-align:center;">Sự phá bất thông thông tắc biến</div><div style="text-align:center;">Ngẫu ngộ quí nhân tức toại tâm</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nắng trời khô hạn gặp mưa rào</div><div style="text-align:center;">Dội tiếng vực sâu rền biết bao</div><div style="text-align:center;">Các việc vận thời luôn biến đổi</div><div style="text-align:center;">Toại lòng người quí giúp tay vào</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Trạm thạch phùng ngọc<br>Đào sa kiến kim<br>Hốt ngộ thông biến<br>Vạn sự xưng tâm<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Chẻ đá có ngọc xinh<br>Đãi cát vàng được nhìn<br>Từ nay đường thông thuận<br>Vạn việc hợp ý mình<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Hàn Tương Tử tu được thành tiên. Người xin được quẻ xăm này, phải cố gắng trong công việc, chớ nên nóng vội, trước khó sau dễ thêm thần linh giúp sức, chắc chắn thành công.
`
},

"086":{
title:"SỐ 86 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thất vật thối thường tiêu vô tình</div><div style="text-align:center;">Nam sưu bắc sách khổ lao tâm</div><div style="text-align:center;">Dã tri nhân hướng đông tây khứ</div><div style="text-align:center;">Thuỷ hoạt uyên thâm hà xứ tầm</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vật mất cũng là của nổi chìm</div><div style="text-align:center;">Nam hỏi bắc dò khổ nhọc tim</div><div style="text-align:center;">Đông nam đã rõ đường đi tới</div><div style="text-align:center;">Vực sâu biển rộng biết đâu tìm</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vọng sự vị chí<br>Đông nam tây bắc<br>Thất vật vị hoạch<br>Uổng lao tâm lực<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Mong việc chưa tới nơi<br>Tìm trông bốn phương trời<br>Mất đồ chưa thấy được<br>Nhọc lòng chẳng nghỉ ngơi<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như lúc Tần Thuỷ Hoàng khi đi qua hồ Ba Dương, bị sóng to gió lớn, các quan liền tâu phải liệng ấn, xuống trấn ếm mới được bình an, Sau cũng phải nghe lời sóng gió mới yên lặng, Người xin được quẻ xăm này, phải tuỳ theo cơ hội làm ăn mới khá, đứng quá hấp tấp mà hư việc.
`
},

"087":{
title:"SỐ 87 THƯỢNG THƯỢNG ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Đại điền đa giá khánh niên phong</div><div style="text-align:center;">Lục súc phiên sanh dụng bất cùng</div><div style="text-align:center;">Nữ giá nam hôn quan sự cát</div><div style="text-align:center;">Cánh nghi tác phước tạ cao khung</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ruộng đất mênh mông lại trúng mùa</div><div style="text-align:center;">Khoai lang gia súc chẳng cần mua</div><div style="text-align:center;">Gái trai kết hợp cầu quan tốt</div><div style="text-align:center;">Lòng vui ban phước tạ ân vua</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Nam hôn nữ giá<br>Lục súc hưng sanh<br>Đại điền đa giá<br>Vạn sự hàm hanh<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Hợp trai gái vợ chồng<br>Chăn nuôi lại ưng lòng<br>Lúa vàng đồng ruộng lớn<br>Vạn việc đều hanh thông<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện vua Thuấn ngày xưa đi làm ruộng nơi núi Lịch, có voi ra kéo cày giúp, chim lượm cỏ hộ, vua Nghiêu thấy là người chí hiếu, mới truyền ngôi và gả con gái cho. Người xin được quẻ xăm này, cầu việc được toại ý thành công.
`
},

"088":{
title:"SỐ 88 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hoài bảo mê bang sự vị nghi</div><div style="text-align:center;">Dạ quang minh nguyệt ám đầu cơ</div><div style="text-align:center;">Tương phùng án khiếm quân tri phẩu</div><div style="text-align:center;">Khả dĩ tàng châu đãi giá thì</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ôm ấp giàu sang dạ thẫn thờ</div><div style="text-align:center;">Đêm đen trăng tối rọi lơ mơ</div><div style="text-align:center;">Gặp nhau chuôi kiếm tay sờ lấy</div><div style="text-align:center;">Ngọc châu cao giá hãy xin chờ</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Ngọc vị khả đầu<br>Hoá vị khả do<br>Uổng tác mưu vọng<br>Bất như thả thủ<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Ngọc quí chưa được sờ<br>Đổi thay chỉ lơ thơ<br>Uổng công người mơ tưởng<br>Chi bằng hãy tạm chờ<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện Dương Hoà muốn ra mắt đức Khổng Tử, nhưng Khổng Tử không chịu, vì không phải là người ông muốn gặp. Người xin được quẻ xăm này, thường phải giữ bổn phận, không nên làm càn mà mang họa, Thu Đông tuy có trở ngại nhưng không hề chi.
`
},

"089":{
title:"SỐ 89 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Biến hoá chu môn hỷ hữu tam</div><div style="text-align:center;">Sĩ nông công cổ vượng điềm tàm</div><div style="text-align:center;">Hôn nhân bất cữu thành giai ngẫu</div><div style="text-align:center;">Cầu tự quy phòng đắc mỹ nam</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Chuyển vận cửa nhà tốt lắm thay</div><div style="text-align:center;">Các giới kinh doanh thâu bảo tài</div><div style="text-align:center;">Hôn nhân mau mắn thành chồng vợ</div><div style="text-align:center;">Nối dòng cầu tự được con trai</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Chu môn biến hoa<br>Sự hữu đại cát<br>Sĩ nông công cổ<br>Sở hướng giả đắc<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Đèn hoa cửa rực vàng<br>Đường tươi tốt thênh thang<br>Các giới như có hỏi<br>Tất cả được giàu sang<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như lúc ông Lưu Bị đi cầu hiền ra giúp nước. Người xin được quẻ xăm này, muôn việc đều thoả nguyện, công danh cao chức, giàu sang rực rỡ, sanh con trai, gia trạch bình yên.
`
},

"090":{
title:"SỐ 90 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thử nha tước dụng ám tương khuy</div><div style="text-align:center;">Thử vãng kỳ hàn khởi oán bi</div><div style="text-align:center;">Thất vật bất tu nhân hộ ngoại</div><div style="text-align:center;">Sở vương sở thất diệc hề nghi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tới mùa đông hạ khởi sầu bi</div><div style="text-align:center;">Nhỏ nhen việc ấy giận làm gì</div><div style="text-align:center;">Vật mất sao đi xa khổ kiếm</div><div style="text-align:center;">Tự làm tự mất tự hiềm nghi</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Sàm ngôn tứ khởi<br>Thả tự đề phòng<br>Sự vị tận ngôn<br>Hoạ khởi tiêu tường<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lời sai quấy loạn vây<br>Phòng thân ngay lúc này<br>Việc chưa rành bày tỏ<br>Trong nhà hoạ là đây<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thuỷ, như Hạng Võ muốn gồm thâu thiên hạ, song bỏ kẻ hiền tài, chuộng người gian nịnh, đến nỗi phải bại binh tự vận nơi sông Ô Giang. Người xin được quẻ xăm này, việc giàu nghèo là do trời định, chớ nên ỷ sức mình, tuỳ theo cơ hội mà làm việc.
`
},

"091":{
title:"SỐ 91 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tuỳ thời tri nghĩa cánh tri tân</div><div style="text-align:center;">Cử động ứng tu ngộ quí nhân</div><div style="text-align:center;">Lợi ích danh dương nghi tiến bộ</div><div style="text-align:center;">Tự nhiên hoạ khứ phước lai lâm</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Lễ nghĩa phải theo giữ đúng thời</div><div style="text-align:center;">Việc làm người quí có nơi nơi</div><div style="text-align:center;">Lợi ích thanh danh đều tiến bộ</div><div style="text-align:center;">Phước, tiền tài tới hoạ xa rời</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Tuỳ ý chi thời<br>Cánh nghi canh cải<br>Lợi lộ danh dương<br>Quang huy khả đãi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Lúc này ý phải tuỳ<br>Hợp tình đổi mới đi<br>Đường lợi danh chói rạng<br>Được rồi thêm phát huy<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như Triệu Tử Long theo Công Tôn Toản sau theo Lưu Bị. Người xin được quẻ xăm này, phải biết tuỳ thời theo cơ hội mà làm việc, thì mới nên được, như chim chọn cành đậu, người khôn tìm đường thẳng mà đi, khôn khéo thì mọi việc đều toại nguyện.
`
},

"092":{
title:"SỐ 92 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Trường giang lãng noãn ngư tranh du</div><div style="text-align:center;">Không cốc xuân hồi hoa chánh khai</div><div style="text-align:center;">Đắc địa đắc thời tu tiến bộ</div><div style="text-align:center;">Hảo tương tông tích xuất trần ai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Sông dài nước mát cá tung bơi</div><div style="text-align:center;">Thung lũng xuân về hoa sắc tươi</div><div style="text-align:center;">Địa lợi thiên thời đều hợp tiến</div><div style="text-align:center;">Cất bước ung dung dạo khắp trời</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Đắc địa đắc thời<br>Hoa vật hy hy<br>Quân tử tương dụng<br>Danh cao lợi toại<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Địa lợi hợp thiên thời<br>Hoa vườn nở xinh tươi<br>Nếu như ta làm tới<br>Lợi cao danh chói ngời<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Đào Uyên Minh về ở ẩn tại nhà ung dung tự tại. Người xin được quẻ xăm này, phải hết sức sửa mình thì công danh lừng lẫy, giàu sang rực rỡ, mùa thu đông thì có lợi, xuân hạ bình thường, đừng nên thối chí.
`
},

"093":{
title:"SỐ 93 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Cách cố canh tân sự kiến kỳ</div><div style="text-align:center;">Đình tiền khô thụ tái sanh chi</div><div style="text-align:center;">Nhược phùng niên thử ngưu đầu thượng</div><div style="text-align:center;">Quí khách tương chiêu bất dụng nghi</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nhà cây già cỗi mọc cành non</div><div style="text-align:center;">Thay mới tốt tươi cũ chẳng còn</div><div style="text-align:center;">Cuối Tý Sửu đầu năm được gặp</div><div style="text-align:center;">Khách quí mời chào hãy tính toan</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Cách cố đỉnh tân<br>Bỉ cực thái lai<br>Tý sữu chi nguyệt<br>Công danh thành toại<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Xây mới cũ bỏ ngay<br>Bỉ cực tới thái lai<br>Chờ qua tháng Tý Sửu<br>Thành công danh lợi này<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện anh em nhà họ Điền sinh sống hoà hợp cùng nhau, cũng như cây khô mọc thêm nhánh non. Người xin được quẻ xăm này, khá cư xử hoà thuận trong gia đạo, anh em nhường nhịn nhau mới làm nên việc đặng, lại có thánh thần trợ giúp, gặp hung hoá cát chẳng nên lo.
`
},

"094":{
title:"SỐ 94 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Yến an chấm độc bất khãm lân</div><div style="text-align:center;">Tương oán vi ngu tác hoạ ương</div><div style="text-align:center;">Giả sử tự thân năng thích miễn</div><div style="text-align:center;">Gia trung hoàn hữu phụ nhân tai</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Yến thiêu rượu độc chớ nên gần</div><div style="text-align:center;">Thù giận chung vui hại đến thân</div><div style="text-align:center;">Sáng suốt nếu như nay bỏ được</div><div style="text-align:center;">Trong nhà giới nữ hãy lo lần</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>An cư lự nguy<br>Hỷ sự thành bi<br>Hữu phi thành tai<br>Nữ nhân kiến chi<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Yên ngồi lại suy ra<br>Vui biến xấu cửa nhà<br>Rắc rối thành tai hoạ<br>Phái nữ hãy phòng xa<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Ngũ Viên đi lánh nạn. Người xin được quẻ xăm này, phải cố gắng làm ăn, chớ nên buông lỏng mà gây tai nạn, luôn phòng ngừa tai hoạ, xảy đến cho phái nữ trong nhà.
`
},

"095":{
title:"SỐ 95 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Môn toả phi phong nhật sắc hôn</div><div style="text-align:center;">Trường không đặc địa khởi sầu vân</div><div style="text-align:center;">Cô đường tịch mịch nhân hà tại</div><div style="text-align:center;">Dĩ thuyết cần lao bất ngộ quân</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đất bằng trời rộng vắng buồn hiu</div><div style="text-align:center;">Cửa khoá gió yên nắng ngã chiều</div><div style="text-align:center;">Nhà hoang cô tịch người không thấy</div><div style="text-align:center;">Khổ sức tìm hoài mãi réo kêu</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Môn toả phi phong<br>Trạch xá hư hao<br>Cốt nhục tương thương<br>Chiêm bệnh nan thuyên<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Nhà cửa phải hao thua<br>Then cài gió sao lùa<br>Bệnh nhiều chưa thuyên giảm<br>Ruột thịt lại ganh đua<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như chuyện người Thọ Xương, xin từ quan để lo đi tìm Mẹ. Người xin được quẻ xăm này, nên cẩn thận moi việc, dữ nhiều lành ít, bệnh có nhiều nguy hiểm, gắng cầu Trời Phật phò hộ cho.
`
},

"096":{
title:"SỐ 96 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Mạng thúc thời quai mạc cưỡng cầu</div><div style="text-align:center;">Đắc an thân xứ kiến ưu du</div><div style="text-align:center;">Nhược ngộ thượng thiên nhân khai khẩu</div><div style="text-align:center;">Biệt hữu sanh nhai bất tại hưu</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Số phận lận đận đừng cố cầu</div><div style="text-align:center;">An thân mãn nguyện chẳng sầu đau</div><div style="text-align:center;">Gặp người chỉ lối lên Thiên Cung</div><div style="text-align:center;">Đời khác mở ra, chớ ngại ngùng</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Mạng thúc thời quai<br>Bất như thả thủ<br>Hốt ngộ quí nhân<br>Vô trung kiến hữu<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Vận mạng đã lệch sai<br>Hãy tạm chờ lúc này<br>Bỗng có người quí giúp<br>Việc làm sẽ thẳng ngay<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành kim, như vua Tống Nhân Tôn, khi mới chào đời cứ khóc hoài, đến khi có thầy cao tay đến làm phép mới chịu nín. Người xin được quẻ xăm này, phải cầu Trời khấn Phật thì tai hoạ mới tiêu tan, chớ nên cưỡng lại ý trời mà mang hoạ.
`
},

"097":{
title:"SỐ 97 TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xuân thu trực bút kiến nhân hàn</div><div style="text-align:center;">Bảo biếm phân minh sự sự nan</div><div style="text-align:center;">Du hạ tư thời tiên học thánh</div><div style="text-align:center;">Nhất hào vị cảm lộ từ đoan</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xuân thu ngay thẳng viết ghê người</div><div style="text-align:center;">Khen chê trung nịnh rõ mười mươi</div><div style="text-align:center;">Con cháu mai sau nên đọc thuộc</div><div style="text-align:center;">Làm không trung thật bị đời cười</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Vận thời gần đến nơi<br>Kỳ mạng tiệm hanh<br>Dần mão chi nguyệt<br>Vị kiến thăng đằng<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Vận thời sắp đến nơi<br>Mạng này dần thảnh thơi<br>Qua tới tháng dần mão<br>Lên cao được sáng ngời<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành mộc, như chuyện ông Khổng Tử làm kinh Xuân Thu, khen chê rất công bằng đúng đắn, dầu văn tài như thầy Tử Do, Tử Hạ cũng không sửa được chữ nào. Người xin được quẻ xăm này, khá an phận chớ nên cầu cạnh mà thêm nhọc nhằn, gia đạo bình an êm thuận.
`
},

"098":{
title:"SỐ 98 HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quan phù khẩu thiệt bất tằng truyền</div><div style="text-align:center;">Bá quái sanh lai xả hoang lương</div><div style="text-align:center;">Dạ mộng cánh chiêu ma quỉ thịnh</div><div style="text-align:center;">Khả nghi trai giới chúc thần minh</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Chưa từng truyền miệng lệnh quan trên</div><div style="text-align:center;">Thê lương tiếng lạ tới vang rền</div><div style="text-align:center;">Nằm mộng quỉ yêu thêm quấy rối</div><div style="text-align:center;">Kính thần trai giới gấp trình lên</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Gia môn tai biến<br>Khẩu thiệt quan phi<br>Nghi khấu thần minh<br>Tất trượng phò trì<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Trong nhà phát hoạ tai<br>Kiện tranh cải lúc này<br>Nên khấn cầu thần thánh<br>Tới liền trợ giúp ngay<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện ông Nhạc Phi nằm mơ thấy hai con chó sủa nhau, người giải mộng nói đó là chữ ngục (獄 = khuyển+ngôn+khuyển), sau quả y như lời phải bị tù. Người xin đặng quẻ xăm này, phải cầu trời khấn phật phò trợ mới được an lành.
`
},

"099":{
title:"SỐ 99 THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tự thiếu tân cần đắc nhất quan</div><div style="text-align:center;">Kỷ niên mai một bạc thư nhàn</div><div style="text-align:center;">Tâm tư mộng lý đa điên đảo</div><div style="text-align:center;">Điên đảo thuỳ tri đắc tự an</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tự nhỏ vùi mài được chức quan</div><div style="text-align:center;">Mấy năm đèn sách chẳng an nhàn</div><div style="text-align:center;">Trong lòng lo sợ luôn nghiêng ngã</div><div style="text-align:center;">Nào hay nghiêng ngã được an khang</div><hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;"><table style="margin:auto;border-collapse:collapse;"><tr><td style="width:250px;vertical-align:top;padding-right:15px;text-align:center;"><b>Giải:</b><br>Tân cần đắc cát<br>Cầu tài nghi hoà<br>Vận thời hậu lợi<br>Bệnh tức thối tán<br></td><td style="border-left:2px solid #000;"></td><td style="width:250px;vertical-align:top;padding-left:15px;text-align:center;"><b>Dịch:</b><br>Tốt lành phải chuyên cần<br>Đường tài chớ buâng khuâng<br>Vận thời sau sẽ tới<br>Bệnh an khoẻ tấm thân<br></td></tr></table><br><b>Lời bàn:</b><br>Quẻ xăm này thuộc về hành thổ, như chuyện người Cấp Ấm chức làm đến quan Thái Thú, mà trong lòng luôn rầu lo, người xin được quẻ xăm này, trước tuy điên đảo sau bình an vô sự, tài lợi chẳng có, tật bệnh mau dứt, gia đình bình an.
`
},

currentType = type;

num = num.trim();
if(num === "") return "";
return num.padStart(3,'0');
}

let raw = document.getElementById('number').value;

let data = xamData[currentType][num];
