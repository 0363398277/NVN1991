<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đình Thần Long Hưng</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:linear-gradient(135deg,#f7f3e9,#e8e0c9);
}

/* HEADER TRANG NGHIÊM */
.header{
    text-align:center;
    padding:20px 10px;
    background:linear-gradient(90deg,#8b6b2f,#c9a86a,#8b6b2f);
    color:white;
    box-shadow:0 3px 15px rgba(0,0,0,0.2);
}

/* DÒNG 1 - ĐÌNH THẦN */
.title-main{
    font-size:34px;
    font-weight:bold;
    letter-spacing:3px;
    text-transform:uppercase;
}

/* DÒNG 2 */
.title-sub{
    font-size:16px;
    margin-top:5px;
    opacity:0.95;
}
/* LOGO GIẢ LẬP */
.logo{
    width:40px;
    height:40px;
    border-radius:50%;
    background:white;
    position:absolute;
    left:20px;
    top:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#8b6b2f;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    padding:25px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

.btn{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn1{
    background:#084f00;
    color:white;
}

.btn2{
    background:#ff0000;
    color:white;
}

/* MAIN */
.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    display:none;
}

input{
    padding:12px;
    width:80%;
    font-size:16px;
    text-align:center;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#8b6b2f;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    line-height:1.8;
    white-space:pre-wrap;
}

.xam-number{
    text-align:center;
    color:#b8860b;
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
    padding:10px;
    border-bottom:2px solid #d8c08a;
}
@media (max-width:768px){

    .title-main{
        font-size:24px;
        letter-spacing:1px;
    }

    .title-sub{
        font-size:13px;
    }

    .logo{
        width:32px;
        height:32px;
        left:10px;
        top:10px;
    }

    .container{
        margin:15px;
        padding:15px;
    }

    .popup-box{
        width:90%;
        max-width:320px;
    }

    input{
        width:100%;
        box-sizing:border-box;
    }

    .xam-number{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">☯</div>

    <div class="title-main">
        ĐÌNH THẦN
    </div>

    <div class="title-sub">
        PHƯỜNG LONG HƯNG - THÀNH PHỐ ĐỒNG NAI
    </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-box">
<h3>THỈNH LINH XĂM KHAI QUẺ</h3>

<button class="btn btn1" onclick="selectType('QUAN_THANH')">
QUAN THÁNH LINH XĂM
</button>

<button class="btn btn2" onclick="selectType('THANH_MAU')">
THÁNH MẪU LINH XĂM
</button>

</div>

</div>

<!-- MAIN -->
<div class="container" id="main">

<h3>Nhập số xăm</h3>

<input id="number" placeholder="Nhập số quẻ xâm cần xem">

<br>

<button onclick="getXam()">Xem quẻ</button>

<div class="result" id="result"></div>

</div>

<script>

let currentType = "";

/* DATA */
const xamData = {

QUAN_THANH: {

"001":{
title:"SỐ 001 - THƯỢNG THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nguy nguy độc bộ hướng vân giang,</div><div style="text-align:center;">Ngọc diện thiên quan đệ nhất ban.</div><div style="text-align:center;">Phú quí vinh hoa thiên phó nhữ,</div><div style="text-align:center;">Phước như Đông hải thọ như sơn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Một mình thong thả thưởng vân giang,</div><div style="text-align:center;">Điện ngọc đền vàng nhất phẩm ban.</div><div style="text-align:center;">Phú quí vinh hoa thiên tài định,</div><div style="text-align:center;">Phước như biển cả, thọ như sơn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt công danh có lợi, dầu ai có ý định ngăn trở cũng không làm gì được.</div><div>Thuở xưa Hạng Võ cùng Lưu Ban hứa hẹn cùng nhau hễ dẹp được giặc nhà Tần, như ai nhập Bao Trung trước thì làm vua, ai đến sau thì làm tôi. Lưu Ban đến Bao Trung trước, Hạng Võ đến sau mưu hại Lưu Ban mà hại chẳng được vì là chơn mạng nên được thành công và hưởng phú quí.</div><div>(Truyện Tây Hớn có nói rõ).</div><div>Người xin được xăm này giống như Lưu ban được hưởng phú quí tốt (tốt lắm).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Chuyên tâm khiến chuyển, Phượng đắc tựu thành.</div>
`
},

"002":{
title:"SỐ 002 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vinh hư tiên trướng làng thiên thời,</div><div style="text-align:center;">Tự thứ quân đương bá sự nghi.</div><div style="text-align:center;">Nhược vấn tiền trình qui túc địa,</div><div style="text-align:center;">Cảnh tu phang thốn hào tu di.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nghĩa nên hư đắc thất cũng do trời.</div><div style="text-align:center;">Trăm việc lo toan được thảnh thơi.</div><div style="text-align:center;">Muốn hỏi tiến trình chờ kết quả,</div><div style="text-align:center;">An nhiên vô sự toại lòng thay.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xưa nay như có việc kiện thưa thì nên hòa, có bệnh nên van vái trời Phật may đặng mạnh. Công danh tài lợi có. Nếu như bên nữ giới mà xin được quẻ xăm này thì có điều xứng ý vừa lòng. Bên nam giới cầu công danh thì gặp bậc đại nhân.</div><div>Sự tích Trương Lương, người nước Hán trong khi bôn ba nơi hải ngoại tìm cách cứu nước Hán vì bị Hán thôn tính khi đi chơi chốn Xích Tàng, thời may gặp Huỳnh Thạch Công tiên trưởng giao cho sách binh thơ đồ trận, nhờ đó sau Trương Lương giúp Hớn-bái công làm quân sư báo thù cho nước Hán để danh lưu nơi hậu thế.</div><div>(Truyện Tây Hớn)</div><div>Xăm tốt lắm, làm chi nên đấy.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thiên ban kế dụng, Đáo để thành công.</div>
`
},

"003":{
title:"SỐ 003 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Y thực tự nhiên sanh xứ hữu.</div><div style="text-align:center;">Khuyến quân bất dung khổ tâm,</div><div style="text-align:center;">Dân nâng hiến để tốn trung tính.</div><div style="text-align:center;">Khước lộc lại thành, họa bất xăm.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Cơm áo ở đâu cũng có thức,</div><div style="text-align:center;">Khuyên người chớ nhọc đêm toan tính.</div><div style="text-align:center;">Giữ dạ thảo ngay vẹn tấm lòng,</div><div style="text-align:center;">Phước đến rồi họa cũng phải tiêu.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt bậc trung chứ không tốt lắm, làm ăn phải dè dặt, chậm rãi mà chờ cơ hội, kiện thưa nên hòa, cầu hôn nên thận trọng, việc làm nên phòng tiểu nhân.</div><div>Sự tích Cổ Nghi gặp vua Hớn Văn Đế mà nên danh phận.</div><div>Xăm này cũng tin người mà cũng nên đề phòng người. Mạc tín trực trung, ta phòng nhân bất nhân, bịnh phải đổi thầy, đi xa không lợi.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lên yên còn dụ dự, Ra đi gặp bạn lành.</div>
`
},

"004":{
title:"SỐ 004 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Khứ niên bá sự khởi tương nghi.</div><div style="text-align:center;">Nhược đáo kim niên thời vận suy,</div><div style="text-align:center;">Hào bá biện hương cáo thần phật.</div><div style="text-align:center;">Mục giáo phước tọa hối vô tri.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm rồi trăm việc đặng như nguyền,</div><div style="text-align:center;">Sánh lại năm nay lắm đảo điên.</div><div style="text-align:center;">Đốt nén hương thơm cầu thần phật,</div><div style="text-align:center;">Kẻo tiêu phước hết, muộn thì nguy.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Cầu công danh như đám mây bay, tài lộc có đặng ít, hôn nhân trở ngại, kiện thưa thất bại, có bệnh khó mạnh, đi xa không thành phải ráng mà cầu trời phật thì họa may mới khỏi tai ương.</div><div>Cũng như thuở xưa Tiểu Tần Vương, ba lần vượt thuyền qua sông tất trở ngại, nhờ cầu vái mà được bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Quân hữu cầu vọng, Sự tất hòa hài.</div>
`
},

"005":{
title:"SỐ 005 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tử hử tạm ban bất tự do,</div><div style="text-align:center;">Môn đình tiêu tác lảnh như thu.</div><div style="text-align:center;">Nhược phùng như thử giao thừa nhựt,</div><div style="text-align:center;">Vạn sự hồi xuân bất dụng ưu.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người nay lắm việc chẳng vừa lòng,</div><div style="text-align:center;">Vắng lạnh mùa thu lạnh chưa thông.</div><div style="text-align:center;">Nếu mà gặp được ngày tí, sửu,</div><div style="text-align:center;">Phỉ tình mong ước việc đều xong.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này không được tốt lắm, hao tài, công danh chưa thành đặng, bệnh lâu mạnh, kiện thưa tiền hung hậu kiết, hôn nhân phải xét kỹ càng, người đi xa về chậm.</div><div>Cũng như ngày xưa có người làm quan giữ thành bị giặc vây khốn, phải thủ thành mà chờ sự giải cứu bên ngoài. (Lữ Mông Chánh thủ khốn).</div><div>Người xin đuợc quẻ này như có cầu việc chi thì gặp năm tí, sửu, hoặc tháng tí, sửu, hay ngày tí, sửu mới có hy vọng.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tiểu nhân người nham hiểm, Việc mình chớ lộ ra.</div>
`
},

"006":{
title:"SỐ 006 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hà lao cổ sắt cánh suy sanh,</div><div style="text-align:center;">Thốn bộ như đăng vạn lý trình.</div><div style="text-align:center;">Bi thứ, hoài nghi bất tương tính,</div><div style="text-align:center;">Hưu tương tư ý ức nung tình.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">To nhỏ giọng cầm nỗi nhớ trông,</div><div style="text-align:center;">Đường xa muôn dặm luống trông mong.</div><div style="text-align:center;">Hơn thua chưa chắc về ai được,</div><div style="text-align:center;">Mưu vọng chưa thành chớ có mong.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Quẻ xăm có hơi xấu, công danh trắc trở, tiền bạc hao hụt, vợ chồng cắn đắng, hôn nhân chậm, kiện tụng nên hòa, người xa về chậm, sanh sản bệnh hoạn, phải ráng ăn ở hiền lương mà nhờ ơn trên mới khỏi.</div><div>Cũng như tích ông Lạng Tương Như đem ngọc Biên Hòa qua nước Tần, nhờ có biên tài vô ngại, nên lại đem ngọc trở về Triệu. Sau bị Diêm Pha là tướng võ ỷ quyền lăng nhục Tương Như, nhờ sự nhịn nhục mà sau Diêm Pha cám nghĩa kết làm bạn hữu chí thân. Vợ Lang Tương Như khi vắng chồng ở nhà tự đặt khúc Trường tương tự, cho đến nay hậu thế cũng còn ái mộ ( truyện Đông Châu liệt quốc). Xăm này trước xấu sau tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lấy đức mà báo oán,Thì oán trả lại ơn.</div>
`
},

"007":{
title:"SỐ 007 - ĐẠI KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tiên phong đạo cốt bổn thiên danh,</div><div style="text-align:center;">Hựu ngộ chơn tiên vị chủ manh.</div><div style="text-align:center;">Chỉ nhục đơn thành tọa nham cốc,</div><div style="text-align:center;">Nhứt triêu dẫn lãnh hướng thiên hành.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tiên phong đạo cốt vốn trời sanh,</div><div style="text-align:center;">May gặp nhân tiên chỉ dẫn rành.</div><div style="text-align:center;">Luyện thuốc trường sanh trong động đá,</div><div style="text-align:center;">Ngày sau nhẹ bước tới mây xanh.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Công thành danh toại, xuất hành gặp quí nhân, cầu tài có tài, cầu con có con, cầu bệnh mau mạnh, kiện thưa đắc lý, hôn nhân rất hạp.</div><div>Sự tích ông Lữ Đồng Tân luyện linh đơn sau thành tiên, dương danh nơi chốn Quần Tiên Hội (xem Đông Du Bát Tiên sẽ rõ).</div><div>Xăm tốt lắm nhưng cũng phải là người phước đức và bậc đại nhân mới được như ý. Kẻ tâm trí bậc trung thì ăn ở hiền lương và cầu khẩn ơn trên ban cho mới tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Xuất hành cầu kiết, Gặp bậc quí nhân.</div>
`
},

"008":{
title:"SỐ 008 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Niên lai canh giá khổ vô châu,</div><div style="text-align:center;">Kim tuế điển thù định hữu thu.</div><div style="text-align:center;">Huống ngộ thái bình vô sự nhựt,</div><div style="text-align:center;">Sĩ nông công cố bá vô ưu.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm rồi cày cấy cũng như không,</div><div style="text-align:center;">Chắc định năm nay có mở mang.</div><div style="text-align:center;">Gặp vận thái bình nên nghiệp cả,</div><div style="text-align:center;">Sĩ nông cờ xứng tâm khoan.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xuân, hạ bình bình, thu đông có đại lợi. Vận qua rồi điên đảo, vận đến sẽ an nhàn. Tài có, lợi có, hôn nhân hạp ý, kiện đắc thắng, bệnh mau lành, người đi xa bình an. Cầu công danh có quí nhân chỉ dẫn.</div><div>Sự tích vua Thuấn cày ở núi Lịch sơn trúng mùa, sau vua Nghêu nhường ngôi và gả con gái cho vua Thuấn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thăng đường cận Quí, Mạng vận hanh thông.</div>
`
},

"009":{
title:"SỐ 009 - ĐẠI KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vọng cừ tiêu tức hướng Tràng an,</div><div style="text-align:center;">Thường bả lăng huê tử tế khán.</div><div style="text-align:center;">Kiến thiết thơ văn tương nhập cảnh,</div><div style="text-align:center;">Kim hiệu hỉ sắc thượng mi đoàn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ngóng trông tin tức chốn trường an,</div><div style="text-align:center;">Hàng ngắm cành hoa xem kỹ càng.</div><div style="text-align:center;">Chợt có văn thơ đà đến cửa,</div><div style="text-align:center;">Mặt mày vui vẻ rất hân hoan.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, người xin quẻ này trước thì lao đao, sau thì mới thành tựu.</div><div>Có bệnh phải đổi thầy, hôn nhân hạp, kiện thưa nên hòa, trông tin thì trong 3 ngày sẽ có tin tức, cầu công danh tuy chậm nhưng sẽ có thành tựu vẻ vang.</div><div>Ngày xưa Triệu Khuông Dẩn lúc lưu lạc giang hồ rày đây mai đó, sau rồi tức vị nơi chốn Trần Kiều vua nhà Tống (xem truyện Phi Long).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Rồng nằm đợi gió lớn, Phúc bay bổng mây xanh.</div>
`
},

"010":{
title:"SỐ 010 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bệnh hoạn thời thời mạng kiển suy,</div><div style="text-align:center;">Hà tu tỏa ngỏa công tỏa qui.</div><div style="text-align:center;">Trực giác tùng kiến nhứt đương phục,</div><div style="text-align:center;">Thì khải cầu thần trượng phật trì.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Bệnh hoạn liên miên mạng vận suy,</div><div style="text-align:center;">Nào câu bói hỏi nữa làm chi.</div><div style="text-align:center;">Chờ qua đông chí hay tin đến,</div><div style="text-align:center;">Cầu khẩn mong nhờ phật hộ trì.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi chưa đến, bệnh phải cầu thầy và van vái mới khỏi. Hành nhân trắc trở, kiện thưa thất lý. Hôn nhân cẩn thận, chờ đến mùa đông tháng 10, 11 và tháng 12 mới được bình yên gia đạo.</div><div>Sự tích xưa có anh học trò đi thi xuống Trường An vì mang bệnh hoạn mà lỡ khoa thi.</div><div>Phải làm lành tránh dữ thì mới tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Gặp lúc nên ẩn nhẫn, Chờ thời đợi vận nên.</div>
`
},

"011":{
title:"SỐ 011 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Kim niên hảo sự bất phiên tân,</div><div style="text-align:center;">Phú quí vinh hoa tụy nhữ thân.</div><div style="text-align:center;">Thùy đạo cơ quan nan liệu xử,</div><div style="text-align:center;">Đáo đầu độc lập chuyển thương thần.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Việc tốt năm nay chẳng đổi thay,</div><div style="text-align:center;">Vinh hoa phú quí tụ quanh đây.</div><div style="text-align:center;">Cơ trời thay đổi ai hay được,</div><div style="text-align:center;">Tâm sức tổn hao gặp lúc này.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Đừng tham cầu, danh chưa toại (nếu có đạt được thì cũng không bền), tài lộc bình, kiện tụng bất lợi, Người bệnh hung, việc chưa thành, hỏi người đi gặp nhiều trở ngại, việc chi cũng đừng bàn tính với ai e phản phúc, làm ăn nên phòng tiểu nhân, hôn nhân thận trọng.</div><div>Sự tích như Hàn Tín được phong làm Sở Hoài Vương làm vua một cõi, bị bà Lữu Hầu lập mưu triệu về triều mà giết chết (Truyện Tây Hớn).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Anh hùng chưa gặp vận, Phải ẩn nhẫn đợi thời.</div>
`
},

"012":{
title:"SỐ 012 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vinh vi kỳ vọng tại xuân tiền,</div><div style="text-align:center;">Thủy liệu thu lai hựu bất nhiên.</div><div style="text-align:center;">Trực ngộ thành gian công tử quí,</div><div style="text-align:center;">Nhứt sanh hoạt kế thì an toàn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mùa xuân vọng tín chuyện vinh sang.</div><div style="text-align:center;">Ngờ lại thu sang chẳng vẹn toàn.</div><div style="text-align:center;">Bằng gặp quí nhân người giúp đỡ,</div><div style="text-align:center;">Toan lo mới được trọn đời an.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Công danh chậm, nên đợi chờ, tài lợi chưa có, bệnh nên đổi thầy, kiện thưa nên hòa, hôn nhân phải xét kỹ, đi xa không thành, Sanh đặng nam tử.</div><div>Sự tích ông TÔ VÕ đi sứ qua nước Phiên, bị Thiên Vụ giam cầm bắt chăn dê khổ sở trăm bề, sau thoát nạn trở về xứ thì tuổi đã già nhưng được đời khen ngợi là người có chí trung kiên.</div><div>(Truyện Chiêu Quân cống Hồ)</div><div>Xăm này trước xấu sau tốt, nên tu tâm tích đức mới được an nhàn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Cuộc đời dẫu gặp cơn tai biến,</div><div style="text-align:center;">Lồng lộng vẹn tròn đạo nghĩa nhân.</div>
`
},

"013":{
title:"SỐ 013 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quân kim canh giáp vị hạnh thông,</div><div style="text-align:center;">Thả hướng giang đầu tác điếu ông.</div><div style="text-align:center;">Ngọc thố trùng sanh ưng phát tích,</div><div style="text-align:center;">Vạn nhân đầu thượng sánh anh hùng.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Gặp ngày canh, giáp chưa hanh thông,</div><div style="text-align:center;">Câu cá đợi thời sánh khương công.</div><div style="text-align:center;">Ngày mẹo là ngày người phát đạt,</div><div style="text-align:center;">Trước muôn người rõ mặt anh hùng.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này gặp ngày tháng năm “canh” hoặc “giáp” thì không tốt, gặp ngày tháng năm “mẹo” thì trăm việc gì cũng xong. Người xin được xăm này trong tháng 2 thì tốt lắm.</div><div>Sự tích ông Khương Tử Nha là một bậc nhân tài chưa gặp thời, phải ẩn nhẫn ngồi câu cá bên sông Vị Thủy. Sau ông Châu Văn Vương rước về làm tướng, đánh giặc lập công lớn mà nên danh phận (xem truyện Phong Thần).</div><div>Người xin được quẻ xăm này ráng chờ vận đến sẽ gặp quí nhân (xăm tốt lắm).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Anh hùng mới biết anh hùng,</div><div style="text-align:center;">Gặp nhau giữa chốn trần ai mới là.</div>
`
},

"014":{
title:"SỐ 014 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt kiến giai nhơn tiện hỉ hoan,</div><div style="text-align:center;">Thùy tri khứ hậu hữu đa đoan.</div><div style="text-align:center;">Nhơn tình lịch tận thu vân hậu,</div><div style="text-align:center;">Thế sự đa tri thực đáo bình.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vừa thấy giai nhân đã đẹp lòng,</div><div style="text-align:center;">Nào hay dang dở phải long đong.</div><div style="text-align:center;">Nhân tình thấu đáo càng cay đắng,</div><div style="text-align:center;">Thế sự biết nhiều khổ cũng nhiều.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm xấu, mọi việc trước dễ sau khó, danh lợi chưa thành, hôn nhân trở ngại, bệnh khó lành, đi xa bất lợi, bạn bè phản trắc, buôn bán thì lỗ, sanh đặng con gái.</div><div>Sự tích một anh học trò bị tình nhân phụ bạc. Xăm ý nói nhân tình mà thấu đáo nhiều thì nó mỏng manh như mây mùa thu, còn thế sự mà hiểu rành chừng nào thì nó khó khăn cũng như đường đi lên núi Thục đạo gay go quá.</div><div>Phải cẩn thận và đợi thời vận đến.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lành tốt trời cho rồi sẽ thấy,</div><div style="text-align:center;">An lòng xin chớ vội ưu phiền.</div>
`
},

"015":{
title:"SỐ 015 - TRUNG BÌNH",
content:`
<div style="font-family: Arial; white-space-collapse: preserve; text-align: center;"><b>XĂM CHỮ</b></div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Lưỡng gia môn hộ các tương đương.</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Bất thị nhân duyên mạc giảo lương,</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Trực đài xuân phong hảo tiêu tức,</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Khước điều cầm sắt hướng loan phùng.</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;"><br></div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;"><b>DỊCH NGHĨA</b></div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Đôi bên nhà cửa sánh cùng nhau,</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Chẳng phải nhân duyên chớ ước ao.</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Chờ gió xuân về mang điềm tốt,</div><div style="font-family: Arial; white-space-collapse: preserve; text-align: center;">Vợ chồng hòa thuận hợp cùng nhau.</div><div style="font-family: Arial; white-space-collapse: preserve;"><br></div><div style="font-family: Arial; white-space-collapse: preserve;"><br></div><div style="font-family: Arial; white-space-collapse: preserve;"><b>Lời bàn:</b></div><div style="font-family: Arial; white-space-collapse: preserve;">Hôn nhân chưa đặng, kiện thưa nên hòa, danh lợi chưa có, phòng tiếng thị phi, người đi buôn to được lợi nhưng phải trễ nải, sinh nở khó khăn.</div><div style="font-family: Arial; white-space-collapse: preserve;">Trong "Tây Sương Ký" tích ông Trương Quân Thoại lúc còn nhỏ mến nàng Thôi Oanh có làm bài thơ:</div><div style="text-align: center; font-family: Arial; white-space-collapse: preserve;">Nguyệt chiếu mao sương ốc,</div><div style="text-align: center; font-family: Arial; white-space-collapse: preserve;">Nghinh xuân hạ bán khai.</div><div style="text-align: center; font-family: Arial; white-space-collapse: preserve;">Cánh tường hao ảnh động,</div><div style="text-align: center; font-family: Arial; white-space-collapse: preserve;">Nghi thị ngọc nhơn lai.</div><div style="font-family: Arial; white-space-collapse: preserve;">Trương Quân Thoại chờ trăng mọc đến hiệp mặt cùng nàng Thôi Oanh Oanh, nhưng sau rồi vì hoàn cảnh trở ngại cũng không gần nhau được.</div>
`
},

"016":{
title:"SỐ 016 – HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Vạn sự vưu vưu nan biện minh,</div><div style="text-align:center;">Bất như túc liễu thả qui canh.</div><div style="text-align:center;">Bàn nhơn phiến hoặc quân hưu thính,</div><div style="text-align:center;">Thử sự đương mưu thân đệ huynh.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Muôn sự gay go tỏ bày,</div><div style="text-align:center;">Chẳng bằng lui bước trở về cày.</div><div style="text-align:center;">Người ngoài xúi giục đừng tin tưởng,</div><div style="text-align:center;">Huynh đệ trong thân phải tỏ bày.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa khó, danh lợi không, tài chớ tham, bệnh phải cầu thầy và van vái, hôn nhân chưa thành, chuyện gì nên bàn tính trong nhà, chớ tin kẻ ngoài xúi giục.</div><div>Sự tích trong nhị thập tứ hiếu là Vương Tường vì mẹ đau thèm cá, Vương Tường chẳng quản thời tiết lạnh đi ra khe suối tìm cá cho mẹ ăn. Vì lòng chí hiếu nên thiên hạ ai cũng khen Vương Tường, sự tích lưu để muôn đời.</div><div>Cho nên có câu:</div><div>Hiếu chí ư thiên tắc phong vũ thuận,</div><div>Hiếu chí ư địa tắc vạn vật hóa thạnh,</div><div>Hiếu chí ư nhơn tắc chúng phước lai lâm</div><div>Người xin quẻ xăm này ăn ở có hiếu nghĩa thì ơn trên phù hộ mà nên.</div>
`
},

"017":{
title:"SỐ 017 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Điền viên gia quán hảo thương lương,</div><div style="text-align:center;">Sự đáo công đình bỉ thử thương.</div><div style="text-align:center;">Túng thử cơ quan đồ đắc thắng,</div><div style="text-align:center;">Đinh vi hậu thế tử tôn vương.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Ruộng vườn thiệt giá phải lo lường,</div><div style="text-align:center;">Gặp kiện đến quan khó tỏ tường.</div><div style="text-align:center;">Dầu tính cơ mưu toan đặng thắng,</div><div style="text-align:center;">Thì sau con cháu bị tai ương.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm xấu lắm muôn việc đều trắc trở, có sự ngăn cản, có kẻ lập mưu kế hại mình. Công việc chi cũng bỏ đi đừng làm nữa, phải thối bộ lại, phải giữ mình, thủ phận thì mới được bình an, còn như ráng sức mà làm được việc đi nữa thì ngày sau con cháu sẽ bị thiệt hại. Bệnh phải van vái, kiện tụng nên hòa, đi xa không thành, cầu hôn trắc trở, gặp bạn bè không tốt.</div><div>Sự tích như Thạch Sùng thuở xưa vì khoe của mà bị nạn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lòng mình nên giữ vẹn, Mọi việc chẳng hòa hài.</div>
`
},

"018":{
title:"SỐ 018 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tri quân chỉ nghỉ thị không hoa,</div><div style="text-align:center;">Để sự mang mang vi hữu nhai.</div><div style="text-align:center;">Lao bã khước ngần đạp thật địa,</div><div style="text-align:center;">Thiện vi thiện ứng vĩnh vô sai.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người đừng toan nghĩ chuyện mênh mông,</div><div style="text-align:center;">Những chuyện mịt mờ chớ có trông.</div><div style="text-align:center;">Gắng chí nương theo đường lối cũ,</div><div style="text-align:center;">Làm thiện gặp lành chớ có sai.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi khó cầu, đừng có cao vọng, đừng tính chuyện mênh mông, phải làm lành rốt sau mới có, bệnh cầu thầy, đừng kiện thưa, hành nhân chậm về.</div><div>Cũng như cổ tích là Mạnh Thường quân trong nhà luôn luôn có 3.000 tân khách ăn uống lu bù. Mạnh Thường Quân bị vua lấy lại những đất đã phong, Mạnh Thường Quân không còn tiền của để thiết đãi thì khách đi hết , chỉ còn một người là Phùng Hoan, sau nhờ người này vãn cứu thanh danh cho họ Mạnh . (xem truyện Đông Chu Liệt Quốc).</div><div>Xăm này nên an phận mà chờ quí nhân.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Sớm đầy tối đã lưng, Nhân tình đời như thế.</div>
`
},

"019":{
title:"SỐ 019 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tha tử tùng lai vị đắc thời,</div><div style="text-align:center;">Kim niên trình vận khoa tương nghi.</div><div style="text-align:center;">Đinh cầu động tác đồ như ý,</div><div style="text-align:center;">Hòa hiệp hôn nhơn đặng quý nhi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Buổi trước thương người chưa gặp thời,</div><div style="text-align:center;">Năm nay vận tốt đã đến nơi.</div><div style="text-align:center;">Việc làm sắp đặt điều như ý,</div><div style="text-align:center;">Chồng vợ hiệp hòa con cháu vui.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi toại nhưng còn xa, làm việc nhỏ thì tốt còn việc lớn khó thành công, hôn nhân hạp, kiện thưa đắc ý, có thai sanh trai, người đi xa bình an, bệnh sẽ mạnh.</div><div>Xăm này hạp mùa Thu, Đông, còn mùa Xuân, Hạ thì trung bình.</div><div>Tích xưa, ông Lưu Trí Viễn, gặp vợ hiền làm ăn thạnh phát, sanh con hiếu thảo.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Vô ý cầu tài, Ngẫu nhiên tự đắc.</div>
`
},

"020":{
title:"SỐ 020 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt sanh tâm sự hướng thi luân</div><div style="text-align:center;">Thập bát nan đầu thuyết dữ quân</div><div style="text-align:center;">Thế sự tận cùng lưu thủy khứ</div><div style="text-align:center;">Công danh phú quý đẳng phù vân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Một đời tâm sự tỏ cùng ai,</div><div style="text-align:center;">Mười tám nạn đầu người có biết.</div><div style="text-align:center;">Thế sự cuộc đời như bọt nước,</div><div style="text-align:center;">Công danh phú quí tựa mây bay.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa khó lắm, danh lợi như mây bay gió thổi, đi xa bất lợi, trông người xa chưa về, bệnh phải đổi thầy, hôn nhân trở ngại, mọi việc phải chậm rãi mà chờ thời.</div><div>Sự tích của ông Nghiêm tử Lăng lúc hưng thời được đăng đàn bái tướng làm đến quân sư, sau rồi cũng chán ngán nhân tình bỏ quan mà đi tu.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Khuyên người chớ lo âu, Việc tốt đợi ngày sau.</div>
`
},

"021":{
title:"SỐ 021 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Giả quân túc tích kiết thành oan,</div><div style="text-align:center;">Kim nhựt tương phùng na đắc duyên.</div><div style="text-align:center;">Hảo bả kinh văn đa phúng tụng,</div><div style="text-align:center;">Kỳ cầu hộ nôi bảo thuyền quyên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Vì người kiếp trước kết oan khiên,</div><div style="text-align:center;">Tuy gặp mặt mà đâu phải duyên.</div><div style="text-align:center;">Kinh tụng cho nhiều lo niệm phật,</div><div style="text-align:center;">Cầu cho con mạnh, vợ bình yên.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Làm ăn gặp thời vận đảo điên, cầu trời khấn phật mới bình an. Tài chưa có, đi xa không thành, hôn nhân trở ngại, kiện thưa thất lý, mọi việc nên ẩn nhẫn mà chờ thời.</div><div>Sự tích như Tôn Tẫn cùng Bàng Quyên kết làm anh em chí thân và là đồng đạo. Bàng Quyên vì ganh tài nên mưu hại Tôn Tẫn nhiều phen. (Xem truyện Xuân Thu Oanh Liệt).</div><div>Người xin được quẻ này nên lấy đức mà ăn ở thì việc xấu trở nên tốt, ví như Tôn Tẫn tha thứ cho Bàng Quyên vậy.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thung dung hòa hoản, An phận tùy duyên.</div>
`
},

"022":{
title:"SỐ 022 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bích ngọc trì trung khai bạch liên,</div><div style="text-align:center;">Trang nghiêm sắc tướng tự thiên nhiên.</div><div style="text-align:center;">Sanh lai cốt cách siêu phàm tục,</div><div style="text-align:center;">Chánh thị nhơn gian đệ nhất tiên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Giữa ao bích ngọc sen trắng nở,</div><div style="text-align:center;">Tướng mạo trời sanh đẹp đẽ thay.</div><div style="text-align:center;">Cốt cách thiên sanh khác phàm tục.</div><div style="text-align:center;">Khác gì tiên tử giữa trần ai.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh nên, lợi có, gia đạo an nhàn, vợ chồng xứng ý, bệnh mau lành, đi ra ngoài cầu công danh gặp quí nhân giúp đỡ. Riêng về thi cử thì khó thành.</div><div>Xăm này ứng nghiệm tốt nhất vào mùa Hạ và mùa Thu, mọi việc chờ đến Hạ Thu sẽ tốt lành.</div><div>Sự tích ông Lý Thái Bạch là một nhà thi sĩ khi gặp vua Đường Minh Hoàng, được vua Đường và Dương Quý Phi yêu thích, sau này bị Dương Quốc Trung gièm pha, ông phải từ quan đi ngao du.</div><div>Xăm tốt lắm. Cố gắng sẽ thành công.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Của quí người yêu chuộng,</div><div style="text-align:center;">Giúp mình gặp kẻ sanh.</div>
`
},

"023":{
title:"SỐ 023 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Huê khai, huê tạ tại xuân phong,</div><div style="text-align:center;">Quí tiện nhân gian tại hữu thời.</div><div style="text-align:center;">Tiện tử vinh huê kim dĩ hí,</div><div style="text-align:center;">Đào đầu vạn sự tổng thành không.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Hoa nở đúng xuân hoa lại tàn,</div><div style="text-align:center;">Số người giàu nghèo trời đã ban.</div><div style="text-align:center;">Công danh phú quí đã rũ sạch,</div><div style="text-align:center;">Toan tính muôn việc cũng như không.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Công danh phú quí như mây bay gió lốc, kiện thưa nên hòa, có bệnh mà ráng cầu khẩn ơn trên, hôn nhân trở ngại, đi xa bất lợi, người đi xa chưa về, có thai sanh đẻ bình an.</div><div>Sự tích như Ngô Phù Sai cất quân đi đánh nước Việt, Việt Vương Câu Tiễn bị thua to, phải qua bên Ngô làm con tin 3 năm. Sau được Ngô cho về nước Việt, Việt Vương đem nàng Tây Thi dâng cho Ngô Phù Sai, vì Phù Sai quá yêu Tây Thi nên bỏ bê việc binh. Câu Tiễn thừa cơ cất binh báo thù cho nước Việt. (xem Đông Chu Liệt Quốc).</div><div>Người xin được quẻ xăm này ví như Câu Tiễn, phải ẩn nhẫn mà đợi thời.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Việc tinh còn trở ngại, Nên danh cũng có ngày.</div>
`
},

"024":{
title:"SỐ 024 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt xuân vạn sự khổ ưu phiền,</div><div style="text-align:center;">Hạ lý vinh cầu thỉ niêm nhiên.</div><div style="text-align:center;">Cánh ngộ thu thành đông chí hậu,</div><div style="text-align:center;">Hạp như kỵ hạc giữ ưu tiền.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mùa xuân muôn việc khổ ưu phiền,</div><div style="text-align:center;">Mùa hạ gắng làm cũng chẳng yên.</div><div style="text-align:center;">Thu đến qua đông gặp vận tốt,</div><div style="text-align:center;">Cũng như cỡi hạc cột lưng tiền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này, xuân, hạ bình bình, thu đông mới có cơ thạnh phát. Cầu tài có tài nhưng phải chậm rãi mới được, kiện thưa nên hòa, hôn nhân rất hạp, cầu bệnh cũng mau lành, đi xa cầu công danh rất tốt, người đi chưa về.</div><div>Sự tích xưa kia có một cậu học trò vào động tiên rồi tu học mà về sau đặng nên danh và một vị làm quan đi trấn nhậm phương xa cũng xin được quẻ xăm này thì cũng đặng bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Mọi việc cầu đều tốt,</div><div style="text-align:center;">Công danh hưởng lâu dài.</div>
`
},

"025":{
title:"SỐ 025 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Dần, ngọ, tuất niên đa trở trệ,</div><div style="text-align:center;">Hợi, tý, sửu nguyệt tiêm hanh gia.</div><div style="text-align:center;">Cánh phùng ngọc thố kim kê hội,</div><div style="text-align:center;">Khô mộc phùng xuân tự phóng hoa.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Năm dần, ngọ, tuất rất long đong,</div><div style="text-align:center;">Hợi, tý, sửu thời vận mới xong.</div><div style="text-align:center;">Đợi gặp tháng ngày giờ mẹo dậu,</div><div style="text-align:center;">Cây héo xuân về cũng trổ bông.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa nên hòa, danh lợi chậm, hôn nhân kiết, thai phải dưỡng, người đi sắp về, bệnh mau mạnh.</div><div>Tiết xuân hạ thu việc làm trì trệ , Khi vào mùa đông trăm việc thuận lợi , hợp ngày mẹo dậu mưu cầu mới tốt. “Xăm bất lợi cho những năm Dần Ngọ Tuất”.</div><div>Sự tích vua Đường Minh Hoàng đi chơi trên cung trăng do phép của thầy La Công Viễn hóa ra.</div><div>Xăm tuy trung bình nhưng đặng bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tuy muộn cũng hơn người không có,</div><div style="text-align:center;">An lòng chờ thuở phước tùng lai.</div>
`
},

"026":{
title:"SỐ 026 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Niên lai niên liểm giai thiên số,</div><div style="text-align:center;">Tự thị kim niên hạn đảo đa.</div><div style="text-align:center;">Giả tứ định kỳ tam nhựt nội,</div><div style="text-align:center;">Điềm trù triêm túc võ bàn đà.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Mùa tới đặng thất cũng bởi trời,</div><div style="text-align:center;">Năm nay nắng hạn cũng chơi vơi.</div><div style="text-align:center;">Cùng người định chắc trong ba bữa,</div><div style="text-align:center;">Vườn ruộng gặp mưa rưới các nơi.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Làm việc gì trước hao tổn sau có lợi, kiện thưa đắc thắng, bệnh mạnh, hôn nhân thành, gia đạo yên, công danh có, đi xa thạnh lợi, người đi có tin về.</div><div>Sự tích ông Thiệu Nghêu Phu cầu mưa trong ba ngày thì có mưa to trúng mùa, và một ông thầy đi tu khi đến chùa cũng xin cái xăm này nội trong ba ngày thì chùa có nhiều người đến xin tu rất đông.</div><div>Xăm tốt lắm, hạp mùa thu và đông. Xăm này cầu trăm việc, việc gì cũng trong ba ngày thì thành công.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Việc chớ ưu nghi, Vận hên gần đến.</div>
`
},

"027":{
title:"SỐ 027 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thế gian vạn vật các hữu chủ,</div><div style="text-align:center;">Nhứt hiệp, nhứt hào quân mạt thủ.</div><div style="text-align:center;">Anh hùng hào kiệt tự thiên sanh,</div><div style="text-align:center;">Giả tu bộ bộ tuần qui củ.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thế gian vạn vật đều có chủ.</div><div style="text-align:center;">Hột thóc, mảy lông chớ có màng.</div><div style="text-align:center;">Hào kiệt, anh hùng trời đã định,</div><div style="text-align:center;">Phải gìn từng bước chớ sai đàng.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa nên hòa, bệnh cầu thầy, hôn nhân xét kỹ, người đi chậm về, danh lợi tại mạng của mỗi người mà trời định sẵn, cầu tài chớ quá tham.</div><div>Sự tích xưa vua nhà Minh muốn đốn cây đại thọ, xin quẻ xăm này bàn mà không đốn, và có anh học trò xin quẻ xăm này đặng mà thi đậu trong mùa xuân, và một ông thầy tu đắc đạo tại quận Giang Đông.</div><div>Xăm này trước xấu sau tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Trời cho rồi sẽ thấy, Khuyên người chớ ưu nghi.</div>
`
},

"028":{
title:"SỐ 028 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Công hầu lương tướng bốn vô chương,</div><div style="text-align:center;">Hào bà cần lao kế thượng thiên.</div><div style="text-align:center;">Nhơn sự tận cùng thiên lý kiến,</div><div style="text-align:center;">Tài cao khởi đắc khốn lâm truyền.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tể tướng công hầu bởi mạng phần</div><div style="text-align:center;">Trời ban cho đó bởi lòng cần</div><div style="text-align:center;">Phần người cũng bởi do trời định</div><div style="text-align:center;">Tài giỏi có đâu chịu khốn bần.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Bệnh tật hay thưa kiện có người giúp, danh và lợi phải đợi thời, đi xa gặp quí nhân, làm ăn đổi nghề cũng đặng tốt, nếu thất vật tìm đặng có.</div><div>Sự tích một anh học trò đi thi xin được quẻ xăm này thì đậu và làm quan trọn đời, và một người xin về việc hôn nhân cũng thành tựu, buôn bán đặng lời nhiều.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thời vận hanh thông, Chẳng nên nghi hoặc.</div>
`
},

"029":{
title:"SỐ 029 - THƯỢNG THƯỢNG",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tổ tông tích đức kỷ đa niên,</div><div style="text-align:center;">Nguyên viễn lưu trường khánh tự nhiên.</div><div style="text-align:center;">Nhược cánh tháo tu vô quyện kỷ,</div><div style="text-align:center;">Thiện tu hườn nhử cựu thanh chiên.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tổ tông tích đức đã thâm niên,</div><div style="text-align:center;">Vinh hiển nhiều đời phước tự nhiên.</div><div style="text-align:center;">Khuyên ráng làm lành lòng chẳng mỏi,</div><div style="text-align:center;">Trời cho người được phước liền liền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, mọi sự trời cho, chuyện gì cũng tốt, kiện thưa đắc lý, cầu tài có tài, đi xa gặp quí nhân, thi cử đỗ cao, có thai sanh trai và bình an, gia đạo càng ngày càng hưng thạnh.</div><div>Sự tích ông Tư Mã Ôn Công, than nghèo, sau rồi cũng khá, một anh học trò đi thi xin quẻ này sau thi đậu làm quan cả nhà đặng vinh hiển, và một anh lái buôn đi vay nợ để buôn bán sau làm giàu lại gặp vợ hiền.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Danh nên lợi đến, Tâm chí hân hoan.</div>
`
},

"030":{
title:"SỐ 030 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phụng công cần thù mạc khi tâm,</div><div style="text-align:center;">Tự hữu hanh thông kiết lợi lâm.</div><div style="text-align:center;">Mục hạ dính cầu thả hưu hi,</div><div style="text-align:center;">Thu kì dữ tử định giai âm.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Phép công nắm giữ bỏ tà tâm,</div><div style="text-align:center;">Vận mới hanh thông lợi lộc đầy.</div><div style="text-align:center;">Mọi việc đã lầm thôi khá bài,</div><div style="text-align:center;">Sang thu cho gã phước thêm đầy.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi có nhưng đừng tham, hôn nhân hạp, kiện nên hoà, bệnh tự an, đi xa gặp quí nhân, thi cử đặng công danh. Xăm này hạp mùa thu là tháng 7, 8, 9 sẽ có đại lợi.</div><div>Sự tích một người học trò được một thầy dạy dỗ, sau khi đậu làm quan (Liễu Nghị truyền thơ).</div><div>Xăm tốt nên làm lành làm phải mới thật tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Xuân, hạ, bình thường, Thu, đông đại lợi.</div>
`
},

"031":{
title:"SỐ 031 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Thu đông tác sự chi tầm thường,</div><div style="text-align:center;">Xuân đáo môn đình tạm kiết xương.</div><div style="text-align:center;">Thiên lý tin âm phù viễn vọng,</div><div style="text-align:center;">Huyên đường khoái lạc tự an.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Thu đông mọi việc cũng tầm thường,</div><div style="text-align:center;">Xuân đến gia đình được kiết xương.</div><div style="text-align:center;">Ngàn dặm tin lành trông sẽ đến,</div><div style="text-align:center;">Mẹ cha vui vẻ được an khang.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện phải phòng, bịnh giảm lần, tài mới vượng, danh mới vọng, hành nhân gần về, hôn nhân tốt, gia đạo hòa, có tin lành vui vẻ, có người giúp đỡ.</div><div>Cầu tài thì hạp mùa xuân, mùa thu, đông thì trung bình</div><div>Sự tích ông Châu Công giải chiêm bao có người đi qua biển, người đi qua biển tức là điềm lành, tai nạn qua khỏi, mọi sự hạnh thông.</div><div>Xăm tốt, nên ăn ở cho phải đạo, trời sẽ ban thêm phước.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Xuân về vạn vật tốt thay,</div><div style="text-align:center;">Muôn hồng ngàn tía ấy ngày vinh quang.</div>
`
},

"032":{
title:"SỐ 032 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Lao tâm lục lục kính hà qui,</div><div style="text-align:center;">Tật bệnh kim đa thị dữ phi.</div><div style="text-align:center;">Sự đáo đầu lai hồn tơ mộng,</div><div style="text-align:center;">Hà như hưu yến dụng tâm cơ.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nhọc lòng lận đận chẳng ra chi,</div><div style="text-align:center;">Tật bệnh rất nhiều thêm thị phi.</div><div style="text-align:center;">Việc đến rốt rồi như giấc mộng,</div><div style="text-align:center;">Chi bằng mưu cải bất hành vi.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện không thắng, danh chưa thông, tài cũng không, hôn nhân chưa hợp, thị phi nhiều, người đi trễ,việc trắng tay, bệnh phải lo tìm thầy giỏi.</div><div>Sự tích xưa có 3 anh học trò đi thi đều xin được quẻ xăm này, thi khóa đầu không đỗ, qua khóa sau lại ba người trúng tuyển cả 3.</div><div>Xăm này phải ráng ẩn nhẫn mà đợi thời, đừng nóng nảy.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Lòng với việc chưa xứng,</div><div style="text-align:center;">Nên việc đợi ngày sau.</div>
`
},

"033":{
title:"SỐ 033 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bất phân nam bắc dữ tây đông,</div><div style="text-align:center;">Nhãn để hôn hôn nhĩ tơ lung.</div><div style="text-align:center;">Thục độc Huỳnh Đình kinh như quyện,</div><div style="text-align:center;">Bất luận quới tiện dữ cùng thông.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Khó phân nam bắc với tây đông,</div><div style="text-align:center;">Tai điếc mắt mờ sự khó thông.</div><div style="text-align:center;">Tụng đọc Quỳnh Đình kinh một quyển,</div><div style="text-align:center;">Sang hèn chớ luận phải cho thông.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Bệnh khó mạnh, kiện thất lý, đi xa không thành, gia đạo không yên, hôn nhân cẩn thận, phải ráng ăn ở hiền lương cầu trời phật gia hộ cho.</div><div>Sự tích như ông Trang Tử nằm chiêm bao biết mình tiền thân là con bướm, nên ông ngao ngán mà đi tu, có bài thơ rằng:</div><div>Châu công hiển mộng mơ Hồ Điệp,</div><div>Thực đế xuân tâm hóa Đỗ Quyên</div><div>Ông Châu Công vì chiêm bao biết mình là bướm, còn ông vua Thục Đế vì mất nước mà thành con chim Đỗ quyên.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Trắng đen xem nhẹ, chỉ tại e dè.</div>
`
},

"034":{
title:"SỐ 034 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Xuân hạ tài quá thu hựu đông,</div><div style="text-align:center;">Phân phân mưu sự lãm tâm hung.</div><div style="text-align:center;">Quới nhơn thi thủ lai tương tiếp,</div><div style="text-align:center;">Hưu bả tư tâm tình ý nông.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Xuân hạ qua thu rồi tới đông,</div><div style="text-align:center;">Chước mưu rộn rực rối trong lòng.</div><div style="text-align:center;">Quí nhân dìu dắt mau theo dõi,</div><div style="text-align:center;">Chớ chắc tình riêng phải dụng công.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa vẫn chưa xong, bệnh chưa mạnh đặng phải cầu thầy giỏi, danh lợi có mà phải chờ quí nhân, đi xa đặng lợi, hôn nhân cần xét kỹ, phòng khẩu thiệt.</div><div>Xăm tốt, ý nói không sớm thì chầy thế nào cũng rỡ ràng.</div><div>Sự tích Hàn Tín hồi còn nghèo đi cầu danh lúc gập Tiêu Hà, Tiêu Hà vì bận đi công tác nên có thơ tiến cử gởi Hàn Tín với Lưu Ban. Khi gặp Lưu Ban, để dò tình ý của Lưu Ban thế nào, nên không trình thơ ra. Chừng sau Tiêu Hà về thì Lưu Ban mới hay liền trọng dụng Hàn Tín. (Truyện Tây Hớn).</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Người đi trắc trở hôn nhân khó,</div><div style="text-align:center;">miệng lưỡi kỹ phòng tránh kéo lôi.</div>
`
},

"035":{
title:"SỐ 035 - TRUNG HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Như Ất sơn như họa đối thanh giang,</div><div style="text-align:center;">Môn lý đoàn viên sự sự song.</div><div style="text-align:center;">Thùy liệu bán đồ phân chiết khứ,</div><div style="text-align:center;">Không vi va ngữ đối ngân công.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Núi non như vẻ đối sông trong,</div><div style="text-align:center;">Nhà cửa đoàn viên đủ vợ chồng.</div><div style="text-align:center;">Gãy cánh giữa đàng ai rõ thấu,</div><div style="text-align:center;">Quạnh hiu vắng vẻ chốn phòng không.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này theo thành ý thì xấu lắm, mọi việc chớ cưỡng cầu, có bệnh thì phải cầu thầy và van vái ơn trên, hôn nhân cẩn thận, phòng tiểu nhân ám hại, chỉ có thánh thần che chở mới được.</div><div>Sự tích nàng Chiêu Quân bị quân Mao Giêng Thọ giao thông với Phiên bang làm cho nàng phải hòa Phiên mới đặng cứu trong lúc lâm nguy.</div><div>Xăm này sợ vợ chồng khó hòa hiệp, e có sự tang chế.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Diệu kế ít nhiều như thiết lập,</div><div style="text-align:center;">Phùng bi nữa đường sóng gió lâu.</div>
`
},

"036":{
title:"SỐ 036 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Công danh phú quí tự năng vi,</div><div style="text-align:center;">Ngẫu trước tiên tiền mạc vấn y,</div><div style="text-align:center;">Vạn lý đăng trình quân hữu phận.</div><div style="text-align:center;">Ngô sơn đảnh thưởng hạo tản qui.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tự mình cầu mới được giàu sang,</div><div style="text-align:center;">Thấy kẻ đắc thời chớ thở than.</div><div style="text-align:center;">Muôn dặm cơ đồ người có phận,</div><div style="text-align:center;">Lên non chót vót cũng bình an.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, công danh tài lợi sẽ có nhưng phải chậm mới nên, thành ý khuyên ai xin được xăm này đừng phân bì, đừng ai oán nữa, mỗi người chẳng khác nào hoa nở phải đúng thời kỳ.</div><div>Sự tích xưa có 2 cha con chạy loạn lên núi gặp nhau và một danh sĩ tên La Ân đi cầu quan, xin quẻ này sau gặp vua minh quân có câu: " Tôi hiền gặp vua rất dễ, tài tử gặp giai nhân hơi khó", ( Minh quân lương tể tao phùng dị, tài tử giai nhân tế ngộ nan).</div><div>Xăm tốt cầu hôn rất hạp.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Vận số vinh hoa, Thời chậm đến ta.</div>
`
},

"037":{
title:"SỐ 037 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Phần hương lai cáo phục hà tử,</div><div style="text-align:center;">Thiện ác binh quân nhử tự tri.</div><div style="text-align:center;">Binh khước muội công tâm lý sự,</div><div style="text-align:center;">Xuất môn vô ngại thị thông thời.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Khấn vái đốt hương cũng chẳng từ,</div><div style="text-align:center;">Dữ lành định liệu tự mình tri.</div><div style="text-align:center;">Bỏ điều ám muội làm nay chánh,</div><div style="text-align:center;">Thời vận hạnh thông mới đến kỳ.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Kiện thưa nên hòa, bệnh phải cầu thầy và van vái ơn trên, công danh tuy có mà chậm, đi xa về bình an, hôn nhân hạp.</div><div>Xăm tốt bậc trung, cũng như ông Triệu Nghiêu Phu trong nhà lận đận nghèo nàn, hàng đêm đốt hương cầu nguyện sự bình an, quả được như nguyện, sau con của ông ăn học thành tài thi đỗ làm quan vinh hiển.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Làm lành đảo cáo, ơn trên chứng,</div><div style="text-align:center;">Khuyên chớ ưu nghi, bớt thảm sầu.</div>
`
},

"038":{
title:"SỐ 038 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Trùng ngâm tức tức cô vi,</div><div style="text-align:center;">Thiên lý huyền huyền vọng tín qui.</div><div style="text-align:center;">Đăng đắc vinh huê công tử đáo,</div><div style="text-align:center;">Thu đông khoát khoát võ phi phi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Dê ngâm giéo giắt chịu phòng không,</div><div style="text-align:center;">Tin tức trông sao quá sức trông.</div><div style="text-align:center;">Ngóng đợi phòng không công tử đến,</div><div style="text-align:center;">Thu, đông mưa tạt vận long đong.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này mọi việc còn chậm trễ, tài lợi chưa có, đi xa chưa về, bệnh phải cầu thầy giỏi, xăm này hạp mùa xuân, hạ, nếu nhằm mùa thu và đông thì hay buồn lắm.</div><div>Sự tích như nàng Mạnh Khương rầu nhớ chồng đi ra trấn thủ ngoài biên ải xa xôi, nàng ở nhà buồn rầu mà sanh bệnh, có câu rằng : Trần ai thương hại người xương trắng, Non nước bơ vơ phận má hồng. Thương người chiến sĩ xa xôi, Trăm năm lỡ mối duyên tình vì ai.</div><div>Được xăm này, nếu cầu hôn thì nên xét kỹ.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Một thoáng vinh hoa như giấc mộng,</div><div style="text-align:center;">lui tới vô tình chẳng ở lâu.</div>
`
},

"039":{
title:"SỐ 039 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bắc sơn môn hạ hảo an cư,</div><div style="text-align:center;">Nhược vấn chung thời thân khuyết sơ.</div><div style="text-align:center;">Kham tiếu bạo tàn hứa đa sự,</div><div style="text-align:center;">Lân hồng tùy tiện mạc tu thơ.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Bắc sơn phía dưới ở bình an,</div><div style="text-align:center;">Muốn hỏi mạng thời trước phải toan.</div><div style="text-align:center;">Cười kẻ bạo tàn thêm rộn việc,</div><div style="text-align:center;">Nhạn tin rồi sẽ có thư sang.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Bệnh phải đổi thầy, kiện phải cầu hòa, tài lợi chậm, cầu công danh phải phòng kẻ tiểu nhân ngăn cản, hôn nhân xét kỹ, đi xa không thành, sẽ có tin lành trong gia quyến.</div><div>Sự tích có ông Đào Nguyên Minh từ bỏ công danh về vườn ẩn sĩ, và một người chọn ở yên nơi phía bắc.</div><div>Xăm này nên đề phòng người ganh ghét, rất có thể xuất hành nơi phía bắc sẽ có lợi.</div><div>Xăm này trước xấu sau tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Khuyên đó chớ nghe lời phỉnh,</div><div style="text-align:center;">Cùng ai lui tới chẳng nên gần.</div>
`
},

"040":{
title:"SỐ 040 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tân lai hoán đắc hảo qui mô,</div><div style="text-align:center;">Hà dụng tùy tha bộ dữ sô.</div><div style="text-align:center;">Chỉ thính nhỉ biên tiêu tức đáo,</div><div style="text-align:center;">Kỳ khu lịch tận kiến hanh thông.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Đổi mới thì nên lợi cửa nhà,</div><div style="text-align:center;">Tin theo người ắt nhọc lòng lo.</div><div style="text-align:center;">Lóng tai nghe đợi tin lành đến,</div><div style="text-align:center;">Cam khổ tận rồi mới hạnh thông.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh có, lợi cũng có, việc gì thay cũ đổi mới càng hay, kiện đắc lý, thai nghén bình an, bệnh mau mạnh, cầu hôn hạp, đi xa gặp tri kỷ, có tin lành như ý.</div><div>Sự tích một cậu học trò vì nghe lời anh em bạn chơi bời quá sức, tiền bạc hết, nhưng sau rồi ăn năn lo học hành đi thi đậu làm quan, và ông vua Hớn Quang Võ bị vây, ông xin nhằm quẻ xăm này, sau được thoát khỏi lâm nguy.</div><div>Xăm tốt, làm việc chi nên nấy.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">"Kỳ thu lịch tận hanh thông".</div>
`
},

"041":{
title:"SỐ 041 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Tự nam, Tự bắc, Tự tây đông,</div><div style="text-align:center;">Dục đáo thiên nhai thùy tác để.</div><div style="text-align:center;">Ngộ thử phùng ngưu, tam lộng dịch,</div><div style="text-align:center;">Hảo tương danh tánh bảng đầu đề.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Tẩu nam, tẩu bắc, đến tây đông,</div><div style="text-align:center;">Ý muốn lên trời thật khó mong.</div><div style="text-align:center;">Gặp thời tý, sửu nên cơ hội,</div><div style="text-align:center;">Tên đề đầu bảng rạng danh công.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Có bệnh thì nguy, kiện thưa nên hòa, hôn nhân nên xét kỹ, hành nhân có tin, phú quý tại hậu, công danh muộn, mọi việc làm cần đợi đến năm tháng ngày tí sửu mới thông.</div><div>Sự tích Một anh học trò đi thi vào trường gặp khoa thi Giáp Tý nên thi đậu.</div><div>Xăm này tốt nhưng chậm về hậu lai mới tốt.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thính thiên an mạng, Bất tảo tắc vãn.</div><div style="text-align:center;">(Nghe theo ý trời, mọi việc hanh thông)</div>
`
},

"042":{
title:"SỐ 042 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngã tăng hứa nhử sự hòa giai,</div><div style="text-align:center;">Thùy liệu tu vi nhử tự hoai.</div><div style="text-align:center;">Đãn cãi tân đồ mạc y cựu,</div><div style="text-align:center;">Dinh mưu ứng đắc xứng tâm hoài.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trời đã cho người những sự hay,</div><div style="text-align:center;">Nào lại dè đâu chẳng đặng may.</div><div style="text-align:center;">Thay đổi mới nên, đừng theo cũ,</div><div style="text-align:center;">Mọi sự mưu tính thỏa lòng hay.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Có bệnh nên đổi thầy, kiện thưa nên hòa, hôn nhân nên xét kỹ, hành nhân về chậm, có thai bình an, việc gì thay cũ đổi mới thì tốt.</div><div>Sự tích một người chí hiếu nhà nghèo vì cha chết nên phải bán mình đặng chôn cha, khi đào huyệt lại gặp vàng mà sau trở nên giàu sang, lại được vợ đẹp, và anh học trò ban đầu học văn, sau bỏ học văn sang học võ, thi đậu làm quan.</div><div>Xăm này đổi nghề hay đi xa đặng bình an.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Hiếu chí ư thiên, tấc phong võ thuận.</div><div style="text-align:center;">Hiếu chí ư địa, tắc vạn vật hóa thuận.</div><div style="text-align:center;">Hiếu chí ư nhơn, tắc chung phước lai lâm.</div>
`
},

"043":{
title:"SỐ 043 - TRUNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhứt chỉ quan thơ hòa cấp thôi,</div><div style="text-align:center;">Biện đơn tốc hạ lãng như lôi.</div><div style="text-align:center;">Tuy nhiên mục hạ đa kinh hiểm,</div><div style="text-align:center;">Tiên bảo bình an khứ phục hồi.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Có chiếu trên ban gọi đến mau,</div><div style="text-align:center;">Thuyền con thường gặp sóng ba đào.</div><div style="text-align:center;">Tuy là trước mắt nhiều nguy hiểm,</div><div style="text-align:center;">Trời phật hộ trì cũng chẳng sao.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm đặng trung bình trong mọi việc, việc gì trước thì nguy hiểm mà sau được vẹn toàn. Công danh có, kiện sau thắng, bệnh giảm dần, tiểu nhân ganh ghét nhưng không sao, đi xa thành công, trông tin sẽ có tin lành.</div><div>Lưu Bị lưu lạc ở nhờ đất của Tào Tháo, Tào thì muốn thâu tóm thiên hạ, có ý dò Lưu Bị coi tâm trí thế nào, Lưu Bị giả vờ như người quê mùa, cho nên Tào Tháo không kiểm thúc Lưu Bị. Nhờ vậy mà Lưu Bị mới thoát khỏi tay Tào Tháo, sau lập nên cơ nghiệp nhà Hớn.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Tiểu tâm thiên hạ khứ đắc, Khí cang nhứt bộ nan vi.</div><div style="text-align:center;">(Nhỏ nhoi cho qua buổi sa cơ, chớ làm anh hùng trong lúc hai tay không thì có hại cho thân)</div>
`
},

"044":{
title:"SỐ 044 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Nhữ thị nhơn, trung tối kiết nhơn,</div><div style="text-align:center;">Ngô vi, ngô tác tổn tinh thần.</div><div style="text-align:center;">Kiên lao nhất niệm thù hương nguyệt,</div><div style="text-align:center;">Phú quí vinh huê tại nhử thân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người thiệt lòng tốt đủ nghĩa nhân,</div><div style="text-align:center;">Nghe lầm làm quấy tổn tinh thần.</div><div style="text-align:center;">Đốt hương trì chí thương cầu nguyện,</div><div style="text-align:center;">Phú quí vinh hoa được ấm thân.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Không nên kiện thưa, bệnh phải cầu thầy và van vái trời phật, hôn nhân nên xét kỹ, người đi xa có tin về.</div><div>Như tích xưa có một người giàu sang, ăn xài phung phí, sau ăn năn tu tỉnh, hiếu thảo mẹ cha, cầu khẩn ơn trên, lo học hành sau thi đỗ làm quan, và trong truyện Đông Hớn ông Vương Mảng là tôi có công, nhưng vua Hiến Đế bạc nhược quá, nên Vương Mãng soái vị, hưởng phú quí trọn đời.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Gặp mưa, Rồng chẳng ở ao.</div>
`
},

"045":{
title:"SỐ 045 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Hảo tương tâm địa lực canh vân,</div><div style="text-align:center;">Bí thử sơn đầu tống thị phần.</div><div style="text-align:center;">Âm địa bất như tâm địa hảo,</div><div style="text-align:center;">Tu vi đáo để khước vu quân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Toan lo gắng sức việc cày bừa,</div><div style="text-align:center;">Đất cát mã mồ hãy lọc lừa.</div><div style="text-align:center;">Ruộng tốt đâu bằng lòng dạ tốt,</div><div style="text-align:center;">Trau dồi tâm đức phước dư thừa.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này thánh ý khuyên nên ăn ở hiền lành, cố gắng thì nên cơ nghiệp, có bệnh thì nên cầu thầy, cầu tài có tài, đi xa bình an, cầu hôn hạp, buôn bán thịnh vượng.</div><div>Cũng như thuở xưa đời Tây Hán, Lưu Ban trảm xà khởi nghĩa mà được thiên hạ.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nhân hữu thiện nguyện, thiên địa tùng chi.</div><div style="text-align:center;">Giao long thọ khốn thân đàm nhựt.</div><div style="text-align:center;">Lôi chắng đằng vân định hữu kỳ.</div><div style="text-align:center;">(Con giao long mằm yên dưới gầm cầu là chờ có gió thì nó sẽ bay cao trên mây xanh có lúc)</div>
`
},

"046":{
title:"SỐ 046 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quân thị sơn trung vạn hộ hầu,</div><div style="text-align:center;">Tín tri kỳ mã, thăng kỳ ngưu.</div><div style="text-align:center;">Kim triều mã thượng khán sơn sắc,</div><div style="text-align:center;">Tranh tợ kỵ ngưu đắc tự do.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Người đây cao số tướng công hầu,</div><div style="text-align:center;">Tin rằng cưỡi ngựa sướng hơn trâu.</div><div style="text-align:center;">Nay ngồi ngựa chứng xem sơn thủy,</div><div style="text-align:center;">Mới biết cưỡi trâu chẳng âu sầu.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này danh lợi chớ tham cầu, có bệnh lâu mạnh, kiện thưa thất lý, hôn nhân nên xét kỹ, người đi chưa về, phòng tiểu nhân dòm ngó trong công việc làm ăn.</div><div>Tích xưa có người muốn đổi nghề buôn bán. Câu "Tín tri kỵ mã thắng kỵ ngưu" là ý nói "Cưỡi ngựa cũng như cưỡi trâu", nghĩa là dầu cho đổi nghề thì nghề gì cũng phải làm, vậy thì nghề cũ dễ hơn.</div><div>Sự tích có sự thù oán của chồn và thỏ trả thù nhau.</div><div>Xăm này mọi sự nên hòa mà đợi thời.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Diệu kế sinh nhiều nay biến ngốc,</div><div style="text-align:center;">Thủ phận an tâm mọi việc thông.</div>
`
},

"047":{
title:"SỐ 047 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Dư quân vạn ngữ phục thiên ngôn,</div><div style="text-align:center;">Kỳ dục bình hòa tiết thử oan.</div><div style="text-align:center;">Tụng đáo chung hung quân kỳ thú,</div><div style="text-align:center;">Thi ư thanh dạ bả tâm môn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Dầu cho vạn ngữ với thiên ngôn,</div><div style="text-align:center;">Cũng chẳng bằng hòa khỏi nghiệt oan.</div><div style="text-align:center;">Thưa kiện không xong người nhớ lấy,</div><div style="text-align:center;">Đêm đêm giữ chặt tấm lòng hiền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này ý nói có kiện thưa thì nên hòa, tài lợi chớ tham, bệnh phải van vái và cầu thầy, hôn nhân thận trọng, đi xa không thành.</div><div>Như ông Khổng Minh đời Tam Quốc, trên thì thông thiên văn, dưới thì đạt địa lý, trung quán nhân sự, luận biện thì quán đảo quần nhu, ăn trùm thiên hạ, ra tài thống nhất thế gian, mà nào có được đâu! Có tài mà cậy chi tài.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Nhân nguyện như thử, như thử!</div><div style="text-align:center;">Thiên lý vị nhiên, vị vị nhiên!</div><div style="text-align:center;">(Trời chưa cho mà muốn cách gì cũng chẳng xong).</div>
`
},

"048":{
title:"SỐ 048 - TRUNG BÌNH",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Đăng sơn thiệp thủy chánh đông hàn,</div><div style="text-align:center;">Huynh đệ hôn nhơn na đắc an.</div><div style="text-align:center;">Bất ngộ hổ đầu nhơn nhứt hoán,</div><div style="text-align:center;">Toàn gia tiên bảo hỉ trung hoan.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Trời rét trèo non vượt suối ngàn,</div><div style="text-align:center;">Anh em hôn sự nào được an.</div><div style="text-align:center;">Gặp được năm dần người quí giúp,</div><div style="text-align:center;">Cả nhà an ổn vui ngập tràn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm này ý nói Kiện thưa nên hoà, cầu danh không có, tài lợi hao tổn, hôn nhân xét kỹ, người đi khó.</div><div>Làm việc gì cũng đừng nóng nảy, phải chậm rãi sẽ nhờ ơn trên ban cho, và gặp quí nhân giúp đỡ thì mọi việc mới an. Mọi việc nên chọn thời Dần mà hành sự. Xăm này hạp tháng giêng.</div><div>Tích xưa, nàng Triệu Ngũ Nương đi tìm chồng trong tiết đông lạnh lẽo, nhưng người chồng cũng bình an trở về đoàn tụ với gia đình vui vẻ. Và một vị tướng bị giặc vây cũng xin quẻ này, sau có viện quân đến giải thoát.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Trước khó sau dễ số trời cho,</div><div style="text-align:center;">Cưỡi hạc em còn thắt đai to</div>
`
},

"049":{
title:"SỐ 049 - HẠ HẠ",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Bí thử gia cư chỉ nhứt sơn,</div><div style="text-align:center;">Như hà tợ cách quỉ môn quan.</div><div style="text-align:center;">Nhựt nguyệt như than nhơn dĩ lão,</div><div style="text-align:center;">Hứa đa lao lực bất như nhàn.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Nhà cửa đó đây cũng một đàng,</div><div style="text-align:center;">Vì sao cách trở thế ải quan.</div><div style="text-align:center;">Ngày tháng thoi đưa người già gấp,</div><div style="text-align:center;">Phú quí lao tâm thua chữ nhàn.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh có mà chậm, có lợi rồi chớ tham cầu, đừng tranh kiện, người xa chậm về, kiện nên hòa, hôn nhân xét kỹ, biết người biết mình mới là trượng phu.</div><div>Sự tích đời Tây Hán, Trương Lương có công giúp Bái Công lập nên cơ nghiệp, nhưng khi thành công rồi không tham phú quí nên ẩn dật tu thân, Trương Lương là người thấy xa hiểu rộng, biết tâm trí của Lưu Ban, cũng như thiên hạ ở đời, tướng cổ cò, mỏ quạ, cổ cao, mũi nhọn, mắt diều hâu là người phản phúc, có lúc nguy mà không có lúc an, nên tránh trước mới khỏi bị hại. Còn Hàn Tín thì ham danh bám theo Lưu Ban, nên sau bị Lưu Ban giết chết.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Công thành thân thối, Thỏ chết thì chó khó sống.</div><div style="text-align:center;">Tên mà bắn hết thì cung để làm gì.</div>
`
},

"050":{
title:"SỐ 050 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Sự phùng âm chất trợ ngô mưu,</div><div style="text-align:center;">Vạn sự ba đào khá hạ câu.</div><div style="text-align:center;">Nhứt điếu lục ngao đoan đích hửu,</div><div style="text-align:center;">Hứa đa công đức thử thời thân.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">May nhờ âm chất trợ mưu ta,</div><div style="text-align:center;">Sóng gió song cầu cũng được mà.</div><div style="text-align:center;">Một lưỡi câu lên phăng sáu cá,</div><div style="text-align:center;">Bao nhiêu công đức một thời ra.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, làm việc gì trước khó, sau dễ, nhờ có âm chất của ông bà và ơn trên che chở, nên việc nào cũng thành tựu vẻ vang.</div><div>Tích ông câu, đi câu trong lúc sóng ba đào mà câu một lần sáu con cá ngao.</div><div>Một nhà chính trị bị đày, xin được quẻ xăm này sau được ân xá.</div><div>Xăm tốt làm chi nên nấy.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Mạng lý hữu thời chung tụ hữu.</div>
`
},

"051":{
title:"SỐ 051 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Quân kim bá sự thỏa tùy duyên,</div><div style="text-align:center;">Thủy đáo cứ hành thánh tự nhiên.</div><div style="text-align:center;">Mạc thán lai niên bất như ý,</div><div style="text-align:center;">Hỉ phùng tân vận xứng tâm điền.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Phàm người trăm việc phải tùy duyên,</div><div style="text-align:center;">Nước chảy thành sông lẽ tự nhiên.</div><div style="text-align:center;">Chớ sợ sang năm công việc thất,</div><div style="text-align:center;">Sẽ mừng vận tốt thỏa lòng nguyền.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Danh lợi có như lòng muốn, có bệnh mau lành, đi xa gặp quí nhân, cầu hôn hạp, kiện thưa đắc lý.</div><div>Xăm thánh ý khuyên ta cứ tự nhiên mà lo việc nào nó đến là nó sẽ đến, nước chảy mãi sẽ thành sông, làm ăn có khi thịnh có khi suy.</div><div>Xăm này hạp tháng giêng, hai, ba.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">(Sẽ mừng vận mới xứng tâm mình).</div>
`
},

"052":{
title:"SỐ 052 - THƯỢNG KIẾT",
content:`
<div style="text-align:center;"><b>XĂM CHỮ</b></div><div style="text-align:center;">Ngô ta u cư than tích tiêu,</div><div style="text-align:center;">Cô đang yếm ánh độ thánh tiêu.</div><div style="text-align:center;">Huỳnh kim hốt báo thu quan hào,</div><div style="text-align:center;">Hượt kế biến chu độ bác triều.</div><div style="text-align:center;"><br></div><div style="text-align:center;"><b>DỊCH NGHĨA</b></div><div style="text-align:center;">Một mình hiu quạnh thở than hoài,</div><div style="text-align:center;">Đèn sách đợi thời ráng dùi mài.</div><div style="text-align:center;">Thu đến bảng vàng may gặp đặng,</div><div style="text-align:center;">Thuyền hay đưa đến chốn vương đài.</div><div><br></div><div><br></div><div><b>Lời bàn:</b></div><div>Xăm tốt, danh lợi hanh thông, thi cử có hy vọng, bệnh mau lành, hôn nhân hạp, kiện thưa đắc lý.</div><div>Sự tích một người đi buôn bán về hướng bắc có lợi nhiều, và khi Triệu Khuông Dẫn lúc còn nhỏ lo học sách bình thơ, sau trở nên vì vua nhà Tống, thông đạt văn võ.</div><div><br></div><div style="text-align:center;"><b>Xăm đúng câu:</b></div><div style="text-align:center;">Thời lai phong tống đẳng vương các.</div><div style="text-align:center;">(Thời đến gió đưa nơi quyền quí).</div>
`
},

"053":{
title:"SỐ 053 - TRUNG HẠ",
content:`
