<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Word Editor</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.toolbar{
    position:sticky;
    top:0;
    z-index:999;
    background:white;
    border-bottom:1px solid #ddd;
    padding:8px;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
}

.toolbar button,
.toolbar select,
.toolbar input{
    padding:6px;
}

.editor{
    width:100%;
    min-height:calc(100vh - 70px);
    background:white;
    padding:30px;
    outline:none;
    overflow:auto;
}

table{
    border-collapse:collapse;
}

table td,
table th{
    border:1px solid #333;
    padding:6px;
    resize:both;
    overflow:auto;
    min-width:40px;
    min-height:25px;
}

img{
    max-width:100%;
}

.fullscreen{
    position:fixed !important;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:9999;
    background:white;
}

.group{
    display:flex;
    gap:5px;
    padding-right:10px;
    border-right:1px solid #ddd;
}

table{
    resize:both;
    overflow:auto;
    border-collapse:collapse;
}
</style>

</head>
<body>

<div class="toolbar">

<div class="group">
<button onclick="exec('undo')">↶</button>
<button onclick="exec('redo')">↷</button>
</div>

<div class="group">
<button onclick="exec('bold')"><b>B</b></button>
<button onclick="exec('italic')"><i>I</i></button>
<button onclick="exec('underline')"><u>U</u></button>
<button onclick="exec('strikeThrough')"><s>S</s></button>
<button onclick="insertResponsiveLine()">➖ Gạch Ngang</button>
<button onclick="insertVerticalLine()">│ Gạch Đứng</button>
</div>

<div class="group">
<select id="fontName">
<option value="">Font</option>
<option>Arial</option>
<option>Tahoma</option>
<option>Verdana</option>
<option>Georgia</option>
<option>Times New Roman</option>
<option>Courier New</option>
</select>

<select id="fontSize">
<option value="">Size</option>
<option value="1">8</option>
<option value="2">10</option>
<option value="3">12</option>
<option value="4">14</option>
<option value="5">18</option>
<option value="6">24</option>
<option value="7">36</option>
</select>
</div>

<div class="group">

    <label title="Màu chữ"
        style="
            color:red;
            font-weight:bold;
            font-size:20px;
            cursor:pointer;
        ">
        A
        <input type="color"
               id="foreColor"
               style="width:28px;height:28px;vertical-align:middle;">
    </label>

    <label title="Màu nền"
        style="
            font-size:20px;
            cursor:pointer;
        ">
        🖍️
        <input type="color"
               id="backColor"
               style="width:28px;height:28px;vertical-align:middle;">
    </label>

</div>

<select id="alignSelect">
    <option value="">↔ Canh lề</option>
    <option value="left">⬅ Trái</option>
    <option value="center">⬌ Giữa</option>
    <option value="right">➡ Phải</option>
    <option value="justify">☰ Đều</option>
</select>


<div class="group">
<button onclick="exec('insertUnorderedList')">• List</button>
<button onclick="exec('insertOrderedList')">1. List</button>
<button onclick="exec('outdent')">← Indent</button>
<button onclick="exec('indent')">Indent →</button>
<button onclick="insertLink()">🔗 Link</button>
<button onclick="imageInput.click()">🖼 Ảnh</button>
</div>

<div class="group">
<button onclick="insertTable()">▦ Bảng</button>
<button onclick="deleteTable()">❌ Bảng</button>
<button onclick="addRow()">➕ Hàng</button>
<button onclick="addCol()">➕ Cột</button>
<button onclick="deleteRow()">❌ Hàng</button>
<button onclick="deleteCol()">❌ Cột</button>
<button onclick="tableWidth('auto')">Auto</button>
<button onclick="tableWidth('100%')">100%</button>
<button onclick="equalColumns()">↔ Cách Đều Cột</button>
<input type="number" id="cellWidth" placeholder="Rộng" style="width:70px;">
<input type="number" id="cellHeight" placeholder="Cao" style="width:70px;">
</div>

<div class="group">
<button onclick="exec('removeFormat')">🧹 Clear</button>
<button onclick="convertToPlainText()">📄 Text Thuần</button>
<button onclick="clearEditor()">🗑️ Xóa Hết</button>
<button onclick="copyHTML()">📋 Copy HTML</button>
</div>

<input type="file" id="imageInput" accept="image/*" hidden>

</div>

<div
id="editor"
class="editor"
contenteditable="true">
</div>

<script>

const editor = document.getElementById('editor');

const saved = localStorage.getItem('miniWordContent');

if(saved){
    editor.innerHTML = saved;
}

function exec(cmd,val=null){
    document.execCommand(cmd,false,val);
    saveContent();
}

function saveContent(){
    localStorage.setItem(
        'miniWordContent',
        editor.innerHTML
    );
}

editor.addEventListener('input',saveContent);

document
.getElementById('fontName')
.addEventListener('change',function(){

    if(this.value){
        exec('fontName',this.value);
    }

});

document
.getElementById('fontSize')
.addEventListener('change',function(){

    if(this.value){
        exec('fontSize',this.value);
    }

});

document
.getElementById('foreColor')
.addEventListener('change',function(){

    exec('foreColor',this.value);

});

document
.getElementById('backColor')
.addEventListener('change',function(){

    exec('hiliteColor',this.value);

});

function insertLink(){

    let url = prompt('Nhập URL');

    if(url){
        exec('createLink',url);
    }

}

function insertTable(){

    let rows = parseInt(prompt('Số hàng',1));

    let cols = parseInt(prompt('Số cột',3));

    if(!rows || !cols) return;

    let html = '<table>';

    for(let r=0;r<rows;r++){

        html += '<tr>';

        for(let c=0;c<cols;c++){

            html += '<td>&nbsp;</td>';

        }

        html += '</tr>';
    }

    html += '</table><br>';

    exec('insertHTML',html);

}


function getCurrentTable(){

    let node = window.getSelection().anchorNode;

    while(node){

        if(node.tagName === 'TABLE'){
            return node;
        }

        node = node.parentNode;
    }

    return null;
}

function tableWidth(width){

    const table = getCurrentTable();

    if(!table){
        alert('Đặt con trỏ trong bảng');
        return;
    }

    table.style.width = width;

    saveContent();
}

function tableAlign(align){

    const table = getCurrentTable();

    if(!table){
        alert('Đặt con trỏ trong bảng');
        return;
    }

    if(align === 'left'){

        table.style.marginLeft = '0';
        table.style.marginRight = 'auto';

    }else if(align === 'center'){

        table.style.marginLeft = 'auto';
        table.style.marginRight = 'auto';

    }else{

        table.style.marginLeft = 'auto';
        table.style.marginRight = '0';

    }

    saveContent();
}

function addRow(){

    const table = getCurrentTable();

    if(!table) return;

    const cols =
        table.rows[0].cells.length;

    const row =
        table.insertRow();

    for(let i=0;i<cols;i++){

        row.insertCell().innerHTML='&nbsp;';
    }

    saveContent();
}

function addCol(){

    const table = getCurrentTable();

    if(!table) return;

    for(let row of table.rows){

        row.insertCell().innerHTML='&nbsp;';
    }

    saveContent();
}

function deleteTable(){

    const table = getCurrentTable();

    if(!table) return;

    if(confirm('Xóa bảng này?')){

        table.remove();

        saveContent();
    }
}


let selectedCell = null;

editor.addEventListener('click',e=>{

    if(
        e.target.tagName==='TD' ||
        e.target.tagName==='TH'
    ){

        selectedCell = e.target;

        document.getElementById('cellWidth').value =
            parseInt(selectedCell.offsetWidth);

        document.getElementById('cellHeight').value =
            parseInt(selectedCell.offsetHeight);
    }

});

const widthInput =
document.getElementById('cellWidth');

const heightInput =
document.getElementById('cellHeight');

widthInput.addEventListener('input',()=>{

    if(!selectedCell) return;

    selectedCell.style.width =
        widthInput.value + 'px';

    saveContent();

});

heightInput.addEventListener('input',()=>{

    if(!selectedCell) return;

    selectedCell.style.height =
        heightInput.value + 'px';

    saveContent();

});

editor.addEventListener('mouseup',()=>{

    if(!selectedCell) return;

    document.getElementById('cellWidth').value =
        parseInt(selectedCell.offsetWidth);

    document.getElementById('cellHeight').value =
        parseInt(selectedCell.offsetHeight);

});
function getCurrentCell(){
 return selectedCell;
}

function deleteRow(){
 const cell=getCurrentCell();
 if(cell){cell.parentElement.remove();saveContent();}
}

function deleteCol(){
 const cell=getCurrentCell();
 if(!cell) return;
 const idx=cell.cellIndex;
 for(const row of cell.closest('table').rows){
   if(row.cells[idx]) row.deleteCell(idx);
 }
 saveContent();
}

function mergeCell(){
 const cell=getCurrentCell();
 if(!cell || !cell.nextElementSibling) return;
 cell.colSpan=(cell.colSpan||1)+(cell.nextElementSibling.colSpan||1);
 cell.nextElementSibling.remove();
 saveContent();
}

function splitCell(){
 const cell=getCurrentCell();
 if(!cell || (cell.colSpan||1)<=1) return;
 cell.colSpan--;
 const td=document.createElement('td');
 td.innerHTML='&nbsp;';
 cell.parentNode.insertBefore(td,cell.nextSibling);
 saveContent();
}

function cellColor(color){
 const cell=getCurrentCell();
 if(cell){
   cell.style.background=color;
   saveContent();
 }
}

const imageInput =
document.getElementById('imageInput');

imageInput.addEventListener('change',e=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(ev){

        exec(
            'insertHTML',
            '<img src="'+ev.target.result+'">'
        );

    };

    reader.readAsDataURL(file);

});

async function copyHTML(){

    try{

        await navigator.clipboard.writeText(
            editor.innerHTML
        );

        alert('Đã copy HTML');

    }catch(e){

        const ta = document.createElement('textarea');

        ta.value = editor.innerHTML;

        document.body.appendChild(ta);

        ta.select();

        document.execCommand('copy');

        ta.remove();

        alert('Đã copy HTML');

    }

}

function toggleFullscreen(){

    editor.classList.toggle('fullscreen');

}

document.addEventListener('keydown',e=>{

    if(e.ctrlKey && e.key === 'Delete'){

        e.preventDefault();

        clearEditor();

        return;
    }

    if(!e.ctrlKey) return;

    const key = e.key.toLowerCase();

    switch(key){

        case 's':
            e.preventDefault();
            saveContent();
            alert('Đã lưu');
            break;

        case 'e':
            e.preventDefault();
            exec('justifyCenter');
            break;

        case 'l':
            e.preventDefault();
            exec('justifyLeft');
            break;

        case 'r':
            e.preventDefault();
            exec('justifyRight');
            break;

        case '-':
            e.preventDefault();
            insertResponsiveLine();
            break;

        case '\\':
            e.preventDefault();
            insertVerticalLine();
            break;

        case '=':
            e.preventDefault();
            insertTable();
            break;

        case 'm':
            e.preventDefault();
            equalColumns();
            break;

    }

});


function convertToPlainText(){

    if(!confirm(
        'Chuyển toàn bộ nội dung thành text thuần?\n\n' +
        'Tất cả định dạng, ảnh, bảng, link sẽ bị loại bỏ.'
    )){
        return;
    }

    const text = editor.innerText;

    editor.innerText = text;

    saveContent();

}
function clearEditor(){

    if(!confirm(
        'Bạn có chắc muốn xóa toàn bộ nội dung?\n\n' +
        'Thao tác này sẽ xóa cả dữ liệu đã lưu.'
    )){
        return;
    }

    editor.innerHTML = '';

    localStorage.removeItem('miniWordContent');
}

function equalColumns(){

    const table = getCurrentTable();

    if(!table){
        alert('Đặt con trỏ trong bảng');
        return;
    }

    const cols = table.rows[0].cells.length;

    const width = (100 / cols) + '%';

    for(const row of table.rows){

        for(const cell of row.cells){

            cell.style.width = width;

        }

    }

    table.style.width = '100%';

    saveContent();
}
function insertResponsiveLine(){

    exec(
        'insertHTML',
        '<hr style="width:100%;margin:10px 0;border:none;border-top:2px solid #000;">'
    );
}
function insertVerticalLine(){

    exec(
        'insertHTML',
        '<span style="display:inline-block;width:2px;height:100px;background:#000;vertical-align:middle;margin:0 10px;"></span>'
    );

}

function setCellSize(){

    const cell = getCurrentCell();

    if(!cell){
        alert('Hãy chọn một ô trong bảng');
        return;
    }

    const width =
        document.getElementById('cellWidth').value;

    const height =
        document.getElementById('cellHeight').value;

    if(width){
        cell.style.width = width + 'px';
    }

    if(height){
        cell.style.height = height + 'px';
    }

    saveContent();
}

document
.getElementById('alignSelect')
.addEventListener('change', function(){

    if(!this.value) return;

    const table = getCurrentTable();

    // Nếu đang chọn trong bảng
    if(table){

        if(this.value === 'left'){

            table.style.marginLeft='0';
            table.style.marginRight='auto';

        }else if(this.value === 'center'){

            table.style.marginLeft='auto';
            table.style.marginRight='auto';

        }else if(this.value === 'right'){

            table.style.marginLeft='auto';
            table.style.marginRight='0';

        }

        saveContent();

    }else{

        switch(this.value){

            case 'left':
                exec('justifyLeft');
                break;

            case 'center':
                exec('justifyCenter');
                break;

            case 'right':
                exec('justifyRight');
                break;

            case 'justify':
                exec('justifyFull');
                break;
        }
    }

    this.selectedIndex = 0;

});

</script>

</body>
</html>
