<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Data Xăm</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:30px auto;
    padding:20px;
    background:#f5f5f5;
}

.box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    padding:10px;
    width:120px;
    font-size:16px;
    margin-right:10px;
}

button{
    padding:10px 20px;
    margin-right:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-generate{
    background:#8b6b2f;
}

.btn-copy{
    background:#2e8b57;
}

textarea{
    width:100%;
    height:500px;
    margin-top:20px;
    padding:10px;
    font-family:Consolas,monospace;
    font-size:14px;
    box-sizing:border-box;
}

#status{
    margin-top:10px;
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">

<h2>Tạo Data Xăm</h2>

<label>Từ:</label>
<input type="number" id="start" value="">

<label>Đến:</label>
<input type="number" id="end" value="">

<button class="btn-generate" onclick="generate()">
Tạo Data
</button>

<button class="btn-copy" onclick="copyData()">
Copy Data
</button>

<div id="status"></div>

<textarea id="output"></textarea>

</div>

<script>

function generate(){

    let start = parseInt(document.getElementById('start').value);
    let end = parseInt(document.getElementById('end').value);

    let result = "";

    for(let i = start; i <= end; i++){

        let so = String(i).padStart(3,'0');

        result += `"${so}":{
title:"SỐ ${so}",
content:\`

\`
},

`;

    }

    document.getElementById("output").value = result;
    document.getElementById("status").innerText =
    `Đã tạo ${end - start + 1} dòng dữ liệu`;
}

function copyData(){

    let text = document.getElementById("output");

    if(text.value.trim() === ""){
        alert("Chưa có dữ liệu để copy");
        return;
    }

    navigator.clipboard.writeText(text.value)
    .then(()=>{
        document.getElementById("status").innerText =
        "✓ Đã copy vào clipboard";
    })
    .catch(()=>{
        alert("Không thể copy");
    });

}

generate();

</script>

</body>
</html>
